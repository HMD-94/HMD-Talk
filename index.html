<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMD Talk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#0d0f13;--bg2:#161a22;--bg3:#1e2433;--bg4:#252d3d;--bg5:#2e3854;
  --accent1:#7c5cfc;--accent2:#a855f7;
  --grad:linear-gradient(135deg,#7c5cfc,#a855f7,#ec4899);
  --grad2:linear-gradient(135deg,#06b6d4,#7c5cfc);
  --grad3:linear-gradient(135deg,#f97316,#ec4899);
  --grad4:linear-gradient(135deg,#10b981,#06b6d4);
  --text1:#f0f2f7;--text2:#a0aec0;--text3:#64748b;--border:#2e3854;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --online:#22c55e;--idle:#eab308;--dnd:#ef4444;
  --r8:8px;--r12:12px;--r16:16px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg1);color:var(--text1);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
button{cursor:pointer;border:none;font-family:inherit;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
#auth-screen{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,#1a0f3a 0%,#0d0f13 60%);display:flex;align-items:center;justify-content:center;z-index:1000;}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:90vw;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo .logo-icon{width:60px;height:60px;background:var(--grad);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin-bottom:12px;}
.auth-logo h1{font-size:26px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border-radius:7px;background:transparent;color:var(--text2);font-size:14px;font-weight:600;transition:.2s;}
.auth-tab.active{background:var(--grad);color:#fff;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.auth-field input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:15px;outline:none;transition:.2s;}
.auth-field input:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(124,92,252,.15);}
.auth-btn{width:100%;padding:13px;background:var(--grad);border-radius:10px;color:#fff;font-size:15px;font-weight:700;margin-top:8px;transition:.2s;}
.auth-btn:hover{opacity:.9;transform:translateY(-1px);}
.auth-err{color:#ef4444;font-size:13px;margin-top:8px;text-align:center;}
#app{display:flex;height:100vh;overflow:hidden;}
.servers-bar{width:68px;background:var(--bg1);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);}
.srv-btn{width:48px;height:48px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;font-size:13px;font-weight:700;color:var(--text1);flex-shrink:0;}
.srv-btn:hover,.srv-btn.active{border-radius:14px;}
.srv-btn.active{background:var(--grad);}
.srv-btn .notif-dot{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:var(--red);border-radius:50%;border:2px solid var(--bg1);font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;}
.srv-sep{width:32px;height:2px;background:var(--border);border-radius:1px;margin:4px 0;}
.srv-add{background:var(--bg3);color:var(--green);font-size:22px;}
.srv-add:hover{background:var(--green);color:#fff;}
.left-panel{width:240px;background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);}
.lp-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.lp-header:hover{background:rgba(255,255,255,.03);}
.ch-list{flex:1;overflow-y:auto;padding:8px 0;}
.ch-section{margin-bottom:4px;}
.ch-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 4px 16px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ch-section-hdr:hover{color:var(--text2);}
.ch-item{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 16px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:.15s;margin:1px 8px;position:relative;}
.ch-item:hover{background:var(--bg4);color:var(--text1);}
.ch-item.active{background:var(--bg5);color:var(--text1);}
.ch-item .ch-icon{color:var(--text3);font-size:16px;flex-shrink:0;}
.ch-item .ch-notif{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;min-width:18px;text-align:center;}
.user-bar{padding:8px 12px;background:var(--bg1);display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);}
.user-bar .ub-avatar{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden;}
.user-bar .ub-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-bar .ub-info{flex:1;min-width:0;}
.user-bar .ub-name{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-bar .ub-status{font-size:11px;color:var(--text2);}
.ub-actions{display:flex;gap:4px;}
.ub-action{width:28px;height:28px;border-radius:6px;background:transparent;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ub-action:hover{background:var(--bg4);color:var(--text1);}
.status-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg1);position:absolute;bottom:-1px;right:-1px;}
.status-dot.online{background:var(--online);}
.status-dot.idle{background:var(--idle);}
.status-dot.dnd{background:var(--dnd);}
.status-dot.offline{background:var(--text3);}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.mc-header{padding:0 16px;height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mc-header .ch-name{font-weight:700;font-size:15px;}
.mc-header .ch-desc{color:var(--text2);font-size:13px;border-left:1px solid var(--border);padding-left:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-header-actions{margin-left:auto;display:flex;gap:4px;}
.hdr-btn{width:32px;height:32px;border-radius:6px;background:transparent;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s;cursor:pointer;}
.hdr-btn:hover{background:var(--bg4);color:var(--text1);}
.messages-area{flex:1;overflow-y:auto;padding:16px 0;}
.msg-group{display:flex;gap:12px;padding:4px 16px;margin:2px 0;}
.msg-group:hover{background:rgba(255,255,255,.02);}
.msg-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;margin-top:2px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;overflow:hidden;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.msg-content{flex:1;min-width:0;}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
.msg-author{font-size:15px;font-weight:700;cursor:pointer;}
.msg-author:hover{text-decoration:underline;}
.msg-time{font-size:11px;color:var(--text3);}
.msg-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.msg-badge.nitro{background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;}
.msg-badge.mod{background:#ef4444;color:#fff;}
.msg-text{font-size:15px;line-height:1.5;color:var(--text1);word-break:break-word;}
.msg-text a{color:var(--accent1);}
.msg-continue{padding:4px 16px 4px 68px;}
.msg-continue:hover{background:rgba(255,255,255,.02);}
.typing-indicator{padding:4px 16px;color:var(--text2);font-size:13px;height:28px;}
.input-area{padding:0 16px 16px;}
.msg-input-wrap{background:var(--bg3);border-radius:12px;display:flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--border);}
.msg-input-wrap:focus-within{border-color:rgba(124,92,252,.4);}
.msg-input-btn{width:32px;height:32px;background:transparent;color:var(--text2);font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;transition:.15s;cursor:pointer;}
.msg-input-btn:hover{color:var(--text1);}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text1);font-size:15px;padding:12px 0;resize:none;max-height:200px;overflow-y:auto;}
.msg-input::placeholder{color:var(--text3);}
.right-panel{width:240px;background:var(--bg2);border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto;}
.rp-section{padding:12px;}
.rp-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.member-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:.15s;}
.member-item:hover{background:var(--bg3);}
.member-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;overflow:hidden;}
.member-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-status{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dm-item{display:flex;align-items:center;gap:10px;padding:6px 12px;cursor:pointer;border-radius:8px;margin:1px 8px;transition:.15s;position:relative;}
.dm-item:hover{background:var(--bg3);}
.dm-item.active{background:var(--bg4);}
.dm-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;position:relative;overflow:hidden;}
.dm-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.dm-info{flex:1;min-width:0;}
.dm-name{font-size:14px;font-weight:600;}
.dm-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:28px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:20px;font-weight:800;margin-bottom:20px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal-close{float:right;background:transparent;color:var(--text2);font-size:22px;line-height:1;margin-top:-4px;cursor:pointer;}
.modal-close:hover{color:var(--text1);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text1);font-size:14px;outline:none;transition:.2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent1);}
.field textarea{min-height:80px;resize:vertical;}
.field select{cursor:pointer;}
.field select option{background:var(--bg3);}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;transition:.2s;cursor:pointer;}
.btn-primary{background:var(--grad);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text1);}
.btn-danger{background:#ef4444;color:#fff;}
.btn-danger:hover{background:#dc2626;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.profile-banner{height:100px;border-radius:12px 12px 0 0;position:relative;margin:-28px -28px 0;background:var(--grad);}
.profile-banner .change-banner{position:absolute;inset:0;background:rgba(0,0,0,.4);border-radius:12px 12px 0 0;display:none;align-items:center;justify-content:center;font-size:13px;color:#fff;cursor:pointer;}
.profile-banner:hover .change-banner{display:flex;}
.profile-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.profile-name{font-size:20px;font-weight:800;}
.nitro-badge{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:12px;font-weight:700;border:1px solid var(--accent1);border-radius:4px;padding:2px 6px;}
.profile-tag{color:var(--text2);font-size:13px;margin-bottom:10px;}
.profile-bio{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;}
.badge-nitro{background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;}
.badge-dev{background:var(--bg4);color:var(--text1);border:1px solid var(--border);}
.settings-layout{display:flex;height:100%;gap:0;}
.settings-nav{width:200px;padding:16px;border-right:1px solid var(--border);flex-shrink:0;}
.settings-nav-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 8px;}
.settings-nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:.15s;margin:1px 0;}
.settings-nav-item:hover{background:var(--bg3);color:var(--text1);}
.settings-nav-item.active{background:var(--bg4);color:var(--text1);}
.settings-content{flex:1;padding:24px;overflow-y:auto;}
.settings-section{margin-bottom:28px;}
.settings-section h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.toggle-row:last-child{border:none;}
.toggle-info .toggle-label{font-size:14px;font-weight:600;}
.toggle-info .toggle-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bg4);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--accent1);}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.2s;}
.toggle.on::after{left:23px;}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
.color-swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.selected{border-color:var(--text1);}

/* ===== AVATAR UPLOAD ===== */
.avatar-upload-zone{position:relative;width:80px;height:80px;margin-top:-40px;margin-bottom:8px;cursor:pointer;}
.avatar-upload-zone .avatar-circle{width:80px;height:80px;border-radius:50%;border:5px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;transition:.2s;}
.avatar-upload-zone .avatar-circle img{width:100%;height:100%;object-fit:cover;}
.avatar-upload-zone .avatar-overlay{position:absolute;inset:5px;border-radius:50%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;flex-direction:column;gap:2px;}
.avatar-upload-zone:hover .avatar-overlay{display:flex;}
.avatar-overlay span{font-size:18px;}
.avatar-overlay small{font-size:9px;color:rgba(255,255,255,.8);font-weight:700;text-transform:uppercase;}
.avatar-upload-settings{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.avatar-preview-settings{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;border:3px solid var(--border);transition:.2s;}
.avatar-preview-settings:hover{border-color:var(--accent1);}
.avatar-preview-settings img{width:100%;height:100%;object-fit:cover;}
.avatar-preview-settings .avatar-hover-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;font-size:20px;}
.avatar-preview-settings:hover .avatar-hover-overlay{display:flex;}

/* ===== CALL UI ===== */
.call-ui{position:fixed;inset:0;background:#0a0a0f;z-index:200;display:flex;flex-direction:column;}
.call-videos{flex:1;display:grid;place-items:center;gap:12px;padding:16px;background:#000;position:relative;}
.call-videos.grid-1{grid-template-columns:1fr;}
.call-videos.grid-2{grid-template-columns:1fr 1fr;}
.call-video-tile{background:#111;border-radius:12px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:2px solid transparent;transition:.3s;}
.call-video-tile.speaking{border-color:var(--green);}
.call-video-tile video{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;}
.call-video-tile .tile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;overflow:hidden;}
.call-video-tile .tile-avatar img{width:100%;height:100%;object-fit:cover;}
.call-video-tile .tile-name{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:6px;font-size:13px;font-weight:600;}
.call-video-tile .tile-muted{position:absolute;top:10px;right:10px;background:rgba(239,68,68,.85);border-radius:6px;padding:4px 8px;font-size:12px;}
.call-controls{padding:16px;display:flex;align-items:center;justify-content:center;gap:12px;background:var(--bg2);}
.call-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:.2s;border:none;cursor:pointer;}
.call-btn:hover{transform:scale(1.1);}
.call-btn-normal{background:var(--bg4);color:var(--text1);}
.call-btn-normal.off{background:var(--red);color:#fff;}
.call-btn-end{background:var(--red);color:#fff;width:60px;height:60px;font-size:24px;}
.call-info{text-align:center;padding:8px 0;}
.call-info .call-timer{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.call-info .call-label{font-size:13px;color:var(--text2);}
.incoming-call{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--accent1);border-radius:16px;padding:20px;width:300px;z-index:600;box-shadow:0 8px 40px rgba(124,92,252,.3);animation:slideIn .3s ease;}
.incoming-call h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.incoming-call p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.incoming-call-btns{display:flex;gap:8px;}
.incoming-call-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.btn-accept{background:var(--green);color:#fff;}
.btn-decline{background:var(--red);color:#fff;}
.call-status-bar{text-align:center;padding:6px 0;font-size:13px;color:var(--text2);background:rgba(0,0,0,.4);}
.friends-header{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.friends-tab{padding:6px 14px;border-radius:8px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:.15s;}
.friends-tab:hover{background:var(--bg3);}
.friends-tab.active{background:var(--accent1);color:#fff;}
.friend-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s;}
.friend-item:hover{background:var(--bg3);}
.friend-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;position:relative;overflow:hidden;}
.friend-avatar img{width:100%;height:100%;object-fit:cover;}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, off, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-SRABd1v11Kdx5Tz0JFJu8psHGbFrrV4",
  authDomain: "hmd-talk.firebaseapp.com",
  databaseURL: "https://hmd-talk-default-rtdb.firebaseio.com",
  projectId: "hmd-talk",
  storageBucket: "hmd-talk.firebasestorage.app",
  messagingSenderId: "915474502507",
  appId: "1:915474502507:web:8ddfc361935c813d62f22e"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ==================== STATE ====================
let S = {
  me: null, users: {}, servers: {}, channels: {}, messages: {}, dms: {},
  friends: {}, pendingIn: {}, pendingOut: {},
  view: 'home', activeServer: null, activeChannel: null, activeDm: null,
  theme: 'theme-purple', micOn: true, deafOn: false,
  inCall: false, callTimer: null, callSec: 0,
  _listeners: [], _seenMsgToast: {}, _seenFriendToast: {},
  dmUnread: {},
  // Ringtone settings
  ringtoneVolume: 40, // 0-100
  ringtoneEnabled: true,
};

// ==================== WebRTC STATE ====================
let WR = {
  pc: null,
  localStream: null,
  screenStream: null,
  callId: null,
  callType: 'voice',
  isCaller: false,
  remoteUserId: null,
  micMuted: false,
  camOff: true,
  screenSharing: false,
  signalingUnsub: null,
  iceUnsub: null,
  iceCandidatesReceived: new Set(),
  silenceTrack: null,
  blackTrack: null,
};

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' },
    { urls: 'stun:stun4.l.google.com:19302' },
  ]
};

const EMOJIS = ['😀','😂','🥹','😍','🥰','😎','🤩','🥳','😜','🤔','😴','😱','🎉','❤️','🔥','✨','👍','👎','💯','🚀','💎','🎮','🎵','🌈','⚡','🍕','🐱','🐶','🌸','💪','🙏','👀','💀','🤣','😭','😤','🥺','😏','🤯','🤩'];
const AVATAR_COLORS = ['linear-gradient(135deg,#7c5cfc,#a855f7)','linear-gradient(135deg,#3b82f6,#06b6d4)','linear-gradient(135deg,#10b981,#22c55e)','linear-gradient(135deg,#f97316,#eab308)','linear-gradient(135deg,#ec4899,#f97316)','linear-gradient(135deg,#ef4444,#f97316)'];
const STATUS_LABELS = {online:'🟢 En ligne',idle:'🟡 Absent',dnd:'🔴 Ne pas déranger',offline:'⚫ Invisible'};

// ==================== RINGTONE ENGINE ====================
// Generate a pleasant ringtone using Web Audio API (no external file needed)
let _ringtoneCtx = null;
let _ringtoneNodes = [];
let _ringtoneInterval = null;

function createRingtoneContext(){
  if(!_ringtoneCtx) _ringtoneCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _ringtoneCtx;
}

function playRingTone(){
  if(!S.ringtoneEnabled) return;
  stopRingTone();
  const vol = S.ringtoneVolume / 100;
  if(vol === 0) return;

  // Play a short melodic ring pattern then repeat
  function playPattern(){
    const ctx = createRingtoneContext();
    if(ctx.state === 'suspended') ctx.resume();

    // Pattern: 3 notes (like a classic phone ring)
    const notes = [
      { freq: 880, start: 0,   dur: 0.12 },
      { freq: 1100, start: 0.15, dur: 0.12 },
      { freq: 880, start: 0.30, dur: 0.12 },
    ];
    const masterGain = ctx.createGain();
    masterGain.gain.value = vol * 0.35; // keep it soft, max 35% master
    masterGain.connect(ctx.destination);

    notes.forEach(n => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(masterGain);
      osc.type = 'sine';
      osc.frequency.value = n.freq;
      const t = ctx.currentTime + n.start;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(1, t + 0.02);
      g.gain.setValueAtTime(1, t + n.dur - 0.03);
      g.gain.linearRampToValueAtTime(0, t + n.dur);
      osc.start(t);
      osc.stop(t + n.dur);
      _ringtoneNodes.push(osc);
    });
  }

  playPattern();
  _ringtoneInterval = setInterval(playPattern, 1800);
}

function stopRingTone(){
  if(_ringtoneInterval){ clearInterval(_ringtoneInterval); _ringtoneInterval = null; }
  _ringtoneNodes.forEach(n => { try{ n.stop(); }catch(e){} });
  _ringtoneNodes = [];
}

// ==================== BROWSER NOTIFICATIONS ====================
async function requestNotificationPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    await Notification.requestPermission();
  }
}

function sendBrowserNotif(title, body, icon){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body,
    icon: icon || null,
    tag: 'hmd-call',
    renotify: true,
    requireInteraction: true, // stays until user interacts
  });
  n.onclick = () => { window.focus(); n.close(); };
  return n;
}

// ==================== FIREBASE HELPERS ====================
function dbRef(path){ return ref(db, path); }
async function dbGet(path){ const snap = await get(dbRef(path)); return snap.exists() ? snap.val() : null; }
async function dbSet(path, val){ await set(dbRef(path), val); }
async function dbUpdate(path, val){ await update(dbRef(path), val); }
async function dbRemove(path){ await remove(dbRef(path)); }
function dbListen(path, cb){
  const r = dbRef(path);
  onValue(r, snap => cb(snap.exists() ? snap.val() : null));
  S._listeners.push(r);
  return r;
}
function saveSession(uid){ localStorage.setItem('hmd_session', uid||''); }
function loadSession(){ return localStorage.getItem('hmd_session')||null; }
function saveSettings(){ localStorage.setItem('hmd_ringtone_vol', S.ringtoneVolume); localStorage.setItem('hmd_ringtone_on', S.ringtoneEnabled?'1':'0'); }
function loadSettings(){
  const vol = localStorage.getItem('hmd_ringtone_vol');
  const on = localStorage.getItem('hmd_ringtone_on');
  if(vol !== null) S.ringtoneVolume = parseInt(vol);
  if(on !== null) S.ringtoneEnabled = on === '1';
}

// ==================== UTILS ====================
function uid(){ return Math.random().toString(36).substr(2,9)+'_'+Date.now().toString(36); }
function initials(name){ return name?name.slice(0,2).toUpperCase():'??'; }
function avatarColor(name){ let h=0; for(let i=0;i<(name||'').length;i++) h=name.charCodeAt(i)+h*31; return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function timeAgo(ts){ return "Aujourd'hui à "+new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function formatTime(sec){ return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatMsg(txt){
  txt=escHtml(txt);
  txt=txt.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  txt=txt.replace(/\*(.+?)\*/g,'<em>$1</em>');
  txt=txt.replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,.3);padding:2px 5px;border-radius:4px;font-family:monospace">$1</code>');
  txt=txt.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  return txt;
}
function getDmKey(a,b){ return [a,b].sort().join('__'); }

// Build avatar HTML (supports avatarImg)
function avatarHtml(u, size=40, extraStyle=''){
  if(!u) return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:${size*0.35}px;font-weight:700;color:#fff;${extraStyle}">?</div>`;
  const bg = u.color||avatarColor(u.username);
  if(u.avatarImg){
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;${extraStyle}"><img src="${u.avatarImg}" style="width:100%;height:100%;object-fit:cover;" alt=""/></div>`;
  }
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${size*0.35}px;font-weight:700;color:#fff;flex-shrink:0;${extraStyle}">${initials(u.username)}</div>`;
}

// ==================== AUTH ====================
function showAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').classList.toggle('hidden',tab!=='login');
  document.getElementById('register-form').classList.toggle('hidden',tab!=='register');
}

async function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  if(!user||!pass){err.textContent='Remplis tous les champs !';return;}
  err.textContent='Connexion...';
  const u = await dbGet('users/'+user);
  if(!u||u.password!==pass){err.textContent='Identifiants incorrects.';return;}
  err.textContent=''; S.me=user; saveSession(user); await enterApp();
}

async function doRegister(){
  const user=document.getElementById('reg-user').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  const err=document.getElementById('reg-err');
  if(!user||!pass||!pass2){err.textContent='Remplis tous les champs !';return;}
  if(user.length<2||user.length>24){err.textContent='Pseudo 2-24 caractères.';return;}
  if(pass.length<4){err.textContent='Mot de passe trop court (min 4).';return;}
  if(pass!==pass2){err.textContent='Mots de passe différents.';return;}
  const key=user.toLowerCase();
  err.textContent='Vérification...';
  const existing = await dbGet('users/'+key);
  if(existing){err.textContent='Ce pseudo est déjà pris !';return;}
  const newUser={id:key,username:user,password:pass,status:'online',bio:'',banner:null,color:avatarColor(user),theme:'theme-purple',joinedAt:Date.now(),nitro:true,badges:['nitro'],customColor:null,nameColor:null,avatarImg:null};
  await dbSet('users/'+key, newUser);
  const srvs = await dbGet('servers') || {};
  for(const sid of Object.keys(srvs)){
    await dbUpdate('servers/'+sid+'/members', {[key]:true});
    await dbUpdate('userServers/'+key, {[sid]:true});
  }
  err.style.color='#22c55e';
  err.textContent='Compte créé ! Connexion...';
  setTimeout(()=>{ document.getElementById('login-user').value=user; document.getElementById('login-pass').value=pass; showAuthTab('login'); setTimeout(doLogin,300); },600);
}

async function enterApp(){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('loading-msg').textContent='Chargement des données...';
  await dbUpdate('users/'+S.me, {status:'online', lastSeen: Date.now()});
  const srvs = await dbGet('servers') || {};
  for(const sid of Object.keys(srvs)){
    await dbUpdate('servers/'+sid+'/members', {[S.me]:true});
    await dbUpdate('userServers/'+S.me, {[sid]:true});
  }
  await loadAllData();
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const u=S.users[S.me];
    document.body.className=u&&u.theme?u.theme:'theme-purple';
    S.theme=u&&u.theme?u.theme:'theme-purple';
    renderApp(); showView('home'); setupListeners(); listenIncomingCalls();
    requestNotificationPermission();
  },800);
}

async function loadAllData(){
  S.users   = await dbGet('users')   || {};
  S.servers = await dbGet('servers') || {};
  S.channels= await dbGet('channels')|| {};
  S.messages= await dbGet('messages')|| {};
  S.dms     = await dbGet('dms')     || {};
  S.friends = await dbGet('friends') || {};
  S.pendingIn  = await dbGet('pendingIn')  || {};
  S.pendingOut = await dbGet('pendingOut') || {};
  if(Object.keys(S.servers).length===0) await seedData();
}

  await dbSet('channels/'+ch1,{id:ch1,server:s1,name:'général',type:'text',position:0});
  await dbSet('channels/'+ch2,{id:ch2,server:s1,name:'annonces',type:'text',position:1});

  await dbSet('messages/'+ch4+'/'+m2,{id:m2,author:'Talk Bot',content:'Bienvenue ! Créez des salons, invitez vos amis et profitez. 💎',ts:now-180000,avatar:AVATAR_COLORS[1],badge:'mod',reactions:{}});

function setupListeners(){
  dbListen('users', val=>{ S.users=val||{}; renderUserBar(); renderServersBar(); if(!document.getElementById('right-panel').classList.contains('hidden'))renderRightPanel(); if(S.view==='friends')renderFriendsView(); });
  dbListen('servers', val=>{ S.servers=val||{}; renderServersBar(); });
  dbListen('channels', val=>{ S.channels=val||{}; if(S.activeServer)renderLeftPanel('server',S.activeServer); });
  dbListen('friends/'+S.me, val=>{ S.friends[S.me]=val||{}; renderLeftPanel('dm'); if(S.view==='friends')renderFriendsView(); });
  dbListen('pendingIn/'+S.me, val=>{
    const prev=S.pendingIn[S.me]||{};
    S.pendingIn[S.me]=val||{};
    Object.keys(S.pendingIn[S.me]).forEach(fid=>{
      if(!prev[fid]&&S.users[fid]&&!S._seenFriendToast['req_'+fid]){
        S._seenFriendToast['req_'+fid]=1;
        const fu=S.users[fid];
        showToast('Demande d\'ami reçue !',fu.username+' veut être ton ami.',fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);
      }
    });
    if(S.view==='friends')renderFriendsView();
  });
  dbListen('pendingOut/'+S.me, val=>{ S.pendingOut[S.me]=val||{}; if(S.view==='friends')renderFriendsView(); });
  dbListen('dms', val=>{
    const prevDms = S.dms;
    S.dms=val||{};
    const myFriends = Object.keys(S.friends[S.me]||{});
    myFriends.forEach(fid=>{
      const dmKey=getDmKey(S.me,fid);
      const newMsgs = S.dms[dmKey] ? Object.values(S.dms[dmKey]) : [];
      const oldMsgs = prevDms[dmKey] ? Object.values(prevDms[dmKey]) : [];
      if(newMsgs.length > oldMsgs.length){
        const latest = newMsgs.sort((a,b)=>b.ts-a.ts)[0];
        if(latest && latest.authorId !== S.me && !S._seenMsgToast[latest.id]){
          S._seenMsgToast[latest.id]=1;
          if(S.activeDm !== fid){
            S.dmUnread[fid] = (S.dmUnread[fid]||0)+1;
          }
          const fu=S.users[fid];
          showToast(fu?fu.username:'Message',latest.content.slice(0,60),fu?fu.color||avatarColor(fu.username):avatarColor(fid),initials(fu?fu.username:fid),fu?fu.avatarImg:null);
        }
      }
    });
    if(S.activeDm){ renderDm(S.activeDm); }
    renderLeftPanel('dm');
  });
}

// ==================== INCOMING CALL LISTENER ====================
function listenIncomingCalls(){
  dbListen('calls/'+S.me+'/incoming', async val => {
    if(!val) return;
    if(S.inCall){
      await dbSet('calls/'+val.from+'/answer/'+val.callId, { declined: true });
      await dbRemove('calls/'+S.me+'/incoming');
      return;
    }
    showIncomingCall(val);
  });
}

function showIncomingCall(data){
  const fu = S.users[data.from];
  if(!fu) return;
  const typeLabel = data.type === 'video' ? 'vidéo' : 'vocal';

  // Play ringtone
  playRingTone();

  // Browser notification (background support)
  sendBrowserNotif(
    `📞 Appel ${typeLabel} entrant`,
    `${fu.username} t'appelle sur HMD Talk`,
    fu.avatarImg || null
  );

  const avatarContent = fu.avatarImg
    ? `<img src="${fu.avatarImg}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;" alt=""/>`
    : `<span style="font-size:16px;font-weight:700;color:#fff;">${initials(fu.username)}</span>`;

  const container = document.getElementById('incoming-call-ui');
  container.innerHTML = `
    <div class="incoming-call">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div class="ring-pulse" style="width:48px;height:48px;border-radius:50%;background:${fu.color||avatarColor(fu.username)};display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">
          ${avatarContent}
        </div>
        <div>
          <h3>Appel ${typeLabel} entrant</h3>
          <p style="margin:0;">${fu.username} t'appelle...</p>
        </div>
      </div>
      <div class="incoming-call-btns">
        <button class="btn-decline" id="btn-decline-call">✕ Refuser</button>
        <button class="btn-accept" id="btn-accept-call">✓ Répondre</button>
      </div>
    </div>`;
  container.classList.remove('hidden');
  document.getElementById('btn-decline-call').onclick = () => declineCall(data.callId, data.from);
  document.getElementById('btn-accept-call').onclick = () => acceptCall(data);
  setTimeout(()=>{
    stopRingTone();
    container.classList.add('hidden');
    container.innerHTML='';
  }, 30000);
}

async function declineCall(callId, fromId){
  stopRingTone();
  document.getElementById('incoming-call-ui').classList.add('hidden');
  document.getElementById('incoming-call-ui').innerHTML='';
  await dbSet('calls/'+fromId+'/answer/'+callId, { declined: true });
  await dbRemove('calls/'+S.me+'/incoming');
}

async function acceptCall(data){
  stopRingTone();
  document.getElementById('incoming-call-ui').classList.add('hidden');
  document.getElementById('incoming-call-ui').innerHTML='';
  await dbRemove('calls/'+S.me+'/incoming');
  WR.isCaller = false;
  WR.remoteUserId = data.from;
  WR.callId = data.callId;
  WR.callType = data.type || 'voice';
  WR.iceCandidatesReceived.clear();
  await initWebRTCCall(false, data.offer);
}

// ==================== WEBRTC HELPERS ====================
function createSilenceTrack(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const dst = ctx.createMediaStreamDestination();
  ctx.createGain().connect(dst);
  return dst.stream.getAudioTracks()[0];
}

function createBlackTrack(){
  const canvas = document.createElement('canvas');
  canvas.width = 2; canvas.height = 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'black';
  ctx.fillRect(0,0,2,2);
  const stream = canvas.captureStream(1);
  return stream.getVideoTracks()[0];
}

async function replaceTrackInPC(newTrack, kind){
  if(!WR.pc) return;
  const sender = WR.pc.getSenders().find(s => s.track && s.track.kind === kind);
  if(sender){
    try { await sender.replaceTrack(newTrack); }
    catch(e){ console.warn('replaceTrack error:', e); }
  }
}

// ==================== WEBRTC CORE ====================
async function initWebRTCCall(isCaller, remoteOffer){
  const callType = WR.callType;
  const remoteUserId = WR.remoteUserId;
  const fu = S.users[remoteUserId];

  S.inCall = true;
  S.callSec = 0;
  WR.micMuted = false;
  WR.camOff = true;
  WR.screenSharing = false;

  const callUi = document.getElementById('call-ui');
  callUi.classList.remove('hidden');
  setCallStatus('Initialisation...');
  document.getElementById('call-label').textContent = `Appel ${callType==='video'?'vidéo':'vocal'} avec ${fu?fu.username:'...'}`;

  const camBtn = document.getElementById('call-cam-btn');
  if(callType === 'video') camBtn.classList.remove('hidden');
  else camBtn.classList.add('hidden');

  const micBtn = document.getElementById('call-mic-btn');
  if(micBtn){ micBtn.classList.remove('off'); micBtn.textContent='🎤'; }
  const scrBtn = document.getElementById('call-screen-btn');
  if(scrBtn){ scrBtn.classList.remove('off'); scrBtn.textContent='🖥️'; }

  buildCallTiles(fu, callType);

  try {
    const constraints = {
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: callType === 'video'
        ? { width:{ ideal:1280 }, height:{ ideal:720 }, facingMode:'user' }
        : false
    };
    WR.localStream = await navigator.mediaDevices.getUserMedia(constraints);
    setCallStatus('Micro actif ✓');

    if(callType === 'video'){
      WR.camOff = false;
      const lv = document.getElementById('local-video');
      const la = document.getElementById('local-avatar');
      if(lv){ lv.srcObject = WR.localStream; lv.style.display='block'; }
      if(la) la.style.display='none';
      if(camBtn){ camBtn.classList.remove('off'); camBtn.textContent='📷'; }
    }
  } catch(e){
    try {
      WR.localStream = await navigator.mediaDevices.getUserMedia({
        audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true },
        video: false
      });
      WR.camOff = true;
      setCallStatus('Audio only (caméra indisponible)');
      if(callType==='video'){
        showToast('Caméra indisponible','Appel en mode audio uniquement.','#f97316','⚠️');
        if(camBtn) camBtn.classList.add('hidden');
      }
    } catch(e2){
      if(e.name==='NotAllowedError'||e2.name==='NotAllowedError'){
        showToast('Permission refusée','Autorise le micro dans ton navigateur pour appeler.','#ef4444','🎤');
      } else {
        showToast('Erreur','Impossible d\'accéder au micro.','#ef4444','!');
      }
      endCall(); return;
    }
  }

  if(callType !== 'video'){
    const lv = document.getElementById('local-video');
    if(lv) lv.style.display = 'none';
  }

  WR.pc = new RTCPeerConnection(ICE_SERVERS);
  WR.localStream.getTracks().forEach(track => WR.pc.addTrack(track, WR.localStream));

  if(callType === 'voice'){
    WR.blackTrack = createBlackTrack();
  }

  try { WR.silenceTrack = createSilenceTrack(); } catch(e){ console.warn('AudioContext non dispo:', e); }

  WR.pc.ontrack = e => {
    setCallStatus('Connecté ✓');
    attachRemoteStream(e.streams[0], e.track.kind);
    if(!S.callTimer){
      S.callTimer = setInterval(()=>{
        S.callSec++;
        document.getElementById('call-timer').textContent = formatTime(S.callSec);
      }, 1000);
    }
  };

  WR.pc.onicecandidate = e => {
    if(!e.candidate) return;
    const cid = uid();
    const targetPath = isCaller
      ? `calls/${remoteUserId}/iceCandidatesFromCaller/${cid}`
      : `calls/${remoteUserId}/iceCandidatesFromCallee/${cid}`;
    dbSet(targetPath, { candidate: JSON.stringify(e.candidate), id: cid, ts: Date.now() });
  };

  WR.pc.oniceconnectionstatechange = () => {
    const st = WR.pc ? WR.pc.iceConnectionState : '';
    if(st === 'connected' || st === 'completed') setCallStatus('Connecté ✓');
    else if(st === 'checking') setCallStatus('Connexion en cours...');
    else if(st === 'failed'){ setCallStatus('Connexion échouée ✗'); showToast('Connexion échouée','Vérifie ta connexion et réessaie.','#ef4444','!'); }
    else if(st === 'disconnected') setCallStatus('Déconnecté...');
  };

  WR.pc.onconnectionstatechange = () => {
    if(WR.pc && WR.pc.connectionState === 'failed') setCallStatus('Connexion échouée ✗');
  };

  if(isCaller){
    try {
      const offer = await WR.pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
      await WR.pc.setLocalDescription(offer);
      setCallStatus('Sonnerie...');

      const callId = WR.callId || uid();
      WR.callId = callId;

      await dbSet('calls/'+remoteUserId+'/incoming', {
        callId, from: S.me, type: callType,
        offer: JSON.stringify(offer)
      });

      const answerRef = dbRef('calls/'+S.me+'/answer/'+callId);
      const unsubAnswer = onValue(answerRef, async snap => {
        if(!snap.exists()) return;
        const val = snap.val();
        off(answerRef, unsubAnswer);

        if(val.declined){
          showToast('Appel refusé', (fu?fu.username:'L\'autre')+' a refusé l\'appel.', '#ef4444', '✕');
          endCall(); return;
        }
        if(val.answer && WR.pc){
          try {
            const answer = JSON.parse(val.answer);
            await WR.pc.setRemoteDescription(new RTCSessionDescription(answer));
            listenIceCandidates('callee');
          } catch(e){ console.error('setRemoteDescription error:', e); }
        }
      });
      WR.signalingUnsub = () => { off(answerRef, unsubAnswer); };

    } catch(e){
      showToast('Erreur','Impossible de créer l\'appel.','#ef4444','!');
      endCall();
    }

  } else {
    try {
      const offer = JSON.parse(remoteOffer);
      await WR.pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await WR.pc.createAnswer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
      await WR.pc.setLocalDescription(answer);
      await dbSet('calls/'+WR.remoteUserId+'/answer/'+WR.callId, { answer: JSON.stringify(answer) });
      listenIceCandidates('caller');
    } catch(e){
      showToast('Erreur','Impossible de répondre à l\'appel.','#ef4444','!');
      endCall();
    }
  }
}

function listenIceCandidates(role){
  const path = role === 'caller'
    ? `calls/${S.me}/iceCandidatesFromCaller`
    : `calls/${S.me}/iceCandidatesFromCallee`;

  const r = dbRef(path);
  const listener = onValue(r, snap => {
    if(!snap.exists() || !WR.pc) return;
    Object.values(snap.val()||{}).forEach(async data => {
      if(!data.candidate) return;
      const cid = data.id || String(data.ts);
      if(WR.iceCandidatesReceived.has(cid)) return;
      WR.iceCandidatesReceived.add(cid);
      try { await WR.pc.addIceCandidate(new RTCIceCandidate(JSON.parse(data.candidate))); }
      catch(e){ console.warn('addIceCandidate:', e); }
    });
  });
  WR.iceUnsub = () => { off(r, listener); };
}

function buildCallTiles(fu, callType){
  const vids = document.getElementById('call-videos');
  const me = S.users[S.me];
  vids.className = 'call-videos grid-2';

  const localAvatarHtml = me && me.avatarImg
    ? `<img src="${me.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
    : initials(me?me.username:'');
  const remoteAvatarHtml = fu && fu.avatarImg
    ? `<img src="${fu.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
    : initials(fu?fu.username:'');

  vids.innerHTML = `
    <div class="call-video-tile speaking" id="local-tile">
      <div class="tile-avatar" id="local-avatar" style="background:${me?me.color||avatarColor(me.username):'var(--grad)'}">${localAvatarHtml}</div>
      <video id="local-video" autoplay muted playsinline style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;"></video>
      <div class="tile-name">${me?me.username:'Moi'} (moi)</div>
    </div>
    <div class="call-video-tile" id="remote-tile">
      <div class="tile-avatar" id="remote-avatar" style="background:${fu?fu.color||avatarColor(fu.username):'var(--bg4)'}">${remoteAvatarHtml}</div>
      <video id="remote-video" autoplay playsinline style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;"></video>
      <div class="tile-name">${fu?fu.username:'Correspondant'}</div>
      <div id="remote-status" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text2);">📞 Sonnerie...</div>
    </div>`;
}

function attachRemoteStream(stream, kind){
  const rv = document.getElementById('remote-video');
  const ra = document.getElementById('remote-avatar');
  const rs = document.getElementById('remote-status');
  if(!rv) return;
  if(!rv.srcObject) rv.srcObject = stream;
  if(rs) rs.remove();
  const remoteTile = document.getElementById('remote-tile');
  if(remoteTile) remoteTile.classList.add('speaking');
  if(kind === 'video'){
    rv.style.display = 'block';
    if(ra) ra.style.display = 'none';
  }
}

function setCallStatus(msg){
  const el = document.getElementById('call-status-bar');
  if(el) el.textContent = msg;
}

async function startCall(userId, callType){
  if(S.inCall){
    showToast('Déjà en appel','Termine l\'appel en cours avant d\'en commencer un nouveau.','#ef4444','!');
    return;
  }
  const fu = S.users[userId];
  if(!fu){ showToast('Erreur','Utilisateur introuvable.','#ef4444','!'); return; }

  try {
    const testStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    testStream.getTracks().forEach(t=>t.stop());
  } catch(e){
    showToast('Permission micro requise','Autorise le micro dans ton navigateur pour passer des appels.','#ef4444','🎤');
    return;
  }

  WR.isCaller = true;
  WR.remoteUserId = userId;
  WR.callId = uid();
  WR.callType = callType || 'voice';
  WR.iceCandidatesReceived.clear();
  await initWebRTCCall(true, null);
}

async function startVideoCall(userId){ await startCall(userId, 'video'); }

function joinVoiceChannel(chId){
  const ch = S.channels[chId]; if(!ch) return;
  if(S.inCall){ showToast('Déjà en appel','Quitte l\'appel en cours d\'abord.','#ef4444','!'); return; }

  S.inCall = true; S.callSec = 0;
  WR.micMuted = false; WR.camOff = true; WR.screenSharing = false;

  const callUi = document.getElementById('call-ui');
  callUi.classList.remove('hidden');
  document.getElementById('call-label').textContent = `Vocal — #${ch.name}`;
  document.getElementById('call-cam-btn').classList.add('hidden');
  setCallStatus('Salon vocal — En attente d\'autres membres');

  const micBtn = document.getElementById('call-mic-btn');
  if(micBtn){ micBtn.classList.remove('off'); micBtn.textContent='🎤'; }

  const me = S.users[S.me];
  const localAvatarHtml = me && me.avatarImg
    ? `<img src="${me.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
    : initials(me?me.username:'');

  const vids = document.getElementById('call-videos');
  vids.className = 'call-videos grid-1';
  vids.innerHTML = `<div class="call-video-tile speaking" id="local-tile">
    <div class="tile-avatar" id="local-avatar" style="background:${me?me.color||avatarColor(me.username):'var(--grad)'}">${localAvatarHtml}</div>
    <video id="local-video" autoplay muted playsinline style="display:none;"></video>
    <div class="tile-name">${me?me.username:'Moi'} (moi)</div>
  </div>`;

  navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true },
    video: false
  }).then(stream => {
    WR.localStream = stream;
    const lv = document.getElementById('local-video');
    if(lv){ lv.srcObject = stream; }
    try { WR.silenceTrack = createSilenceTrack(); } catch(e){}
    setCallStatus('Micro actif dans le salon ✓');
  }).catch(e => {
    if(e.name==='NotAllowedError') showToast('Permission refusée','Autorise le micro dans ton navigateur.','#ef4444','🎤');
    else showToast('Micro indisponible','Aucun micro détecté.','#ef4444','!');
    setCallStatus('Micro indisponible');
  });

  S.callTimer = setInterval(()=>{
    S.callSec++;
    document.getElementById('call-timer').textContent = formatTime(S.callSec);
  }, 1000);
}

function endCall(){
  stopRingTone();
  if(WR.localStream){ WR.localStream.getTracks().forEach(t => t.stop()); WR.localStream = null; }
  if(WR.screenStream){ WR.screenStream.getTracks().forEach(t => t.stop()); WR.screenStream = null; }
  if(WR.silenceTrack){ WR.silenceTrack.stop(); WR.silenceTrack = null; }
  if(WR.blackTrack){ WR.blackTrack.stop(); WR.blackTrack = null; }
  if(WR.pc){ WR.pc.close(); WR.pc = null; }
  if(WR.signalingUnsub){ WR.signalingUnsub(); WR.signalingUnsub = null; }
  if(WR.iceUnsub){ WR.iceUnsub(); WR.iceUnsub = null; }

  if(WR.callId && WR.remoteUserId){
    const rid = WR.remoteUserId; const cid = WR.callId;
    dbRemove('calls/'+rid+'/incoming').catch(()=>{});
    dbRemove('calls/'+S.me+'/answer/'+cid).catch(()=>{});
    dbRemove('calls/'+S.me+'/iceCandidatesFromCaller').catch(()=>{});
    dbRemove('calls/'+S.me+'/iceCandidatesFromCallee').catch(()=>{});
    dbRemove('calls/'+rid+'/iceCandidatesFromCaller').catch(()=>{});
    dbRemove('calls/'+rid+'/iceCandidatesFromCallee').catch(()=>{});
  }

  WR.callId = null; WR.remoteUserId = null; WR.isCaller = false;
  WR.micMuted = false; WR.camOff = true; WR.screenSharing = false;
  WR.iceCandidatesReceived.clear();

  clearInterval(S.callTimer); S.callTimer = null;
  S.inCall = false; S.callSec = 0;

  document.getElementById('call-ui').classList.add('hidden');
  document.getElementById('call-timer').textContent = '00:00';
  const micBtn = document.getElementById('call-mic-btn');
  if(micBtn){ micBtn.classList.remove('off'); micBtn.textContent='🎤'; }
  const camBtn = document.getElementById('call-cam-btn');
  if(camBtn){ camBtn.classList.remove('off'); camBtn.textContent='📷'; camBtn.classList.add('hidden'); }
  const scrBtn = document.getElementById('call-screen-btn');
  if(scrBtn){ scrBtn.classList.remove('off'); scrBtn.textContent='🖥️'; }
  setCallStatus('');
}

// ==================== CONTRÔLES APPEL ====================
async function toggleCallMic(btn){
  if(!WR.localStream) return;
  WR.micMuted = !WR.micMuted;
  const audioTracks = WR.localStream.getAudioTracks();
  if(audioTracks.length === 0) return;
  const realAudioTrack = audioTracks[0];

  if(WR.micMuted){
    if(WR.silenceTrack){ await replaceTrackInPC(WR.silenceTrack, 'audio'); }
    else { realAudioTrack.enabled = false; }
    btn.classList.add('off'); btn.textContent = '🔇';
    const tile = document.getElementById('local-tile');
    if(tile && !tile.querySelector('.mute-badge')){
      const badge = document.createElement('div');
      badge.className = 'mute-badge'; badge.textContent = '🔇 Muet';
      tile.appendChild(badge);
    }
  } else {
    realAudioTrack.enabled = true;
    await replaceTrackInPC(realAudioTrack, 'audio');
    btn.classList.remove('off'); btn.textContent = '🎤';
    const badge = document.querySelector('#local-tile .mute-badge');
    if(badge) badge.remove();
  }
}

async function toggleCallCam(btn){
  if(!WR.localStream) return;
  WR.camOff = !WR.camOff;

  if(WR.camOff){
    if(!WR.blackTrack || WR.blackTrack.readyState === 'ended') WR.blackTrack = createBlackTrack();
    await replaceTrackInPC(WR.blackTrack, 'video');
    btn.classList.add('off'); btn.textContent = '📵';
    const lv = document.getElementById('local-video');
    const la = document.getElementById('local-avatar');
    if(lv) lv.style.display = 'none';
    if(la) la.style.display = 'flex';
  } else {
    let videoTrack = WR.localStream.getVideoTracks()[0];
    if(!videoTrack || videoTrack.readyState === 'ended'){
      try {
        const camStream = await navigator.mediaDevices.getUserMedia({
          video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' }, audio: false
        });
        videoTrack = camStream.getVideoTracks()[0];
        WR.localStream.addTrack(videoTrack);
      } catch(e){
        WR.camOff = true;
        showToast('Caméra indisponible','Vérifie les permissions caméra.','#ef4444','📵');
        return;
      }
    } else { videoTrack.enabled = true; }

    await replaceTrackInPC(videoTrack, 'video');
    btn.classList.remove('off'); btn.textContent = '📷';
    const lv = document.getElementById('local-video');
    const la = document.getElementById('local-avatar');
    if(lv){ lv.srcObject = WR.localStream; lv.style.display = 'block'; }
    if(la) la.style.display = 'none';
  }
}

async function toggleScreenShare(btn){
  if(WR.screenSharing){
    if(WR.screenStream){ WR.screenStream.getTracks().forEach(t => t.stop()); WR.screenStream = null; }
    WR.screenSharing = false;
    btn.classList.remove('off'); btn.textContent = '🖥️';
    if(WR.callType === 'video' && !WR.camOff){
      const videoTrack = WR.localStream ? WR.localStream.getVideoTracks()[0] : null;
      if(videoTrack && videoTrack.readyState !== 'ended'){
        await replaceTrackInPC(videoTrack, 'video');
        const lv = document.getElementById('local-video');
        if(lv){ lv.srcObject = WR.localStream; }
      }
    } else {
      if(!WR.blackTrack || WR.blackTrack.readyState === 'ended') WR.blackTrack = createBlackTrack();
      await replaceTrackInPC(WR.blackTrack, 'video');
      const lv = document.getElementById('local-video');
      const la = document.getElementById('local-avatar');
      if(lv) lv.style.display = 'none';
      if(la) la.style.display = 'flex';
    }
    setCallStatus('Partage d\'écran arrêté');
    return;
  }

  try {
    WR.screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });
    WR.screenSharing = true;
    btn.classList.add('off'); btn.textContent = '⏹️';
    const screenTrack = WR.screenStream.getVideoTracks()[0];
    screenTrack.onended = () => { if(WR.screenSharing) toggleScreenShare(btn); };

    const videoSender = WR.pc ? WR.pc.getSenders().find(s => s.track && s.track.kind === 'video') : null;
    if(videoSender){ await videoSender.replaceTrack(screenTrack); }
    else if(WR.pc && WR.localStream){
      WR.pc.addTrack(screenTrack, WR.screenStream);
      try {
        const offer = await WR.pc.createOffer();
        await WR.pc.setLocalDescription(offer);
        await dbSet('calls/'+WR.remoteUserId+'/renegotiate', { from: S.me, offer: JSON.stringify(offer), id: uid() });
      } catch(e){ console.warn('Renegociation:', e); }
    }

    const lv = document.getElementById('local-video');
    const la = document.getElementById('local-avatar');
    if(lv){ lv.srcObject = WR.screenStream; lv.style.display = 'block'; }
    if(la) la.style.display = 'none';
    setCallStatus('Partage d\'écran actif 🖥️');

  } catch(e){
    WR.screenSharing = false;
    if(e.name !== 'NotAllowedError') showToast('Erreur','Impossible de partager l\'écran.','#ef4444','!');
    setCallStatus('Partage d\'écran annulé');
  }
}

// ==================== AVATAR UPLOAD ====================
function triggerAvatarUpload(callback){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    // Max 2MB check
    if(file.size > 2 * 1024 * 1024){
      showToast('Image trop lourde','Max 2 Mo autorisé.','#ef4444','!');
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => callback(ev.target.result);
    reader.readAsDataURL(file);
  };
  input.click();
}

async function uploadMyAvatar(){
  triggerAvatarUpload(async dataUrl => {
    await dbUpdate('users/'+S.me, { avatarImg: dataUrl });
    S.users[S.me].avatarImg = dataUrl;
    renderUserBar();
    // Refresh profile modal if open
    const modal = document.querySelector('.modal-overlay');
    if(modal) openModal('my-profile');
    showToast('Photo mise à jour','Ta photo de profil a été changée ! 🎉','var(--green)','✓');
  });
}

async function removeMyAvatar(){
  await dbUpdate('users/'+S.me, { avatarImg: null });
  S.users[S.me].avatarImg = null;
  renderUserBar();
  const modal = document.querySelector('.modal-overlay');
  if(modal) openModal('my-profile');
  showToast('Photo supprimée','Tu utilises de nouveau ton avatar coloré.','var(--text2)','✓');
}

  }

function renderServersBar(){
  const u=S.users[S.me]; if(!u)return;
  const list=document.getElementById('srv-list'); list.innerHTML='';
  const userSrvIds=Object.keys(S.servers).filter(sid=>{ const srv=S.servers[sid]; return srv&&srv.members&&(srv.members[S.me]||srv.owner===S.me); });
  userSrvIds.forEach(sid=>{
    const srv=S.servers[sid]; if(!srv)return;
    const btn=document.createElement('div');
    btn.className='srv-btn tooltip'+(S.activeServer===sid?' active':'');
    btn.dataset.tip=srv.name;
    btn.style.background=S.activeServer===sid?srv.color||AVATAR_COLORS[0]:'';
    btn.onclick=()=>showServer(sid);
    btn.innerHTML=srv.icon||initials(srv.name);
    list.appendChild(btn);
  });
}

// ==================== VIEWS ====================
function showView(view){
  S.view=view; S.activeServer=null; S.activeChannel=null; S.activeDm=null;
  document.getElementById('right-panel').classList.add('hidden');
  if(view==='home') renderHomeView();
  else if(view==='friends') renderFriendsView();
  else if(view==='nitro') renderNitroView();
  renderLeftPanel('dm');
  document.querySelectorAll('.srv-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('srv-home').classList.add('active');
}

function showServer(sid){
  S.activeServer=sid; S.view='server'; S.activeDm=null;
  const chs=Object.values(S.channels).filter(c=>c.server===sid).sort((a,b)=>a.position-b.position);
  const firstText=chs.find(c=>c.type==='text');
  if(firstText) showChannel(firstText.id);
  renderLeftPanel('server',sid); renderServersBar();
}

function showChannel(chId){
  S.activeChannel=chId; S.activeDm=null;
  const ch=S.channels[chId]; if(!ch)return;
  if(ch.type==='voice'){ joinVoiceChannel(chId); return; }
  listenChannel(chId); renderChannel(chId);
  renderLeftPanel('server',S.activeServer);
  document.getElementById('right-panel').classList.remove('hidden');
  renderRightPanel();
}

function openDm(userId){
  S.activeDm=userId; S.view='dm'; S.activeServer=null; S.activeChannel=null;
  if(S.dmUnread[userId]){ delete S.dmUnread[userId]; renderLeftPanel('dm'); }
  renderDm(userId); renderLeftPanel('dm');
  document.getElementById('right-panel').classList.add('hidden');
}

// ==================== LEFT PANEL ====================
function renderLeftPanel(type, serverId){
  const lp=document.getElementById('lp-content');
  if(type==='server'){
    const srv=S.servers[serverId]; if(!srv)return;
    document.getElementById('lp-title').textContent=srv.name;
    const chs=Object.values(S.channels).filter(c=>c.server===serverId).sort((a,b)=>a.position-b.position);
    const textChs=chs.filter(c=>c.type==='text');
    const voiceChs=chs.filter(c=>c.type==='voice');
    let html=`<div class="ch-list"><div class="ch-section">`;
    html+=`<div class="ch-section-hdr"><span>📝 TEXTE (${textChs.length})</span><span onclick="openModal('add-channel','${serverId}')" style="cursor:pointer;font-size:16px;color:var(--text2)">+</span></div>`;
    textChs.forEach(ch=>{
      html+=`<div class="ch-item${S.activeChannel===ch.id?' active':''}" onclick="showChannel('${ch.id}')" oncontextmenu="chCtxMenu(event,'${ch.id}')"><span class="ch-icon">#</span><span>${ch.name}</span></div>`;
    });
    html+=`</div>`;
    if(voiceChs.length>0){
      html+=`<div class="ch-section"><div class="ch-section-hdr"><span>🔊 VOCAL (${voiceChs.length})</span></div>`;
      voiceChs.forEach(ch=>{
        html+=`<div class="ch-item${S.activeChannel===ch.id?' active':''}" onclick="showChannel('${ch.id}')"><span class="ch-icon">🔊</span><span>${ch.name}</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`; lp.innerHTML=html;
  } else {
    document.getElementById('lp-title').textContent='Messages Directs';
    let html=`<div class="dm-list">`;
    html+=`<div class="ch-item" onclick="showView('friends')" style="margin:4px 8px;"><span>👥</span><span>Amis</span></div>`;
    html+=`<div class="ch-item" onclick="showView('nitro')" style="margin:4px 8px;"><span>💎</span><span style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Nitro Gratuit</span></div>`;
    html+=`<div class="ch-section-hdr" style="padding:8px 16px 4px;">MESSAGES DIRECTS</div>`;
    const friends=Object.keys(S.friends[S.me]||{});
    friends.forEach(fid=>{
      const fu=S.users[fid]; if(!fu)return;
      const dmKey=getDmKey(S.me,fid);
      const msgs=S.dms[dmKey]?Object.values(S.dms[dmKey]).sort((a,b)=>a.ts-b.ts):[];
      const last=msgs[msgs.length-1];
      const unread=S.dmUnread[fid]||0;
      const avHtml = fu.avatarImg
        ? `<img src="${fu.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt=""/>`
        : initials(fu.username);
      const avBg = fu.avatarImg ? 'transparent' : fu.color||avatarColor(fu.username);
      html+=`<div class="dm-item${S.activeDm===fid?' active':''}" onclick="openDm('${fid}')" oncontextmenu="userCtxMenu(event,'${fid}')">
        <div class="dm-avatar" style="background:${avBg}">${avHtml}<div class="status-dot ${fu.status||'online'}" style="border-color:var(--bg2)"></div></div>
        <div class="dm-info">
          <div class="dm-name">${fu.username}</div>
          <div class="dm-preview">${last?escHtml(last.content.slice(0,30)):'Commencer une discussion'}</div>
        </div>
        ${unread>0?`<span class="dm-unread">${unread}</span>`:''}
      </div>`;
    });
    if(friends.length===0){
      html+=`<div style="padding:20px 16px;text-align:center;color:var(--text3);font-size:13px;"><div style="font-size:32px;margin-bottom:8px;">👥</div><div>Ajoute des amis pour discuter !</div><button onclick="showView('friends')" style="margin-top:10px;padding:6px 14px;background:var(--grad);border-radius:8px;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;">Trouver des amis</button></div>`;
    }
    html+=`</div>`; lp.innerHTML=html;
  }
}

function filterFriends(filter, btn){
  if(btn){ document.querySelectorAll('.friends-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); }
  const container=document.getElementById('friends-list'); if(!container)return;
  if(filter==='add'){
    container.innerHTML=`<div class="add-friend-area"><h3>Ajouter un ami</h3><p>Entre le pseudo exact de ton ami.</p>
      <div class="add-friend-input-row">
        <input type="text" id="add-friend-input" placeholder="Nom d'utilisateur..." onkeydown="if(event.key==='Enter')sendFriendRequest()"/>
        <button onclick="sendFriendRequest()">Envoyer</button>
      </div>
      <div id="add-friend-msg" style="margin-top:8px;font-size:13px;"></div></div>`;
    return;
  }
  const myFriends=Object.keys(S.friends[S.me]||{});
  const myPendingIn=Object.keys(S.pendingIn[S.me]||{});
  const myPendingOut=Object.keys(S.pendingOut[S.me]||{});
  let html='';

        const avHtml = fu.avatarImg ? `<img src="${fu.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>` : initials(fu.username);

async function sendFriendRequest(){
  const input=document.getElementById('add-friend-input');
  const msg=document.getElementById('add-friend-msg');
  const name=(input.value.trim()).toLowerCase();
  const RED='#ef4444';
  if(!name){msg.style.color=RED;msg.textContent='Entre un nom d\'utilisateur.';return;}
  if(name===S.me){msg.style.color=RED;msg.textContent='Tu ne peux pas t\'ajouter toi-même !';return;}
  msg.style.color='var(--text2)';msg.textContent='Recherche...';
  const allUsers=await dbGet('users')||{}; S.users=allUsers;
  const found=Object.keys(allUsers).find(k=>k===name||allUsers[k].username.toLowerCase()===name);
  if(!found){msg.style.color=RED;msg.textContent='Utilisateur introuvable. Vérifie le pseudo.';return;}
  if(found===S.me){msg.style.color=RED;msg.textContent='C\'est toi !';return;}
  if(S.friends[S.me]&&S.friends[S.me][found]){msg.style.color=RED;msg.textContent='Vous êtes déjà amis !';return;}
  if(S.pendingOut[S.me]&&S.pendingOut[S.me][found]){msg.style.color=RED;msg.textContent='Demande déjà envoyée.';return;}
  if(S.pendingIn[S.me]&&S.pendingIn[S.me][found]){await acceptFriend(found);return;}
  await dbUpdate('pendingOut/'+S.me,{[found]:true});
  await dbUpdate('pendingIn/'+found,{[S.me]:true});
  S.pendingOut[S.me]=S.pendingOut[S.me]||{}; S.pendingOut[S.me][found]=true;
  msg.style.color='#22c55e';
  msg.textContent='✓ Demande envoyée à '+allUsers[found].username+' !';
  input.value='';
  const fu=allUsers[found];
  showToast('Demande envoyée','Demande envoyée à '+fu.username,fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);
}

async function acceptFriend(fid){
  await dbUpdate('friends/'+S.me,{[fid]:true});
  await dbUpdate('friends/'+fid,{[S.me]:true});
  await dbRemove('pendingIn/'+S.me+'/'+fid);
  await dbRemove('pendingOut/'+fid+'/'+S.me);
  S.friends[S.me]=S.friends[S.me]||{}; S.friends[S.me][fid]=true;
  const fu=S.users[fid];
  if(fu) showToast('Nouvel ami !',fu.username+' est maintenant ton ami !',fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);
  renderFriendsView(); renderLeftPanel('dm');
}

async function rejectFriend(fid){
  await dbRemove('pendingIn/'+S.me+'/'+fid);
  await dbRemove('pendingOut/'+fid+'/'+S.me);
  if(S.pendingIn[S.me]) delete S.pendingIn[S.me][fid];
  renderFriendsView();
}

async function cancelFriendRequest(fid){
  await dbRemove('pendingOut/'+S.me+'/'+fid);
  await dbRemove('pendingIn/'+fid+'/'+S.me);
  if(S.pendingOut[S.me]) delete S.pendingOut[S.me][fid];
  renderFriendsView();
}

async function removeFriend(fid){
  await dbRemove('friends/'+S.me+'/'+fid);
  await dbRemove('friends/'+fid+'/'+S.me);
  if(S.friends[S.me]) delete S.friends[S.me][fid];
  renderFriendsView(); renderLeftPanel('dm'); closeCtxMenu();
}

async function quickAddFriend(userId){
  if(!S.users[userId])return;
  if(S.friends[S.me]&&S.friends[S.me][userId]){showToast('Déjà amis !','Vous êtes déjà amis.',avatarColor(S.users[userId].username),initials(S.users[userId].username));return;}
  if(S.pendingIn[S.me]&&S.pendingIn[S.me][userId]){await acceptFriend(userId);return;}
  if(S.pendingOut[S.me]&&S.pendingOut[S.me][userId]){showToast('Déjà envoyée','En attente de réponse.',avatarColor(S.users[userId].username),initials(S.users[userId].username));return;}
  await dbUpdate('pendingOut/'+S.me,{[userId]:true});
  await dbUpdate('pendingIn/'+userId,{[S.me]:true});
  S.pendingOut[S.me]=S.pendingOut[S.me]||{}; S.pendingOut[S.me][userId]=true;
  const fu=S.users[userId];
  showToast('Demande envoyée','Envoyée à '+fu.username,fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);
  closeCtxMenu(); renderRightPanel();
}

function buildMsgHtml(msgs, type, contextId){
  if(!msgs||!msgs.length) return`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px;text-align:center;min-height:200px;"><div><div style="font-size:48px;margin-bottom:12px;">${type==='channel'?'#':'💬'}</div><div style="font-size:18px;font-weight:700;">Aucun message pour l'instant</div><div style="color:var(--text2);margin-top:4px;">Sois le premier à écrire quelque chose !</div></div></div>`;
  let html=''; let lastAuthor=''; let lastTs=0;
  msgs.forEach(msg=>{
    const isContinue=msg.author===lastAuthor&&msg.ts-lastTs<300000;
    const u=msg.authorId?S.users[msg.authorId]:null;
    const aColor=u?u.color||avatarColor(u.username):msg.avatar||avatarColor(msg.author||'');
    if(!isContinue){
      const avBg = u && u.avatarImg ? 'transparent' : aColor;
      const avContent = u && u.avatarImg
        ? `<img src="${u.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt=""/>`
        : initials(msg.author);
      html+=`<div class="msg-group" oncontextmenu="msgCtxMenu(event,'${msg.id}','${type}','${contextId}')">
        <div class="msg-avatar" style="background:${avBg}">${avContent}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author" style="${u&&u.nameColor?`background:${u.nameColor};-webkit-background-clip:text;-webkit-text-fill-color:transparent`:''}">${escHtml(msg.author)}</span>
            ${msg.badge==='nitro'?'<span class="msg-badge nitro">NITRO</span>':msg.badge==='mod'?'<span class="msg-badge mod">MOD</span>':''}
            <span class="msg-time">${timeAgo(msg.ts)}</span>
          </div>
          <div class="msg-text">${formatMsg(msg.content)}</div>
        </div>
      </div>`;
    } else {
      html+=`<div class="msg-continue" oncontextmenu="msgCtxMenu(event,'${msg.id}','${type}','${contextId}')">
        <div class="msg-text">${formatMsg(msg.content)}</div>
      </div>`;
    }
    lastAuthor=msg.author; lastTs=msg.ts;
  });
  return html;
}

function scrollToBottom(id){ setTimeout(()=>{const el=document.getElementById(id);if(el)el.scrollTop=el.scrollHeight;},80); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }
function handleMsgKey(e,id,type){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(id,type);} }

async function sendMessage(id, type){
  const inp=document.getElementById('msg-input-'+id); if(!inp)return;
  const content=inp.value.trim(); if(!content)return;
  const u=S.users[S.me];
  const msg={id:uid(),author:u.username,authorId:S.me,content,ts:Date.now(),reactions:{}};
  if(u.nitro) msg.badge='nitro';
  inp.value=''; inp.style.height='auto';
  if(type==='channel'){
    await dbSet('messages/'+id+'/'+msg.id, msg);
  } else {
    const userId=id.replace('dm_','');
    const dmKey=getDmKey(S.me,userId);
    await dbSet('dms/'+dmKey+'/'+msg.id, msg);
  }
}

async function deleteMsg(msgId, type, contextId){
  if(type==='channel') await dbRemove('messages/'+contextId+'/'+msgId);
  else { const dmKey=getDmKey(S.me,contextId); await dbRemove('dms/'+dmKey+'/'+msgId); }
  closeCtxMenu();
}

let _channelListener=null;
let _channelListenerId=null;
function listenChannel(chId){
  if(_channelListener && _channelListenerId){ off(_channelListener); _channelListener=null; _channelListenerId=null; }
  _channelListenerId=chId;
  _channelListener=dbRef('messages/'+chId);
  onValue(_channelListener, snap=>{
    const val=snap.val()||{};
    S.messages[chId]=val;
    if(S.activeChannel===chId) renderChannel(chId);
  });
}

// ==================== RIGHT PANEL ====================
function toggleRightPanel(){
  const rp=document.getElementById('right-panel');
  rp.classList.toggle('hidden');
  if(!rp.classList.contains('hidden')) renderRightPanel();
}

function renderRightPanel(){
  const rp=document.getElementById('right-panel');
  if(rp.classList.contains('hidden')) return;
  let memberIds=[];
  if(S.activeServer){ const srv=S.servers[S.activeServer]; memberIds=srv?Object.keys(srv.members||{}):[S.me]; }
  else memberIds=Object.keys(S.users);
  if(!memberIds.includes(S.me)) memberIds=[S.me,...memberIds];
  const myFriends=S.friends[S.me]||{};
  const myPendingOut=S.pendingOut[S.me]||{};
  const online=memberIds.filter(id=>{const u=S.users[id];return u&&u.status!=='offline';});
  const offline=memberIds.filter(id=>{const u=S.users[id];return u&&(!u.status||u.status==='offline');});
  let html='';
  if(online.length>0){
    html+=`<div class="rp-section"><div class="rp-title">EN LIGNE — ${online.length}</div>`;
    online.forEach(id=>{
      const u=S.users[id]; if(!u)return;
      const isMe=id===S.me; const isFriend=myFriends[id]; const isPendingOut=myPendingOut[id];
      const avBg = u.avatarImg ? 'transparent' : u.color||avatarColor(u.username);
      const avContent = u.avatarImg ? `<img src="${u.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt=""/>` : initials(u.username);
      html+=`<div class="member-item" onclick="openModal('view-profile','${id}')" oncontextmenu="userCtxMenu(event,'${id}')">
        <div class="member-avatar" style="background:${avBg}">${avContent}<div class="status-dot ${u.status||'online'}"></div></div>
        <div class="member-info"><div class="member-name">${u.username}${isMe?' (moi)':''}</div><div class="member-status">${STATUS_LABELS[u.status||'online']}</div></div>
        ${!isMe&&!isFriend&&!isPendingOut?`<div title="Ajouter" onclick="event.stopPropagation();quickAddFriend('${id}')" style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(124,92,252,.2);color:var(--accent1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;">+</div>`:''}
        ${!isMe&&isFriend?`<div onclick="event.stopPropagation();openDm('${id}')" style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(34,197,94,.15);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">💬</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }
  if(offline.length>0){
    html+=`<div class="rp-section"><div class="rp-title">HORS LIGNE — ${offline.length}</div>`;
    offline.forEach(id=>{
      const u=S.users[id]; if(!u)return;
      const avBg = u.avatarImg ? 'transparent' : u.color||avatarColor(u.username);
      const avContent = u.avatarImg ? `<img src="${u.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt=""/>` : initials(u.username);
      html+=`<div class="member-item" style="opacity:.5" onclick="openModal('view-profile','${id}')">
        <div class="member-avatar" style="background:${avBg}">${avContent}<div class="status-dot offline"></div></div>
        <div class="member-info"><div class="member-name">${u.username}</div><div class="member-status">Hors ligne</div></div>
      </div>`;
    });
    html+=`</div>`;
  }
  rp.innerHTML=html||`<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;"><div style="font-size:32px;margin-bottom:8px;">👥</div>Aucun membre</div>`;
}

function toggleEmojiPicker(channelId){
