function filterEmojis(q,chId){
  const grid=document.querySelector('.emoji-grid');
  const filtered=q?EMOJIS.filter(e=>e.includes(q)):EMOJIS;
  if(grid) grid.innerHTML=filtered.map(e=>`<div class="emoji-btn" onclick="insertEmoji('${e}','${chId}')">${e}</div>`).join('');
}
function insertEmoji(emoji,chId){
  const inp=document.getElementById('msg-input-'+chId);
  if(inp){inp.value+=emoji;inp.focus();}
  document.getElementById('emoji-picker').classList.add('hidden');
}

// ==================== CONTEXT MENUS ====================
function msgCtxMenu(e,msgId,type,contextId){
  e.preventDefault(); e.stopPropagation();
  const rawMsgs=type==='channel'?S.messages[contextId]:S.dms[getDmKey(S.me,contextId)];
  const msgs=rawMsgs?Object.values(rawMsgs):[];
  const msg=msgs.find(m=>m.id===msgId);
  const isOwner=msg&&msg.authorId===S.me;
  showCtxMenu(e.clientX,e.clientY,[
    {label:'📋 Copier',fn:`copyText(${JSON.stringify(msg?msg.content:'')})`},
    ...(isOwner?[{sep:true},{label:'🗑️ Supprimer',fn:`deleteMsg('${msgId}','${type}','${contextId}')`,danger:true}]:[]),
  ]);
}

function chCtxMenu(e,chId){
  e.preventDefault();
  const ch=S.channels[chId]; if(!ch)return;
  showCtxMenu(e.clientX,e.clientY,[
    {label:'# '+ch.name,disabled:true},{sep:true},
    ...(isServerOwner()?[{label:'✏️ Renommer',fn:`openModal('rename-channel','${chId}')`},{label:'🗑️ Supprimer',fn:`deleteChannel('${chId}')`,danger:true}]:[]),
  ]);
}

function userCtxMenu(e,userId){
  e.preventDefault(); e.stopPropagation();
  const fu=S.users[userId]; if(!fu)return;
  const isFriend=S.friends[S.me]&&S.friends[S.me][userId];
  showCtxMenu(e.clientX,e.clientY,[
    {label:fu.username,disabled:true},{sep:true},
    {label:'👤 Voir le profil',fn:`openModal('view-profile','${userId}')`},
    {label:'💬 Envoyer un message',fn:`openDm('${userId}')`},
    {label:'📞 Appel vocal',fn:`startCall('${userId}','voice')`},
    {label:'📹 Appel vidéo',fn:`startCall('${userId}','video')`},
    ...(isFriend
      ? [{sep:true},{label:'💔 Retirer des amis',fn:`removeFriend('${userId}')`,danger:true}]
      : [{sep:true},{label:'➕ Ajouter en ami',fn:`quickAddFriend('${userId}')`}]
    ),
  ]);
}

function showCtxMenu(x,y,items){
  const menu=document.getElementById('ctx-menu');
  menu.innerHTML=items.map(item=>{
    if(item.sep) return`<div class="ctx-sep"></div>`;
    if(item.disabled) return`<div class="ctx-item" style="font-weight:700;opacity:.5;cursor:default">${item.label}</div>`;
    return`<div class="ctx-item${item.danger?' danger':''}" onclick="${item.fn};closeCtxMenu()">${item.label}</div>`;
  }).join('');
  menu.style.left=Math.min(x,window.innerWidth-200)+'px';
  menu.style.top=Math.min(y,window.innerHeight-250)+'px';
  menu.classList.remove('hidden');
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true,capture:true}),50);
}
function closeCtxMenu(){ document.getElementById('ctx-menu').classList.add('hidden'); }
function copyText(text){ navigator.clipboard.writeText(text).catch(()=>{}); }

    : `<span style="font-size:22px;font-weight:700;color:#fff;">${initials(u.username)}</span>`;

  return`<div class="settings-section">
    <h3>Profil public</h3>
    <div class="avatar-upload-settings">
      <div class="avatar-preview-settings" style="background:${avBg};" onclick="uploadMyAvatar()">
        ${avContent}
        <div class="avatar-hover-overlay">📷</div>
      </div>

        <div style="font-size:14px;font-weight:700;margin-bottom:4px;">${escHtml(u.username)}</div>

    <div class="field"><label>Nom d'utilisateur</label><input type="text" id="set-username" value="${escHtml(u.username)}"/></div>
    <div class="field"><label>Bio</label><textarea id="set-bio" placeholder="Parle de toi...">${escHtml(u.bio||'')}</textarea></div>
    <div class="field"><label>Statut</label>
      <select id="set-status">
        <option value="online"${u.status==='online'?' selected':''}>🟢 En ligne</option>
        <option value="idle"${u.status==='idle'?' selected':''}>🟡 Absent</option>
        <option value="dnd"${u.status==='dnd'?' selected':''}>🔴 Ne pas déranger</option>

// ==================== RINGTONE SETTINGS ====================
function toggleRingtone(el){
  S.ringtoneEnabled = !S.ringtoneEnabled;
  el.classList.toggle('on', S.ringtoneEnabled);
  saveSettings();
  if(!S.ringtoneEnabled) stopRingTone();
}

function updateRingtoneVolume(val){
  S.ringtoneVolume = parseInt(val);
  saveSettings();
  const display = document.getElementById('vol-val-display');
  if(display) display.textContent = val + '%';
  // Update icon
  const slider = document.getElementById('ringtone-vol-slider');
  if(slider){
    const row = slider.closest('.volume-slider-row');
    if(row){
      const icon = row.querySelector('.vol-icon');
      if(icon) icon.textContent = val==0?'🔇':val<50?'🔉':'🔊';
    }
  }
}

function previewRingtone(){
  playRingTone();
  setTimeout(stopRingTone, 3500);
}

async function toggleBrowserNotif(el){
  if(!('Notification' in window)){
    showToast('Non supporté','Ton navigateur ne supporte pas les notifications.','#ef4444','!');
    return;
  }
  if(Notification.permission === 'granted'){
    // can't revoke, show instructions
    showToast('Pour désactiver','Va dans les paramètres du site (🔒) et bloque les notifications.','#f97316','ℹ️');
    return;
  }
  const perm = await Notification.requestPermission();
  el.classList.toggle('on', perm === 'granted');
  const statusEl = document.getElementById('notif-status');
  if(statusEl){
    if(perm === 'granted') statusEl.textContent = '✅ Notifications autorisées';
    else if(perm === 'denied') statusEl.textContent = '❌ Bloquées dans le navigateur';
    else statusEl.textContent = '⏳ Permission non encore accordée';
  }
  if(perm === 'granted') showToast('Notifications activées','Tu recevras des alertes même en arrière-plan !','var(--green)','🔔');
}

async function testMic(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    showToast('Micro OK ✓','Ton micro fonctionne correctement !','var(--green)','✓');
    setTimeout(()=>stream.getTracks().forEach(t=>t.stop()), 1000);
  }catch(e){
    if(e.name==='NotAllowedError') showToast('Permission refusée','Autorise le micro dans les paramètres du navigateur.','#ef4444','🎤');
    else showToast('Micro indisponible','Vérifie ton périphérique audio.','#ef4444','!');
  }
}

async function testCam(){
  const wrap=document.getElementById('test-video-wrap');
  const vid=document.getElementById('test-video');
  if(!wrap||!vid) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    vid.srcObject=stream; wrap.style.display='block';
    showToast('Caméra OK ✓','Ta caméra fonctionne !','var(--green)','📷');
    setTimeout(()=>{ stream.getTracks().forEach(t=>t.stop()); wrap.style.display='none'; vid.srcObject=null; }, 5000);
  } catch(e){
    if(e.name==='NotAllowedError') showToast('Permission refusée','Autorise la caméra dans les paramètres du navigateur.','#ef4444','📷');
    else showToast('Caméra indisponible','Aucune caméra détectée.','#ef4444','!');
  }
}

async function saveProfile(){
  const u=S.users[S.me];
  const username=document.getElementById('set-username').value.trim();
  if(!username||username.length<2||username.length>24){showToast('Erreur','Pseudo invalide (2-24 caractères)','#ef4444','!');return;}
  u.username=username;
  u.bio=document.getElementById('set-bio').value.trim();
  u.status=document.getElementById('set-status').value;
  u.nameColor=document.getElementById('set-namecolor').value||null;
  u.color=document.getElementById('set-avatarcolor').value||avatarColor(username);
  await dbUpdate('users/'+S.me, {username:u.username,bio:u.bio,status:u.status,nameColor:u.nameColor,color:u.color});
  S.users[S.me]=u;
  renderUserBar(); closeAllModals();
  showToast('Profil sauvegardé','Tes modifications ont été enregistrées.',u.color,'✓');
}

function applyTheme(themeId){
  S.theme=themeId; document.body.className=themeId;
  dbUpdate('users/'+S.me,{theme:themeId});
  const u=S.users[S.me]; if(u) u.theme=themeId;
  showSettingsSection('appearance',document.querySelector('.settings-nav-item.active'));
}

function selectSwatch(el,inputId,value){
  el.closest('.color-picker-row').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  const inp=document.getElementById(inputId); if(inp) inp.value=value;
}

function selectChType(type){
  document.getElementById('ch-type-val').value=type;
  document.getElementById('chtype-text').style.borderColor=type==='text'?'var(--accent1)':'transparent';
  document.getElementById('chtype-voice').style.borderColor=type==='voice'?'var(--accent1)':'transparent';
  document.getElementById('chtype-text').style.background=type==='text'?'var(--bg4)':'var(--bg3)';
  document.getElementById('chtype-voice').style.background=type==='voice'?'var(--bg4)':'var(--bg3)';
}

async function createServer(){
  const name=document.getElementById('srv-name').value.trim();
  const icon=document.getElementById('srv-icon').value.trim()||'🌐';
  const desc=document.getElementById('srv-desc').value.trim();
  const color=document.getElementById('srv-color-val').value;
  if(!name){showToast('Erreur','Donne un nom !','#ef4444','!');return;}
  const sid=uid(); const defText=uid(); const defVoice=uid();
  await dbSet('servers/'+sid,{id:sid,name,icon,desc,color,owner:S.me,members:{[S.me]:true},createdAt:Date.now()});
  await dbSet('channels/'+defText,{id:defText,server:sid,name:'général',type:'text',position:0});
  await dbSet('channels/'+defVoice,{id:defVoice,server:sid,name:'vocal-général',type:'voice',position:1});
  await dbUpdate('userServers/'+S.me,{[sid]:true});
  S.servers[sid]={id:sid,name,icon,desc,color,owner:S.me,members:{[S.me]:true}};
  S.channels[defText]={id:defText,server:sid,name:'général',type:'text',position:0};
  closeAllModals(); renderServersBar(); showServer(sid);
  showToast('Serveur créé !',name+' est en ligne !',color,icon);
}

async function createChannel(serverId){
  const name=document.getElementById('ch-name').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const type=document.getElementById('ch-type-val').value;
  if(!name){showToast('Erreur','Donne un nom au salon !','#ef4444','!');return;}
  const chId=uid();
  const pos=Object.values(S.channels).filter(c=>c.server===serverId).length;
  await dbSet('channels/'+chId,{id:chId,server:serverId,name,type,position:pos});
  S.channels[chId]={id:chId,server:serverId,name,type,position:pos};
  closeAllModals(); renderLeftPanel('server',serverId);
  if(type==='text') showChannel(chId);
}

async function joinServer(sid){
  await dbUpdate('servers/'+sid+'/members',{[S.me]:true});
  await dbUpdate('userServers/'+S.me,{[sid]:true});
  if(S.servers[sid]){ S.servers[sid].members=S.servers[sid].members||{}; S.servers[sid].members[S.me]=true; }
  renderServersBar(); closeAllModals();
  showToast('Serveur rejoint','Tu as rejoint '+S.servers[sid].name+' !',S.servers[sid].color||AVATAR_COLORS[0],S.servers[sid].icon||'🌐');
}

async function leaveServer(sid){
  if(!confirm('Quitter ce serveur ?')) return;
  await dbRemove('servers/'+sid+'/members/'+S.me);
  await dbRemove('userServers/'+S.me+'/'+sid);
  if(S.servers[sid]&&S.servers[sid].members) delete S.servers[sid].members[S.me];
  if(S.activeServer===sid){ S.activeServer=null; renderHomeView(); }
  renderServersBar(); closeAllModals();
}

async function renameChannel(chId){
  const inp=document.getElementById('rename-ch-input'); if(!inp)return;
  const name=inp.value.trim().toLowerCase().replace(/\s+/g,'-'); if(!name)return;
  await dbUpdate('channels/'+chId,{name});
  S.channels[chId].name=name;
  closeAllModals(); renderLeftPanel('server',S.activeServer);
  if(S.activeChannel===chId) renderChannel(chId);
}

async function deleteChannel(chId){
  if(!isServerOwner()) return;
  await dbRemove('channels/'+chId); await dbRemove('messages/'+chId);
  delete S.channels[chId]; delete S.messages[chId];
  closeCtxMenu();
  if(S.activeChannel===chId){ S.activeChannel=null; renderHomeView(); }
  renderLeftPanel('server',S.activeServer);
}

function isServerOwner(){
  if(!S.activeServer) return false;
  const srv=S.servers[S.activeServer];
  return srv&&srv.owner===S.me;
}

function doSearch(q,contextId){
  const container=document.getElementById('search-results'); if(!q||!container)return;
  q=q.toLowerCase();
  let msgs=[];
  if(contextId.startsWith('dm_')){
    const userId=contextId.replace('dm_','');
    msgs=S.dms[getDmKey(S.me,userId)]?Object.values(S.dms[getDmKey(S.me,userId)]):[];
  } else {
    msgs=S.messages[contextId]?Object.values(S.messages[contextId]):[];
  }
  const results=msgs.filter(m=>m.content&&m.content.toLowerCase().includes(q));
  if(!results.length){container.innerHTML=`<div style="text-align:center;color:var(--text2);padding:16px;">Aucun résultat pour "${escHtml(q)}"</div>`;return;}
  container.innerHTML=results.slice(-20).reverse().map(m=>`
    <div style="padding:8px;border-bottom:1px solid var(--border);">
      <div style="font-size:12px;color:var(--text2);margin-bottom:3px;"><strong>${escHtml(m.author)}</strong> · ${timeAgo(m.ts)}</div>
      <div style="font-size:14px;">${escHtml(m.content).replace(new RegExp(escHtml(q),'gi'),match=>`<mark style="background:rgba(124,92,252,.3);border-radius:2px;">${match}</mark>`)}</div>
    </div>`).join('');
}

function filterExplore(q){
  const container=document.getElementById('explore-list'); if(!container)return;
  const all=Object.values(S.servers).filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||((s.desc||'').toLowerCase()).includes(q.toLowerCase()));
  container.innerHTML=all.map(srv=>{
    const joined=srv.members&&srv.members[S.me];
    return`<div class="member-item" style="padding:12px;">
      <div class="member-avatar" style="background:${srv.color||AVATAR_COLORS[0]};width:48px;height:48px;font-size:22px;border-radius:12px;">${srv.icon||initials(srv.name)}</div>
      <div class="member-info" style="flex:1;"><div class="member-name" style="font-size:15px;">${escHtml(srv.name)}</div><div class="member-status">${escHtml(srv.desc||'')} • ${Object.keys(srv.members||{}).length} membres</div></div>
      ${joined?`<button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="leaveServer('${srv.id}')">Quitter</button>`:`<button class="btn btn-primary" style="font-size:12px;padding:6px 12px;" onclick="joinServer('${srv.id}')">Rejoindre</button>`}
    </div>`;
  }).join('');
}

async function changeBanner(){
  const input=document.createElement('input'); input.type='file'; input.accept='image/*';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      await dbUpdate('users/'+S.me,{banner:'url('+ev.target.result+')'});
      S.users[S.me].banner='url('+ev.target.result+')';
      openModal('my-profile');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function closeAllModals(){ document.getElementById('modals').innerHTML=''; }

// ==================== TOASTS ====================
function showToast(title, body, avatarBg, avatarText, avatarImg){
  const container=document.getElementById('toasts');
  const id='toast_'+uid();
  const div=document.createElement('div');
  div.className='toast'; div.id=id;

  const avHtml = avatarImg
    ? `<img src="${avatarImg}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt=""/>`
    : `<span>${avatarText||'H'}</span>`;
  const avBg = avatarImg ? 'transparent' : (avatarBg||'var(--grad)');

  div.innerHTML=`<div class="toast-avatar" style="background:${avBg}">${avHtml}</div>
  <div class="toast-content"><div class="toast-title">${escHtml(title)}</div><div class="toast-body">${escHtml(body)}</div></div>
  <button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>`;
  container.appendChild(div);
  setTimeout(()=>{ const el=document.getElementById(id); if(el){ el.style.animation='slideIn .3s ease reverse'; setTimeout(()=>el.remove(),300); } },4000);
}

function toggleLeftPanel(){
  const content=document.getElementById('lp-content');
  content.style.display=content.style.display==='none'?'':'none';
}

async function logout(){
  if(WR.localStream||WR.pc) endCall();
  stopRingTone();
  await dbUpdate('users/'+S.me,{status:'offline'});
  saveSession(null);
  S.me=null;
  S.users={};S.servers={};S.channels={};S.messages={};S.dms={};
  S.friends={};S.pendingIn={};S.pendingOut={};S.dmUnread={};
  S.activeServer=null;S.activeChannel=null;S.activeDm=null;
  if(_channelListener){ off(_channelListener); _channelListener=null; _channelListenerId=null; }
  closeAllModals();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

// ==================== INIT ====================
async function init(){
  loadSettings();
  document.getElementById('loading-msg').textContent='Connexion à Firebase...';
  const session=loadSession();
  if(session){
    const u=await dbGet('users/'+session);
    if(u){ S.me=session; await enterApp(); return; }
  }
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ closeAllModals(); closeCtxMenu(); document.getElementById('emoji-picker').classList.add('hidden'); }
  });
}

});
