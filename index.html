<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMD Talk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#0d0f13;--bg2:#161a22;--bg3:#1e2433;--bg4:#252d3d;--bg5:#2e3854;
  --accent1:#7c5cfc;--accent2:#a855f7;
  --grad:linear-gradient(135deg,#7c5cfc,#a855f7,#ec4899);
  --grad2:linear-gradient(135deg,#06b6d4,#7c5cfc);
  --grad3:linear-gradient(135deg,#f97316,#ec4899);
  --grad4:linear-gradient(135deg,#10b981,#06b6d4);
  --text1:#f0f2f7;--text2:#a0aec0;--text3:#64748b;--border:#2e3854;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --online:#22c55e;--idle:#eab308;--dnd:#ef4444;
  --r8:8px;--r12:12px;--r16:16px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg1);color:var(--text1);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
button{cursor:pointer;border:none;font-family:inherit;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
#auth-screen{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,#1a0f3a 0%,#0d0f13 60%);display:flex;align-items:center;justify-content:center;z-index:1000;}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:90vw;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo .logo-icon{width:60px;height:60px;background:var(--grad);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin-bottom:12px;}
.auth-logo h1{font-size:26px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border-radius:7px;background:transparent;color:var(--text2);font-size:14px;font-weight:600;transition:.2s;}
.auth-tab.active{background:var(--grad);color:#fff;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.auth-field input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:15px;outline:none;transition:.2s;}
.auth-field input:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(124,92,252,.15);}
.auth-btn{width:100%;padding:13px;background:var(--grad);border-radius:10px;color:#fff;font-size:15px;font-weight:700;margin-top:8px;transition:.2s;}
.auth-btn:hover{opacity:.9;transform:translateY(-1px);}
.auth-err{color:#ef4444;font-size:13px;margin-top:8px;text-align:center;}
#app{display:flex;height:100vh;overflow:hidden;}
.servers-bar{width:68px;background:var(--bg1);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);}
.srv-btn{width:48px;height:48px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;font-size:13px;font-weight:700;color:var(--text1);flex-shrink:0;}
.srv-btn:hover,.srv-btn.active{border-radius:14px;}
.srv-btn.active{background:var(--grad);}
.srv-btn .notif-dot{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:var(--red);border-radius:50%;border:2px solid var(--bg1);font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;}
.srv-sep{width:32px;height:2px;background:var(--border);border-radius:1px;margin:4px 0;}
.srv-add{background:var(--bg3);color:var(--green);font-size:22px;}
.srv-add:hover{background:var(--green);color:#fff;}
.left-panel{width:240px;background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);}
.lp-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.lp-header:hover{background:rgba(255,255,255,.03);}
.ch-list{flex:1;overflow-y:auto;padding:8px 0;}
.ch-section{margin-bottom:4px;}
.ch-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 4px 16px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ch-section-hdr:hover{color:var(--text2);}
.ch-item{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 16px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:.15s;margin:1px 8px;position:relative;}
.ch-item:hover{background:var(--bg4);color:var(--text1);}
.ch-item.active{background:var(--bg5);color:var(--text1);}
.ch-item .ch-icon{color:var(--text3);font-size:16px;flex-shrink:0;}
.ch-item .ch-notif{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;min-width:18px;text-align:center;}
.user-bar{padding:8px 12px;background:var(--bg1);display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);}
.user-bar .ub-avatar{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden;}
.user-bar .ub-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-bar .ub-info{flex:1;min-width:0;}
.user-bar .ub-name{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-bar .ub-status{font-size:11px;color:var(--text2);}
.ub-actions{display:flex;gap:4px;}
.ub-action{width:28px;height:28px;border-radius:6px;background:transparent;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ub-action:hover{background:var(--bg4);color:var(--text1);}
.status-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg1);position:absolute;bottom:-1px;right:-1px;}
.status-dot.online{background:var(--online);}
.status-dot.idle{background:var(--idle);}
.status-dot.dnd{background:var(--dnd);}
.status-dot.offline{background:var(--text3);}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.mc-header{padding:0 16px;height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mc-header .ch-name{font-weight:700;font-size:15px;}
.mc-header .ch-desc{color:var(--text2);font-size:13px;border-left:1px solid var(--border);padding-left:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-header-actions{margin-left:auto;display:flex;gap:4px;}
.hdr-btn{width:32px;height:32px;border-radius:6px;background:transparent;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s;cursor:pointer;}
.hdr-btn:hover{background:var(--bg4);color:var(--text1);}
.messages-area{flex:1;overflow-y:auto;padding:16px 0;}
.msg-group{display:flex;gap:12px;padding:4px 16px;margin:2px 0;}
.msg-group:hover{background:rgba(255,255,255,.02);}
.msg-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;margin-top:2px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;overflow:hidden;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.msg-content{flex:1;min-width:0;}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
.msg-author{font-size:15px;font-weight:700;cursor:pointer;}
.msg-author:hover{text-decoration:underline;}
.msg-time{font-size:11px;color:var(--text3);}
.msg-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.msg-badge.nitro{background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;}
.msg-badge.mod{background:#ef4444;color:#fff;}
.msg-text{font-size:15px;line-height:1.5;color:var(--text1);word-break:break-word;}
.msg-text a{color:var(--accent1);}
.msg-continue{padding:4px 16px 4px 68px;}
.msg-continue:hover{background:rgba(255,255,255,.02);}
.typing-indicator{padding:4px 16px;color:var(--text2);font-size:13px;height:28px;}
.input-area{padding:0 16px 16px;}
.msg-input-wrap{background:var(--bg3);border-radius:12px;display:flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--border);}
.msg-input-wrap:focus-within{border-color:rgba(124,92,252,.4);}
.msg-input-btn{width:32px;height:32px;background:transparent;color:var(--text2);font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;transition:.15s;cursor:pointer;}
.msg-input-btn:hover{color:var(--text1);}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text1);font-size:15px;padding:12px 0;resize:none;max-height:200px;overflow-y:auto;}
.msg-input::placeholder{color:var(--text3);}
.right-panel{width:240px;background:var(--bg2);border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto;}
.rp-section{padding:12px;}
.rp-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.member-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:.15s;}
.member-item:hover{background:var(--bg3);}
.member-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;overflow:hidden;}
.member-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-status{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dm-item{display:flex;align-items:center;gap:10px;padding:6px 12px;cursor:pointer;border-radius:8px;margin:1px 8px;transition:.15s;position:relative;}
.dm-item:hover{background:var(--bg3);}
.dm-item.active{background:var(--bg4);}
.dm-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;position:relative;overflow:hidden;}
.dm-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.dm-info{flex:1;min-width:0;}
.dm-name{font-size:14px;font-weight:600;}
.dm-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:28px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:20px;font-weight:800;margin-bottom:20px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal-close{float:right;background:transparent;color:var(--text2);font-size:22px;line-height:1;margin-top:-4px;cursor:pointer;}
.modal-close:hover{color:var(--text1);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text1);font-size:14px;outline:none;transition:.2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent1);}
.field textarea{min-height:80px;resize:vertical;}
.field select{cursor:pointer;}
.field select option{background:var(--bg3);}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;transition:.2s;cursor:pointer;}
.btn-primary{background:var(--grad);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text1);}
.btn-danger{background:#ef4444;color:#fff;}
.btn-danger:hover{background:#dc2626;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.profile-banner{height:100px;border-radius:12px 12px 0 0;position:relative;margin:-28px -28px 0;background:var(--grad);}
.profile-banner .change-banner{position:absolute;inset:0;background:rgba(0,0,0,.4);border-radius:12px 12px 0 0;display:none;align-items:center;justify-content:center;font-size:13px;color:#fff;cursor:pointer;}
.profile-banner:hover .change-banner{display:flex;}
.profile-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.profile-name{font-size:20px;font-weight:800;}
.nitro-badge{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:12px;font-weight:700;border:1px solid var(--accent1);border-radius:4px;padding:2px 6px;}
.profile-tag{color:var(--text2);font-size:13px;margin-bottom:10px;}
.profile-bio{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;}
.badge-nitro{background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;}
.badge-dev{background:var(--bg4);color:var(--text1);border:1px solid var(--border);}
.settings-layout{display:flex;height:100%;gap:0;}
.settings-nav{width:200px;padding:16px;border-right:1px solid var(--border);flex-shrink:0;}
.settings-nav-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 8px;}
.settings-nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:.15s;margin:1px 0;}
.settings-nav-item:hover{background:var(--bg3);color:var(--text1);}
.settings-nav-item.active{background:var(--bg4);color:var(--text1);}
.settings-content{flex:1;padding:24px;overflow-y:auto;}
.settings-section{margin-bottom:28px;}
.settings-section h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.toggle-row:last-child{border:none;}
.toggle-info .toggle-label{font-size:14px;font-weight:600;}
.toggle-info .toggle-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bg4);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--accent1);}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.2s;}
.toggle.on::after{left:23px;}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
.color-swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.selected{border-color:var(--text1);}
.avatar-upload-zone{position:relative;width:80px;height:80px;margin-top:-40px;margin-bottom:8px;cursor:pointer;}
.avatar-upload-zone .avatar-circle{width:80px;height:80px;border-radius:50%;border:5px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;transition:.2s;}
.avatar-upload-zone .avatar-circle img{width:100%;height:100%;object-fit:cover;}
.avatar-upload-zone .avatar-overlay{position:absolute;inset:5px;border-radius:50%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;flex-direction:column;gap:2px;}
.avatar-upload-zone:hover .avatar-overlay{display:flex;}
.avatar-overlay span{font-size:18px;}
.avatar-overlay small{font-size:9px;color:rgba(255,255,255,.8);font-weight:700;text-transform:uppercase;}
.avatar-upload-settings{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.avatar-preview-settings{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;border:3px solid var(--border);transition:.2s;}
.avatar-preview-settings:hover{border-color:var(--accent1);}
.avatar-preview-settings img{width:100%;height:100%;object-fit:cover;}
.avatar-preview-settings .avatar-hover-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;font-size:20px;}
.avatar-preview-settings:hover .avatar-hover-overlay{display:flex;}
.call-ui{position:fixed;inset:0;background:#0a0a0f;z-index:200;display:flex;flex-direction:column;}
.call-videos{flex:1;display:grid;place-items:center;gap:12px;padding:16px;background:#000;position:relative;}
.call-videos.grid-1{grid-template-columns:1fr;}
.call-videos.grid-2{grid-template-columns:1fr 1fr;}
.call-video-tile{background:#111;border-radius:12px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:2px solid transparent;transition:.3s;}
.call-video-tile.speaking{border-color:var(--green);}
.call-video-tile video{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;}
.call-video-tile .tile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;overflow:hidden;}
.call-video-tile .tile-avatar img{width:100%;height:100%;object-fit:cover;}
.call-video-tile .tile-name{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:6px;font-size:13px;font-weight:600;}
.call-video-tile .tile-muted{position:absolute;top:10px;right:10px;background:rgba(239,68,68,.85);border-radius:6px;padding:4px 8px;font-size:12px;}
.call-controls{padding:16px;display:flex;align-items:center;justify-content:center;gap:12px;background:var(--bg2);}
.call-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:.2s;border:none;cursor:pointer;}
.call-btn:hover{transform:scale(1.1);}
.call-btn-normal{background:var(--bg4);color:var(--text1);}
.call-btn-normal.off{background:var(--red);color:#fff;}
.call-btn-end{background:var(--red);color:#fff;width:60px;height:60px;font-size:24px;}
.call-info{text-align:center;padding:8px 0;}
.call-info .call-timer{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.call-info .call-label{font-size:13px;color:var(--text2);}
.incoming-call{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--accent1);border-radius:16px;padding:20px;width:300px;z-index:600;box-shadow:0 8px 40px rgba(124,92,252,.3);animation:slideIn .3s ease;}
.incoming-call h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.incoming-call p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.incoming-call-btns{display:flex;gap:8px;}
.incoming-call-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.btn-accept{background:var(--green);color:#fff;}
.btn-decline{background:var(--red);color:#fff;}
.call-status-bar{text-align:center;padding:6px 0;font-size:13px;color:var(--text2);background:rgba(0,0,0,.4);}
.friends-header{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.friends-tab{padding:6px 14px;border-radius:8px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:.15s;}
.friends-tab:hover{background:var(--bg3);}
.friends-tab.active{background:var(--accent1);color:#fff;}
.friend-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s;}
.friend-item:hover{background:var(--bg3);}
.friend-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;position:relative;overflow:hidden;}
.friend-avatar img{width:100%;height:100%;object-fit:cover;}
.friend-info{flex:1;min-width:0;}
.friend-name{font-size:15px;font-weight:700;}

function createRingtoneContext(){ if(!_ringtoneCtx) _ringtoneCtx = new (window.AudioContext||window.webkitAudioContext)(); return _ringtoneCtx; }
function playRingTone(){
  if(!S.ringtoneEnabled) return; stopRingTone();
  const vol = S.ringtoneVolume/100; if(vol===0) return;
  function playPattern(){
    const ctx = createRingtoneContext(); if(ctx.state==='suspended') ctx.resume();
    const notes=[{freq:880,start:0,dur:.12},{freq:1100,start:.15,dur:.12},{freq:880,start:.30,dur:.12}];
    const masterGain=ctx.createGain(); masterGain.gain.value=vol*.35; masterGain.connect(ctx.destination);
    notes.forEach(n=>{
      const osc=ctx.createOscillator(); const g=ctx.createGain();
      osc.connect(g); g.connect(masterGain); osc.type='sine'; osc.frequency.value=n.freq;
      const t=ctx.currentTime+n.start;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(1,t+.02);
      g.gain.setValueAtTime(1,t+n.dur-.03); g.gain.linearRampToValueAtTime(0,t+n.dur);
      osc.start(t); osc.stop(t+n.dur); _ringtoneNodes.push(osc);
    });
  }
  playPattern(); _ringtoneInterval=setInterval(playPattern,1800);
}
function stopRingTone(){
  if(_ringtoneInterval){ clearInterval(_ringtoneInterval); _ringtoneInterval=null; }
  _ringtoneNodes.forEach(n=>{try{n.stop();}catch(e){}});
  _ringtoneNodes=[];
}

function formatTime(sec){ return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatMsg(txt){
  txt=escHtml(txt);

async function cleanExpiredStories(){
  const now=Date.now(); const EXPIRE=24*60*60*1000;
  for(const userId of Object.keys(S.stories)){
    const userStories=S.stories[userId];
    for(const storyId of Object.keys(userStories||{})){
      if(now-(userStories[storyId].ts||0)>EXPIRE){
        await dbRemove('stories/'+userId+'/'+storyId);
        if(S.stories[userId]) delete S.stories[userId][storyId];
      }
    }
    if(S.stories[userId]&&Object.keys(S.stories[userId]).length===0) delete S.stories[userId];
  }
}

function getActiveStories(){
  const now=Date.now(); const EXPIRE=24*60*60*1000;
  const result={};
  for(const userId of Object.keys(S.stories)){
    const arr=Object.values(S.stories[userId]||{}).filter(s=>now-(s.ts||0)<EXPIRE).sort((a,b)=>a.ts-b.ts);
    if(arr.length>0) result[userId]=arr;
  }
  return result;
}

// ✅ MODIFIÉ : vidéo max 1min, images sans limite de taille
function pickStoryMedia(type){
  const input=document.createElement('input');input.type='file';input.accept=type==='image'?'image/*':'video/*';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    if(type==='video'){
      const url=URL.createObjectURL(file);
      const tmpVid=document.createElement('video');tmpVid.preload='metadata';
      tmpVid.onloadedmetadata=()=>{
        URL.revokeObjectURL(url);
        if(tmpVid.duration>60){showToast('Vidéo trop longue','Max 1 minute 🎬','#ef4444','!');return;}
        const reader=new FileReader();
        reader.onload=ev=>{
          window._storyMediaData=ev.target.result;window._storyMediaType=type;
          const wrap=document.getElementById('story-preview-wrap');
          if(wrap)wrap.innerHTML=`<video src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" controls muted></video>`;
        };reader.readAsDataURL(file);
      };
      tmpVid.src=url;return;
    }
    // Image — aucune limite de taille
    const reader=new FileReader();
    reader.onload=ev=>{
      window._storyMediaData=ev.target.result;window._storyMediaType=type;
      const wrap=document.getElementById('story-preview-wrap');
      if(wrap)wrap.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" alt=""/>`;
    };reader.readAsDataURL(file);
  };input.click();
}

async function publishStory(){
  if(!window._storyMediaData){showToast('Aucun média','Choisis une image ou vidéo !','#ef4444','!');return;}
  const caption=document.getElementById('story-caption')?.value.trim()||'';
  const storyId=uid();

function triggerImageUpload(inputId){
  const input=document.createElement('input');input.type='file';input.accept='image/*,video/*';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const isVideo=file.type.startsWith('video/');
    if(isVideo){
      const url=URL.createObjectURL(file);
      const tmpVid=document.createElement('video');tmpVid.preload='metadata';
      tmpVid.onloadedmetadata=()=>{
        URL.revokeObjectURL(url);
        if(tmpVid.duration>240){showToast('Vidéo trop longue','Max 4 minutes 🎬','#ef4444','!');return;}
        const reader=new FileReader();
        reader.onload=ev=>{S.pendingImage={data:ev.target.result,name:file.name,type:'video'};showImagePreview(inputId);};
        reader.readAsDataURL(file);
      };
      tmpVid.onerror=()=>{URL.revokeObjectURL(url);showToast('Erreur','Vidéo invalide ou illisible.','#ef4444','!');};
      tmpVid.src=url;
      return;
    }
    const reader=new FileReader();reader.onload=ev=>{S.pendingImage={data:ev.target.result,name:file.name,type:'image'};showImagePreview(inputId);};reader.readAsDataURL(file);
  };input.click();
}
function showImagePreview(inputId){
  const wrap=document.getElementById('msg-input-'+inputId)?.closest('.input-area');
  if(!wrap||!S.pendingImage) return;
  const existing=wrap.querySelector('.img-preview-bar');if(existing)existing.remove();
  const bar=document.createElement('div');bar.className='img-preview-bar';
  const isVideo=S.pendingImage.type==='video';
  const previewEl=isVideo?`<video src="${S.pendingImage.data}" muted></video>`:`<img src="${S.pendingImage.data}" alt=""/>`;
  bar.innerHTML=`${previewEl}<span class="img-preview-name">${isVideo?'🎬 ':'🖼️ '}${escHtml(S.pendingImage.name)}</span><button onclick="cancelPendingImage('${inputId}')">✕</button>`;
  wrap.insertBefore(bar,wrap.firstChild);
}

async function sendPoll(contextId, type){
  const question=document.getElementById('poll-question').value.trim();
  const inputs=document.querySelectorAll('.poll-opt-input');
  const options=[...inputs].map(i=>i.value.trim()).filter(Boolean);
  if(!question){showToast('Question requise','','#ef4444','!');return;}
  if(options.length<2){showToast('Au moins 2 options','','#ef4444','!');return;}
  const duration=parseInt(document.getElementById('poll-duration').value);
  const u=S.users[S.me];
  const msg={
    id:uid(),author:u.username,authorId:S.me,content:'',ts:Date.now(),
    type:'poll',
    poll:{question,options:options.map((o,i)=>({id:'opt'+i,text:o,votes:{}})),endsAt:duration>0?Date.now()+duration:0,multiple:false}
  };
  if(u.nitro) msg.badge='nitro';
  closeAllModals();
  if(type==='channel'){
    await dbSet('messages/'+contextId+'/'+msg.id,msg);
  } else {
    const userId=contextId.replace('dm_','');
    const dmKey=getDmKey(S.me,userId);
    await dbSet('dms/'+dmKey+'/'+msg.id,msg);
  }
}

async function votePoll(msgId, optId, contextId, type){
  let msgPath, msg;
  if(type==='channel'){
    msg=await dbGet('messages/'+contextId+'/'+msgId);
    msgPath='messages/'+contextId+'/'+msgId;
  }else{
    const userId=contextId.replace('dm_','');
    const dmKey=getDmKey(S.me,userId);
    msg=await dbGet('dms/'+dmKey+'/'+msgId);
    msgPath='dms/'+dmKey+'/'+msgId;
  }
  if(!msg||!msg.poll)return;
  const opt=msg.poll.options.find(o=>o.id===optId);
  if(!opt)return;
  const updates={};
  if(opt.votes&&opt.votes[S.me]){
    updates[msgPath+'/poll/options/'+msg.poll.options.indexOf(opt)+'/votes/'+S.me]=null;
    await update(dbRef(''),Object.fromEntries(Object.entries(updates).map(([k,v])=>[k,v])));
    await dbRemove(msgPath+'/poll/options/'+msg.poll.options.indexOf(opt)+'/votes/'+S.me);
  }else{
    for(let i=0;i<msg.poll.options.length;i++){
      if(msg.poll.options[i].votes&&msg.poll.options[i].votes[S.me]){
        await dbRemove(msgPath+'/poll/options/'+i+'/votes/'+S.me);
      }
    }
    await dbSet(msgPath+'/poll/options/'+msg.poll.options.indexOf(opt)+'/votes/'+S.me,true);
  }
}

  const poll=msg.poll;

  const myVote=poll.options.findIndex(o=>o.votes&&o.votes[S.me]);
  const optsHtml=poll.options.map((opt,i)=>{
    const vCount=Object.keys(opt.votes||{}).length;
    const pct=totalVotes>0?Math.round(vCount/totalVotes*100):0;
    const isVoted=opt.votes&&opt.votes[S.me];
    const canVote=!ended;
    return `<div class="poll-option">
      <div class="poll-bar-wrap${isVoted?' voted':''}" ${canVote?`onclick="votePoll('${msg.id}','${opt.id}','${contextId}','${type}')"`:'style="cursor:default"'}>

          </span>
        </div>
      </div>
    </div>`;
  }).join('');
  const expiryLabel=ended?'<span class="poll-end-badge">Terminé</span>':poll.endsAt>0?`<span class="poll-end-badge">Expire dans ${timeFromNow(poll.endsAt)}</span>`:'';
  return `<div class="poll-card">
    <div class="poll-question">📊 ${escHtml(poll.question)}</div>

  </div>`;
}

    catch(e){showToast('Erreur','Impossible de créer l\'appel.','#ef4444','!');endCall();}
  }else{

async function sendFriendRequest(){
  const input=document.getElementById('add-friend-input');const msg=document.getElementById('add-friend-msg');const name=(input.value.trim()).toLowerCase();const RED='#ef4444';
  if(!name){msg.style.color=RED;msg.textContent='Entre un nom d\'utilisateur.';return;}
  if(name===S.me){msg.style.color=RED;msg.textContent='Tu ne peux pas t\'ajouter toi-même !';return;}
  msg.style.color='var(--text2)';msg.textContent='Recherche...';
  const allUsers=await dbGet('users')||{};S.users=allUsers;
  const found=Object.keys(allUsers).find(k=>k===name||allUsers[k].username.toLowerCase()===name);
  if(!found){msg.style.color=RED;msg.textContent='Utilisateur introuvable.';return;}
  if(found===S.me){msg.style.color=RED;msg.textContent='C\'est toi !';return;}
  if(S.friends[S.me]&&S.friends[S.me][found]){msg.style.color=RED;msg.textContent='Vous êtes déjà amis !';return;}
  if(S.pendingOut[S.me]&&S.pendingOut[S.me][found]){msg.style.color=RED;msg.textContent='Demande déjà envoyée.';return;}
  if(S.pendingIn[S.me]&&S.pendingIn[S.me][found]){await acceptFriend(found);return;}
  await dbUpdate('pendingOut/'+S.me,{[found]:true});await dbUpdate('pendingIn/'+found,{[S.me]:true});
  S.pendingOut[S.me]=S.pendingOut[S.me]||{};S.pendingOut[S.me][found]=true;
  msg.style.color='#22c55e';msg.textContent='✓ Demande envoyée à '+allUsers[found].username+' !';input.value='';
  const fu=allUsers[found];showToast('Demande envoyée','Envoyée à '+fu.username,fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);
}
async function acceptFriend(fid){
  await dbUpdate('friends/'+S.me,{[fid]:true});await dbUpdate('friends/'+fid,{[S.me]:true});await dbRemove('pendingIn/'+S.me+'/'+fid);await dbRemove('pendingOut/'+fid+'/'+S.me);
  S.friends[S.me]=S.friends[S.me]||{};S.friends[S.me][fid]=true;const fu=S.users[fid];if(fu)showToast('Nouvel ami !',fu.username+' est maintenant ton ami !',fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);
  renderFriendsView();renderLeftPanel('dm');
}
async function rejectFriend(fid){await dbRemove('pendingIn/'+S.me+'/'+fid);await dbRemove('pendingOut/'+fid+'/'+S.me);if(S.pendingIn[S.me])delete S.pendingIn[S.me][fid];renderFriendsView();}
async function cancelFriendRequest(fid){await dbRemove('pendingOut/'+S.me+'/'+fid);await dbRemove('pendingIn/'+fid+'/'+S.me);if(S.pendingOut[S.me])delete S.pendingOut[S.me][fid];renderFriendsView();}
async function removeFriend(fid){await dbRemove('friends/'+S.me+'/'+fid);await dbRemove('friends/'+fid+'/'+S.me);if(S.friends[S.me])delete S.friends[S.me][fid];renderFriendsView();renderLeftPanel('dm');closeCtxMenu();}
async function quickAddFriend(userId){
  if(!S.users[userId])return;
  if(S.friends[S.me]&&S.friends[S.me][userId]){showToast('Déjà amis !','',avatarColor(S.users[userId].username),initials(S.users[userId].username));return;}
  if(S.pendingIn[S.me]&&S.pendingIn[S.me][userId]){await acceptFriend(userId);return;}
  if(S.pendingOut[S.me]&&S.pendingOut[S.me][userId]){showToast('Déjà envoyée','',avatarColor(S.users[userId].username),initials(S.users[userId].username));return;}
  await dbUpdate('pendingOut/'+S.me,{[userId]:true});await dbUpdate('pendingIn/'+userId,{[S.me]:true});
  S.pendingOut[S.me]=S.pendingOut[S.me]||{};S.pendingOut[S.me][userId]=true;
  const fu=S.users[userId];showToast('Demande envoyée','Envoyée à '+fu.username,fu.color||avatarColor(fu.username),initials(fu.username),fu.avatarImg);closeCtxMenu();renderRightPanel();
}

function buildMsgHtml(msgs,type,contextId){
  if(!msgs||!msgs.length) return`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px;text-align:center;min-height:200px;"><div><div style="font-size:48px;margin-bottom:12px;">${type==='channel'?'#':'💬'}</div><div style="font-size:18px;font-weight:700;">Aucun message pour l'instant</div><div style="color:var(--text2);margin-top:4px;">Sois le premier à écrire quelque chose !</div></div></div>`;
  let html='';let lastAuthor='';let lastTs=0;
  msgs.forEach(msg=>{
    const isContinue=msg.author===lastAuthor&&msg.ts-lastTs<300000&&msg.type!=='image'&&msg.type!=='video'&&msg.type!=='poll'&&msg.type!=='friend_share';
    const u=msg.authorId?S.users[msg.authorId]:null;
    const aColor=u?u.color||avatarColor(u.username):msg.avatar||avatarColor(msg.author||'');
    let contentHtml='';
    if(msg.type==='image'){
      contentHtml=`<img class="msg-image" src="${msg.imageData}" alt="Image" onclick="openLightbox('${msg.imageData}')" loading="lazy"/>${msg.content?`<div class="msg-text" style="margin-top:4px;">${formatMsg(msg.content)}</div>`:''}`;
    }else if(msg.type==='video'){
      contentHtml=`<video class="msg-video" src="${msg.imageData}" controls preload="metadata"></video>${msg.content?`<div class="msg-text" style="margin-top:4px;">${formatMsg(msg.content)}</div>`:''}`;
    }else if(msg.type==='poll'){
      contentHtml=buildPollHtml(msg,contextId,type);
    }else if(msg.type==='friend_share'){
      contentHtml=`<div class="msg-text" style="font-size:13px;color:var(--text2);margin-bottom:4px;">A partagé un profil :</div>${buildFriendShareHtml(msg)}`;
    }else{
      contentHtml=`<div class="msg-text">${formatMsg(msg.content)}</div>`;
    }
    if(!isContinue){
      const avBg=u&&u.avatarImg?'transparent':aColor;
      const avContent=u&&u.avatarImg?`<img src="${u.avatarImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt=""/>`:initials(msg.author);
      html+=`<div class="msg-group" oncontextmenu="msgCtxMenu(event,'${msg.id}','${type}','${contextId}')">
        <div class="msg-avatar" style="background:${avBg}">${avContent}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author" style="${u&&u.nameColor?`background:${u.nameColor};-webkit-background-clip:text;-webkit-text-fill-color:transparent`:''}">${escHtml(msg.author)}</span>
            ${msg.badge==='nitro'?'<span class="msg-badge nitro">NITRO</span>':msg.badge==='mod'?'<span class="msg-badge mod">MOD</span>':''}
            <span class="msg-time">${timeAgo(msg.ts)}</span>
          </div>
          ${contentHtml}
        </div>
      </div>`;
    }else{
      html+=`<div class="msg-continue" oncontextmenu="msgCtxMenu(event,'${msg.id}','${type}','${contextId}')">${contentHtml}</div>`;
    }
    lastAuthor=msg.author;lastTs=msg.ts;
  });
  return html;
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px';}

async function sendMessage(id,type){
  const inp=document.getElementById('msg-input-'+id);if(!inp)return;
  const content=inp.value.trim();const hasImg=!!S.pendingImage;
  if(!content&&!hasImg)return;
  const u=S.users[S.me];
  const msg={id:uid(),author:u.username,authorId:S.me,content:content||'',ts:Date.now(),reactions:{}};
  if(u.nitro)msg.badge='nitro';
  if(hasImg){
    msg.type=S.pendingImage.type==='video'?'video':'image';
    msg.imageData=S.pendingImage.data;
    S.pendingImage=null;
    const wrap=document.getElementById('input-area-'+id);if(wrap){const b=wrap.querySelector('.img-preview-bar');if(b)b.remove();}
  }
  inp.value='';inp.style.height='auto';
  if(type==='channel'){await dbSet('messages/'+id+'/'+msg.id,msg);}
  else{const userId=id.replace('dm_','');const dmKey=getDmKey(S.me,userId);await dbSet('dms/'+dmKey+'/'+msg.id,msg);}
}
async function deleteMsg(msgId,type,contextId){
  if(type==='channel')await dbRemove('messages/'+contextId+'/'+msgId);
  else{const dmKey=getDmKey(S.me,contextId);await dbRemove('dms/'+dmKey+'/'+msgId);}
  closeCtxMenu();
}

  const online=memberIds.filter(id=>{const u=S.users[id];return u&&u.status!=='offline';});

function msgCtxMenu(e,msgId,type,contextId){
  e.preventDefault();e.stopPropagation();
  const rawMsgs=type==='channel'?S.messages[contextId]:S.dms[getDmKey(S.me,contextId)];
  const msgs=rawMsgs?Object.values(rawMsgs):[];const msg=msgs.find(m=>m.id===msgId);const isOwner=msg&&msg.authorId===S.me;
  let firstItem;
  if(msg&&msg.type==='image'){firstItem={label:'🖼️ Voir l\'image',fn:`openLightbox('${msg.imageData}')`};}
  else if(msg&&msg.type==='video'){firstItem={label:'🎬 Vidéo',disabled:true};}
  else if(msg&&msg.type==='poll'){firstItem={label:'📊 Sondage',disabled:true};}
  else if(msg&&msg.type==='friend_share'){firstItem={label:'👥 Profil partagé',disabled:true};}
  else{firstItem={label:'📋 Copier',fn:`copyText(${JSON.stringify(msg?msg.content:'')})`};}
  showCtxMenu(e.clientX,e.clientY,[
    firstItem,
    ...(isOwner?[{sep:true},{label:'🗑️ Supprimer',fn:`deleteMsg('${msgId}','${type}','${contextId}')`,danger:true}]:[]),
  ]);
}
function chCtxMenu(e,chId){e.preventDefault();const ch=S.channels[chId];if(!ch)return;showCtxMenu(e.clientX,e.clientY,[{label:'# '+ch.name,disabled:true},{sep:true},...(isServerOwner()?[{label:'✏️ Renommer',fn:`openModal('rename-channel','${chId}')`},{label:'🗑️ Supprimer',fn:`deleteChannel('${chId}')`,danger:true}]:[])]);}
function userCtxMenu(e,userId){
  e.preventDefault();e.stopPropagation();const fu=S.users[userId];if(!fu)return;const isFriend=S.friends[S.me]&&S.friends[S.me][userId];const active=getActiveStories();const hasStory=!!(active[userId]&&active[userId].length>0);
  showCtxMenu(e.clientX,e.clientY,[{label:fu.username,disabled:true},{sep:true},...(hasStory?[{label:'📸 Voir la story',fn:`openStoryViewer('${userId}')`}]:[]),{label:'👤 Voir le profil',fn:`openModal('view-profile','${userId}')`},{label:'💬 Envoyer un message',fn:`openDm('${userId}')`},{label:'📞 Appel vocal',fn:`startCall('${userId}','voice')`},{label:'📹 Appel vidéo',fn:`startCall('${userId}','video')`},...(isFriend?[{sep:true},{label:'💔 Retirer des amis',fn:`removeFriend('${userId}')`,danger:true}]:[{sep:true},{label:'➕ Ajouter en ami',fn:`quickAddFriend('${userId}')`}])]);

function showCtxMenu(x,y,items){
  const menu=document.getElementById('ctx-menu');
  menu.innerHTML=items.map(item=>{if(item.sep)return`<div class="ctx-sep"></div>`;if(item.disabled)return`<div class="ctx-item" style="font-weight:700;opacity:.5;cursor:default">${item.label}</div>`;return`<div class="ctx-item${item.danger?' danger':''}" onclick="${item.fn};closeCtxMenu()">${item.label}</div>`;}).join('');
  menu.style.left=Math.min(x,window.innerWidth-200)+'px';menu.style.top=Math.min(y,window.innerHeight-250)+'px';menu.classList.remove('hidden');
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true,capture:true}),50);
}
function closeCtxMenu(){document.getElementById('ctx-menu').classList.add('hidden');}
function copyText(text){navigator.clipboard.writeText(text).catch(()=>{});}

      <div id="notif-status" style="font-size:12px;color:var(--text2);margin-top:4px;">${'Notification' in window?(Notification.permission==='granted'?'✅ Notifications autorisées':Notification.permission==='denied'?'❌ Bloquées':'⏳ Non encore accordée'):'❌ Non supporté'}</div>
    </div>`;
  }else if(section==='audio'){
    content.innerHTML=`<div class="settings-section"><h3>Audio & Vidéo</h3><p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Les appels utilisent WebRTC. Autorise micro/caméra dans ton navigateur.</p>
      <div class="toggle-row"><div class="toggle-info"><div class="toggle-label">Réduction de bruit</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
      <div class="toggle-row"><div class="toggle-info"><div class="toggle-label">Annulation d'écho</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
      <div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-ghost" style="flex:1;" onclick="testMic()">🎤 Tester le micro</button><button class="btn btn-ghost" style="flex:1;" onclick="testCam()">📷 Tester la caméra</button></div>
      <div id="test-video-wrap" style="display:none;margin-top:12px;border-radius:8px;overflow:hidden;background:#000;aspect-ratio:16/9;"><video id="test-video" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;"></video></div>
    </div>`;
  }
}
function toggleRingtone(el){S.ringtoneEnabled=!S.ringtoneEnabled;el.classList.toggle('on',S.ringtoneEnabled);saveSettings();if(!S.ringtoneEnabled)stopRingTone();}
function updateRingtoneVolume(val){S.ringtoneVolume=parseInt(val);saveSettings();const d=document.getElementById('vol-val-display');if(d)d.textContent=val+'%';}
function previewRingtone(){playRingTone();setTimeout(stopRingTone,3500);}
async function toggleBrowserNotif(el){if(!('Notification' in window)){showToast('Non supporté','','#ef4444','!');return;}const perm=await Notification.requestPermission();el.classList.toggle('on',perm==='granted');const s=document.getElementById('notif-status');if(s)s.textContent=perm==='granted'?'✅ Notifications autorisées':'❌ Bloquées';}
async function testMic(){try{const s=await navigator.mediaDevices.getUserMedia({audio:true});showToast('Micro OK ✓','','var(--green)','✓');setTimeout(()=>s.getTracks().forEach(t=>t.stop()),1000);}catch(e){showToast('Micro indisponible','','#ef4444','!');}}
async function testCam(){const wrap=document.getElementById('test-video-wrap');const vid=document.getElementById('test-video');if(!wrap||!vid)return;try{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});vid.srcObject=s;wrap.style.display='block';showToast('Caméra OK ✓','','var(--green)','📷');setTimeout(()=>{s.getTracks().forEach(t=>t.stop());wrap.style.display='none';vid.srcObject=null;},5000);}catch(e){showToast('Caméra indisponible','','#ef4444','!');}}

async function saveProfile(){
  const u=S.users[S.me];const username=document.getElementById('set-username').value.trim();
  if(!username||username.length<2||username.length>24){showToast('Erreur','Pseudo invalide (2-24 caractères)','#ef4444','!');return;}
  u.username=username;u.bio=document.getElementById('set-bio').value.trim();u.status=document.getElementById('set-status').value;u.nameColor=document.getElementById('set-namecolor').value||null;u.color=document.getElementById('set-avatarcolor').value||avatarColor(username);
  await dbUpdate('users/'+S.me,{username:u.username,bio:u.bio,status:u.status,nameColor:u.nameColor,color:u.color});
  S.users[S.me]=u;renderUserBar();closeAllModals();showToast('Profil sauvegardé','',u.color,'✓');
}
function applyTheme(themeId){S.theme=themeId;document.body.className=themeId;dbUpdate('users/'+S.me,{theme:themeId});const u=S.users[S.me];if(u)u.theme=themeId;showSettingsSection('appearance',document.querySelector('.settings-nav-item.active'));}
function selectSwatch(el,inputId,value){el.closest('.color-picker-row').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');const inp=document.getElementById(inputId);if(inp)inp.value=value;}
function selectChType(type){document.getElementById('ch-type-val').value=type;document.getElementById('chtype-text').style.borderColor=type==='text'?'var(--accent1)':'transparent';document.getElementById('chtype-voice').style.borderColor=type==='voice'?'var(--accent1)':'transparent';document.getElementById('chtype-text').style.background=type==='text'?'var(--bg4)':'var(--bg3)';document.getElementById('chtype-voice').style.background=type==='voice'?'var(--bg4)':'var(--bg3)';}

async function createServer(){
  const name=document.getElementById('srv-name').value.trim();const icon=document.getElementById('srv-icon').value.trim()||'🌐';const desc=document.getElementById('srv-desc').value.trim();const color=document.getElementById('srv-color-val').value;
  if(!name){showToast('Erreur','Donne un nom !','#ef4444','!');return;}
  const sid=uid();const defText=uid();const defVoice=uid();
  await dbSet('servers/'+sid,{id:sid,name,icon,desc,color,owner:S.me,members:{[S.me]:true},createdAt:Date.now()});
  await dbSet('channels/'+defText,{id:defText,server:sid,name:'général',type:'text',position:0});
  await dbSet('channels/'+defVoice,{id:defVoice,server:sid,name:'vocal-général',type:'voice',position:1});
  await dbUpdate('userServers/'+S.me,{[sid]:true});S.servers[sid]={id:sid,name,icon,desc,color,owner:S.me,members:{[S.me]:true}};S.channels[defText]={id:defText,server:sid,name:'général',type:'text',position:0};
  closeAllModals();renderServersBar();showServer(sid);showToast('Serveur créé !',name+' est en ligne !',color,icon);
}
async function createChannel(serverId){
  const name=document.getElementById('ch-name').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');const type=document.getElementById('ch-type-val').value;
  if(!name){showToast('Erreur','Donne un nom au salon !','#ef4444','!');return;}
  const chId=uid();const pos=Object.values(S.channels).filter(c=>c.server===serverId).length;
  await dbSet('channels/'+chId,{id:chId,server:serverId,name,type,position:pos});S.channels[chId]={id:chId,server:serverId,name,type,position:pos};
  closeAllModals();renderLeftPanel('server',serverId);if(type==='text')showChannel(chId);
}
async function joinServer(sid){await dbUpdate('servers/'+sid+'/members',{[S.me]:true});await dbUpdate('userServers/'+S.me,{[sid]:true});if(S.servers[sid]){S.servers[sid].members=S.servers[sid].members||{};S.servers[sid].members[S.me]=true;}renderServersBar();closeAllModals();showToast('Serveur rejoint','Tu as rejoint '+S.servers[sid].name+' !',S.servers[sid].color||AVATAR_COLORS[0],S.servers[sid].icon||'🌐');}
async function leaveServer(sid){if(!confirm('Quitter ce serveur ?'))return;await dbRemove('servers/'+sid+'/members/'+S.me);await dbRemove('userServers/'+S.me+'/'+sid);if(S.servers[sid]&&S.servers[sid].members)delete S.servers[sid].members[S.me];if(S.activeServer===sid){S.activeServer=null;renderHomeView();}renderServersBar();closeAllModals();}
async function renameChannel(chId){const inp=document.getElementById('rename-ch-input');if(!inp)return;const name=inp.value.trim().toLowerCase().replace(/\s+/g,'-');if(!name)return;await dbUpdate('channels/'+chId,{name});S.channels[chId].name=name;closeAllModals();renderLeftPanel('server',S.activeServer);if(S.activeChannel===chId)renderChannel(chId);}
async function deleteChannel(chId){if(!isServerOwner())return;await dbRemove('channels/'+chId);await dbRemove('messages/'+chId);delete S.channels[chId];delete S.messages[chId];closeCtxMenu();if(S.activeChannel===chId){S.activeChannel=null;renderHomeView();}renderLeftPanel('server',S.activeServer);}
function isServerOwner(){if(!S.activeServer)return false;const srv=S.servers[S.activeServer];return srv&&srv.owner===S.me;}
function doSearch(q,contextId){
  const container=document.getElementById('search-results');if(!q||!container)return;q=q.toLowerCase();let msgs=[];
  if(contextId.startsWith('dm_')){const userId=contextId.replace('dm_','');msgs=S.dms[getDmKey(S.me,userId)]?Object.values(S.dms[getDmKey(S.me,userId)]):[];}else{msgs=S.messages[contextId]?Object.values(S.messages[contextId]):[];}
  const results=msgs.filter(m=>m.content&&m.content.toLowerCase().includes(q));
  if(!results.length){container.innerHTML=`<div style="text-align:center;color:var(--text2);padding:16px;">Aucun résultat</div>`;return;}
  container.innerHTML=results.slice(-20).reverse().map(m=>`<div style="padding:8px;border-bottom:1px solid var(--border);"><div style="font-size:12px;color:var(--text2);margin-bottom:3px;"><strong>${escHtml(m.author)}</strong> · ${timeAgo(m.ts)}</div><div style="font-size:14px;">${escHtml(m.content).replace(new RegExp(escHtml(q),'gi'),match=>`<mark style="background:rgba(124,92,252,.3);border-radius:2px;">${match}</mark>`)}</div></div>`).join('');
}
function filterExplore(q){const container=document.getElementById('explore-list');if(!container)return;const all=Object.values(S.servers).filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||(s.desc||'').toLowerCase().includes(q.toLowerCase()));container.innerHTML=all.map(srv=>{const joined=srv.members&&srv.members[S.me];return`<div class="member-item" style="padding:12px;"><div class="member-avatar" style="background:${srv.color||AVATAR_COLORS[0]};width:48px;height:48px;font-size:22px;border-radius:12px;">${srv.icon||initials(srv.name)}</div><div class="member-info" style="flex:1;"><div class="member-name" style="font-size:15px;">${escHtml(srv.name)}</div><div class="member-status">${escHtml(srv.desc||'')} • ${Object.keys(srv.members||{}).length} membres</div></div>${joined?`<button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="leaveServer('${srv.id}')">Quitter</button>`:`<button class="btn btn-primary" style="font-size:12px;padding:6px 12px;" onclick="joinServer('${srv.id}')">Rejoindre</button>`}</div>`;}).join('');}
async function changeBanner(){const input=document.createElement('input');input.type='file';input.accept='image/*';input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async ev=>{await dbUpdate('users/'+S.me,{banner:'url('+ev.target.result+')'});S.users[S.me].banner='url('+ev.target.result+')';openModal('my-profile');};reader.readAsDataURL(file);};input.click();}
function closeAllModals(){document.getElementById('modals').innerHTML='';}

function showToast(title,body,avatarBg,avatarText,avatarImg){
  const container=document.getElementById('toasts');const id='toast_'+uid();const div=document.createElement('div');div.className='toast';div.id=id;
  const avHtml=avatarImg?`<img src="${avatarImg}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt=""/>`:`<span>${avatarText||'H'}</span>`;
  const avBg=avatarImg?'transparent':(avatarBg||'var(--grad)');
  div.innerHTML=`<div class="toast-avatar" style="background:${avBg}">${avHtml}</div><div class="toast-content"><div class="toast-title">${escHtml(title)}</div><div class="toast-body">${escHtml(body)}</div></div><button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>`;
  container.appendChild(div);
  setTimeout(()=>{const el=document.getElementById(id);if(el){el.style.animation='slideIn .3s ease reverse';setTimeout(()=>el.remove(),300);}},4000);
}
function toggleLeftPanel(){const content=document.getElementById('lp-content');content.style.display=content.style.display==='none'?'':`none`;}

async function logout(){
  if(WR.localStream||WR.pc)endCall();stopRingTone();closeStoryViewer();
  await dbUpdate('users/'+S.me,{status:'offline'});saveSession(null);
  S.me=null;S.users={};S.servers={};S.channels={};S.messages={};S.dms={};S.friends={};S.pendingIn={};S.pendingOut={};S.dmUnread={};S.stories={};S.activeServer=null;S.activeChannel=null;S.activeDm=null;
  if(_channelListener){off(_channelListener);_channelListener=null;_channelListenerId=null;}
  closeAllModals();document.getElementById('app').classList.add('hidden');document.getElementById('auth-screen').classList.remove('hidden');document.getElementById('login-user').value='';document.getElementById('login-pass').value='';
}

async function init(){
  loadSettings();
  const session=loadSession();
  if(session){const u=await dbGet('users/'+session);if(u){S.me=session;await enterApp();return;}}
  document.getElementById('loading').classList.add('hidden');document.getElementById('auth-screen').classList.remove('hidden');
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAllModals();closeCtxMenu();document.getElementById('emoji-picker').classList.add('hidden');closePlusMenu();closeStoryViewer();}});
}
