<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMD Talk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#0d0f13;--bg2:#161a22;--bg3:#1e2433;--bg4:#252d3d;--bg5:#2e3854;
  --accent1:#7c5cfc;--accent2:#a855f7;
  --grad:linear-gradient(135deg,#7c5cfc,#a855f7,#ec4899);
  --grad2:linear-gradient(135deg,#06b6d4,#7c5cfc);
  --grad3:linear-gradient(135deg,#f97316,#ec4899);
  --grad4:linear-gradient(135deg,#10b981,#06b6d4);
  --text1:#f0f2f7;--text2:#a0aec0;--text3:#64748b;--border:#2e3854;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --online:#22c55e;--idle:#eab308;--dnd:#ef4444;
  --r8:8px;--r12:12px;--r16:16px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg1);color:var(--text1);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
button{cursor:pointer;border:none;font-family:inherit;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
#auth-screen{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,#1a0f3a 0%,#0d0f13 60%);display:flex;align-items:center;justify-content:center;z-index:1000;}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:90vw;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo .logo-icon{width:60px;height:60px;background:var(--grad);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin-bottom:12px;}
.auth-logo h1{font-size:26px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border-radius:7px;background:transparent;color:var(--text2);font-size:14px;font-weight:600;transition:.2s;}
.auth-tab.active{background:var(--grad);color:#fff;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.auth-field input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:15px;outline:none;transition:.2s;}
.auth-field input:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(124,92,252,.15);}
.auth-btn{width:100%;padding:13px;background:var(--grad);border-radius:10px;color:#fff;font-size:15px;font-weight:700;margin-top:8px;transition:.2s;}
.auth-btn:hover{opacity:.9;transform:translateY(-1px);}
.auth-err{color:#ef4444;font-size:13px;margin-top:8px;text-align:center;}
#app{display:flex;height:100vh;overflow:hidden;}
.servers-bar{width:68px;background:var(--bg1);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);}
.srv-btn{width:48px;height:48px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;font-size:13px;font-weight:700;color:var(--text1);flex-shrink:0;}
.srv-btn:hover,.srv-btn.active{border-radius:14px;}
.srv-btn.active{background:var(--grad);}
.srv-btn .notif-dot{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:var(--red);border-radius:50%;border:2px solid var(--bg1);font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;}
.srv-sep{width:32px;height:2px;background:var(--border);border-radius:1px;margin:4px 0;}
.srv-add{background:var(--bg3);color:var(--green);font-size:22px;}
.srv-add:hover{background:var(--green);color:#fff;}
.left-panel{width:240px;background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);}
.lp-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.lp-header:hover{background:rgba(255,255,255,.03);}
.ch-list{flex:1;overflow-y:auto;padding:8px 0;}
.ch-section{margin-bottom:4px;}
.ch-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 4px 16px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ch-section-hdr:hover{color:var(--text2);}
.ch-item{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 16px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:.15s;margin:1px 8px;position:relative;}
.ch-item:hover{background:var(--bg4);color:var(--text1);}
.ch-item.active{background:var(--bg5);color:var(--text1);}
.ch-item .ch-icon{color:var(--text3);font-size:16px;flex-shrink:0;}
.ch-item .ch-notif{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;min-width:18px;text-align:center;}
.user-bar{padding:8px 12px;background:var(--bg1);display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);}
.user-bar .ub-avatar{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;position:relative;}
.user-bar .ub-info{flex:1;min-width:0;}
.user-bar .ub-name{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-bar .ub-status{font-size:11px;color:var(--text2);}
.ub-actions{display:flex;gap:4px;}
.ub-action{width:28px;height:28px;border-radius:6px;background:transparent;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ub-action:hover{background:var(--bg4);color:var(--text1);}
.status-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg1);position:absolute;bottom:-1px;right:-1px;}
.status-dot.online{background:var(--online);}
.status-dot.idle{background:var(--idle);}
.status-dot.dnd{background:var(--dnd);}
.status-dot.offline{background:var(--text3);}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.mc-header{padding:0 16px;height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mc-header .ch-name{font-weight:700;font-size:15px;}
.mc-header .ch-desc{color:var(--text2);font-size:13px;border-left:1px solid var(--border);padding-left:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-header-actions{margin-left:auto;display:flex;gap:4px;}
.hdr-btn{width:32px;height:32px;border-radius:6px;background:transparent;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.hdr-btn:hover{background:var(--bg4);color:var(--text1);}
.messages-area{flex:1;overflow-y:auto;padding:16px 0;}
.msg-group{display:flex;gap:12px;padding:4px 16px;margin:2px 0;}
.msg-group:hover{background:rgba(255,255,255,.02);}
.msg-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;margin-top:2px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;}
.msg-content{flex:1;min-width:0;}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
.msg-author{font-size:15px;font-weight:700;cursor:pointer;}
.msg-author:hover{text-decoration:underline;}
.msg-time{font-size:11px;color:var(--text3);}
.msg-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.msg-badge.nitro{background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;}
.msg-badge.mod{background:#ef4444;color:#fff;}
.msg-text{font-size:15px;line-height:1.5;color:var(--text1);word-break:break-word;}
.msg-text a{color:var(--accent1);}
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.reaction{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;transition:.15s;}
.reaction:hover{background:var(--bg4);border-color:var(--accent1);}
.reaction.me{background:rgba(124,92,252,.15);border-color:var(--accent1);}
.msg-continue{padding:4px 16px 4px 68px;}
.msg-continue:hover{background:rgba(255,255,255,.02);}
.typing-indicator{padding:4px 16px;color:var(--text2);font-size:13px;height:28px;}
.typing-dots{display:inline-flex;gap:3px;align-items:center;margin-right:4px;}
.typing-dots span{width:5px;height:5px;background:var(--text2);border-radius:50%;animation:bounce .8s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.input-area{padding:0 16px 16px;}
.msg-input-wrap{background:var(--bg3);border-radius:12px;display:flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--border);}
.msg-input-wrap:focus-within{border-color:rgba(124,92,252,.4);}
.msg-input-btn{width:32px;height:32px;background:transparent;color:var(--text2);font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;transition:.15s;}
.msg-input-btn:hover{color:var(--text1);}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text1);font-size:15px;padding:12px 0;resize:none;max-height:200px;overflow-y:auto;}
.msg-input::placeholder{color:var(--text3);}
.right-panel{width:240px;background:var(--bg2);border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto;}
.rp-section{padding:12px;}
.rp-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.member-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:.15s;}
.member-item:hover{background:var(--bg3);}
.member-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-status{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dm-list{flex:1;overflow-y:auto;padding:8px 0;}
.dm-item{display:flex;align-items:center;gap:10px;padding:6px 12px;cursor:pointer;border-radius:8px;margin:1px 8px;transition:.15s;position:relative;}
.dm-item:hover{background:var(--bg3);}
.dm-item.active{background:var(--bg4);}
.dm-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;position:relative;}
.dm-info{flex:1;min-width:0;}
.dm-name{font-size:14px;font-weight:600;}
.dm-preview{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dm-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.dm-time{font-size:11px;color:var(--text3);}
.dm-unread{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:2px 5px;min-width:16px;text-align:center;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:28px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:20px;font-weight:800;margin-bottom:20px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal-close{float:right;background:transparent;color:var(--text2);font-size:22px;line-height:1;margin-top:-4px;}
.modal-close:hover{color:var(--text1);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text1);font-size:14px;outline:none;transition:.2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent1);}
.field textarea{min-height:80px;resize:vertical;}
.field select{cursor:pointer;}
.field select option{background:var(--bg3);}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;transition:.2s;cursor:pointer;}
.btn-primary{background:var(--grad);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text1);}
.btn-danger{background:#ef4444;color:#fff;}
.btn-danger:hover{background:#dc2626;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.profile-banner{height:100px;border-radius:12px 12px 0 0;position:relative;margin:-28px -28px 0;background:var(--grad);}
.profile-banner .change-banner{position:absolute;inset:0;background:rgba(0,0,0,.4);border-radius:12px 12px 0 0;display:none;align-items:center;justify-content:center;font-size:13px;color:#fff;cursor:pointer;}
.profile-banner:hover .change-banner{display:flex;}
.profile-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.profile-name{font-size:20px;font-weight:800;}
.nitro-badge{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:12px;font-weight:700;border:1px solid var(--accent1);border-radius:4px;padding:2px 6px;background-clip:text;}
.profile-tag{color:var(--text2);font-size:13px;margin-bottom:10px;}
.profile-bio{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;}
.badge-nitro{background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;}
.badge-booster{background:linear-gradient(135deg,#ec4899,#f97316);color:#fff;}
.badge-dev{background:var(--bg4);color:var(--text1);border:1px solid var(--border);}
.settings-layout{display:flex;height:100%;gap:0;}
.settings-nav{width:200px;padding:16px;border-right:1px solid var(--border);flex-shrink:0;}
.settings-nav-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 8px;}
.settings-nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:.15s;margin:1px 0;}
.settings-nav-item:hover{background:var(--bg3);color:var(--text1);}
.settings-nav-item.active{background:var(--bg4);color:var(--text1);}
.settings-content{flex:1;padding:24px;overflow-y:auto;}
.settings-section{margin-bottom:28px;}
.settings-section h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.toggle-row:last-child{border:none;}
.toggle-info .toggle-label{font-size:14px;font-weight:600;}
.toggle-info .toggle-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bg4);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--accent1);}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.2s;}
.toggle.on::after{left:23px;}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
.color-swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;transition:.15px;border:2px solid transparent;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.selected{border-color:var(--text1);}

/* ===== CALL UI ===== */
.call-ui{position:fixed;inset:0;background:#0a0a0f;z-index:200;display:flex;flex-direction:column;}
.call-videos{flex:1;display:grid;place-items:center;gap:12px;padding:16px;background:#000;position:relative;}
.call-videos.grid-1{grid-template-columns:1fr;}
.call-videos.grid-2{grid-template-columns:1fr 1fr;}
.call-video-tile{background:#111;border-radius:12px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:2px solid transparent;transition:.3s;}
.call-video-tile.speaking{border-color:var(--green);}
.call-video-tile video{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;}
.call-video-tile .tile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;}
.call-video-tile .tile-name{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:6px;font-size:13px;font-weight:600;}
.call-video-tile .tile-muted{position:absolute;top:10px;right:10px;background:rgba(239,68,68,.85);border-radius:6px;padding:4px 8px;font-size:12px;}
.call-video-tile .tile-novideo{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.6);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text2);}
/* Local preview (PiP) en appel vidéo */
#local-pip{position:absolute;bottom:16px;right:16px;width:160px;border-radius:10px;overflow:hidden;border:2px solid var(--accent1);z-index:10;background:#111;aspect-ratio:16/9;}
#local-pip video{width:100%;height:100%;object-fit:cover;display:block;}
.call-controls{padding:16px;display:flex;align-items:center;justify-content:center;gap:12px;background:var(--bg2);}
.call-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:.2s;border:none;}
.call-btn:hover{transform:scale(1.1);}
.call-btn-normal{background:var(--bg4);color:var(--text1);}
.call-btn-normal.off{background:var(--red);color:#fff;}
.call-btn-end{background:var(--red);color:#fff;width:60px;height:60px;font-size:24px;}
.call-info{text-align:center;padding:8px 0;}
.call-info .call-timer{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.call-info .call-label{font-size:13px;color:var(--text2);}
/* Incoming call modal */
.incoming-call{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--accent1);border-radius:16px;padding:20px;width:300px;z-index:600;box-shadow:0 8px 40px rgba(124,92,252,.3);animation:slideIn .3s ease;}
.incoming-call h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.incoming-call p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.incoming-call-btns{display:flex;gap:8px;}
.incoming-call-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:700;}
.btn-accept{background:var(--green);color:#fff;}
.btn-decline{background:var(--red);color:#fff;}
/* WebRTC status */
.call-status-bar{text-align:center;padding:4px 0;font-size:12px;color:var(--text3);}

.friends-header{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.friends-tab{padding:6px 14px;border-radius:8px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:.15s;}
.friends-tab:hover{background:var(--bg3);}
.friends-tab.active{background:var(--accent1);color:#fff;}
.friend-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s;}
.friend-item:hover{background:var(--bg3);}
.friend-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;position:relative;}
.friend-info{flex:1;min-width:0;}
.friend-name{font-size:15px;font-weight:700;}
.friend-status{font-size:13px;color:var(--text2);}
.friend-actions{display:flex;gap:6px;}
.friend-btn{width:36px;height:36px;border-radius:50%;background:var(--bg4);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:17px;transition:.15s;}

.add-friend-input-row input{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text1);font-size:14px;outline:none;}
.add-friend-input-row input:focus{border-color:var(--accent1);}
.add-friend-input-row button{padding:10px 18px;background:var(--grad);border-radius:8px;color:#fff;font-size:14px;font-weight:700;}

.home-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:600px;width:100%;}
.home-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.2s;text-align:center;}

.active-indicator{display:inline-flex;align-items:center;gap:4px;color:var(--green);font-size:12px;font-weight:600;margin-top:8px;}
#loading{position:fixed;inset:0;background:var(--bg1);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;}
#loading .ld-logo{width:80px;height:80px;background:var(--grad);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:#fff;margin-bottom:20px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

.ld-bar{width:200px;height:4px;background:var(--bg3);border-radius:2px;margin-top:20px;overflow:hidden;}

@keyframes load{0%{width:0%;}100%{width:100%;}}
.hidden{display:none!important;}
.sep{height:1px;background:var(--border);margin:8px 0;}
.tooltip{position:relative;}
.tooltip:hover::after{content:attr(data-tip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:var(--bg4);color:var(--text1);font-size:12px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:100;border:1px solid var(--border);}
.tooltip.tip-top:hover::after{left:50%;top:auto;bottom:calc(100% + 6px);transform:translateX(-50%);}
.theme-purple{--accent1:#7c5cfc;--accent2:#a855f7;--grad:linear-gradient(135deg,#7c5cfc,#a855f7,#ec4899);}
.theme-blue{--accent1:#3b82f6;--accent2:#06b6d4;--grad:linear-gradient(135deg,#3b82f6,#06b6d4);}
.theme-green{--accent1:#10b981;--accent2:#22c55e;--grad:linear-gradient(135deg,#10b981,#22c55e);}

.theme-pink{--accent1:#ec4899;--accent2:#f97316;--grad:linear-gradient(135deg,#ec4899,#f97316);}
.theme-cyan{--accent1:#06b6d4;--accent2:#7c5cfc;--grad:linear-gradient(135deg,#06b6d4,#7c5cfc);}
</style>
</head>

<script type="module">
// ==================== FIREBASE INIT ====================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, off, update, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-SRABd1v11Kdx5Tz0JFJu8psHGbFrrV4",
  authDomain: "hmd-talk.firebaseapp.com",
  databaseURL: "https://hmd-talk-default-rtdb.firebaseio.com",
  projectId: "hmd-talk",
  storageBucket: "hmd-talk.firebasestorage.app",
  messagingSenderId: "915474502507",
  appId: "1:915474502507:web:8ddfc361935c813d62f22e"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ==================== STATE ====================
let S = {
  me: null,
  users: {},
  servers: {},
  channels: {},
  messages: {},
  dms: {},
  friends: {},
  pendingIn: {},
  pendingOut: {},
  view: 'home',
  activeServer: null,
  activeChannel: null,
  activeDm: null,
  theme: 'theme-purple',
  micOn: true,
  deafOn: false,
  inCall: false,
  callData: null,
  callTimer: null,
  callSec: 0,
  _listeners: [],
  _seenMsgToast: {},
  _seenFriendToast: {},
};

// ==================== WebRTC STATE ====================
let WR = {
  pc: null,              // RTCPeerConnection
  localStream: null,     // MediaStream local (micro + cam)
  screenStream: null,    // MediaStream screen share
  callId: null,          // ID de l'appel en cours dans Firebase
  callType: 'voice',     // 'voice' ou 'video'
  isCaller: false,       // true si on a initié l'appel
  remoteUserId: null,    // userId de l'autre
  micMuted: false,
  camOff: true,          // caméra off par défaut (appel vocal)
  screenSharing: false,
  signalingListener: null,
};

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
  ]
};

const EMOJIS = ['😀','😂','🥹','😍','🥰','😎','🤩','🥳','😜','🤔','😴','😱','🎉','❤️','🔥','✨','👍','👎','💯','🚀','💎','🎮','🎵','🌈','⚡','🍕','🐱','🐶','🌸','💪','🙏','👀','💀','🤣','😭','😤','🥺','😏','🤯','🤩'];
const AVATAR_COLORS = ['linear-gradient(135deg,#7c5cfc,#a855f7)','linear-gradient(135deg,#3b82f6,#06b6d4)','linear-gradient(135deg,#10b981,#22c55e)','linear-gradient(135deg,#f97316,#eab308)','linear-gradient(135deg,#ec4899,#f97316)','linear-gradient(135deg,#ef4444,#f97316)'];
const STATUS_LABELS = {online:'🟢 En ligne',idle:'🟡 Absent',dnd:'🔴 Ne pas déranger',offline:'⚫ Invisible'};

// ==================== FIREBASE HELPERS ====================
function dbRef(path){ return ref(db, path); }
async function dbGet(path){ const snap = await get(dbRef(path)); return snap.exists() ? snap.val() : null; }
async function dbSet(path, val){ await set(dbRef(path), val); }
async function dbUpdate(path, val){ await update(dbRef(path), val); }
async function dbRemove(path){ await remove(dbRef(path)); }
function dbListen(path, cb){
  const r = dbRef(path);
  onValue(r, snap => cb(snap.exists() ? snap.val() : null));
  S._listeners.push({r, cb});
  return r;
}

function saveSession(uid){ localStorage.setItem('hmd_session', uid||''); }
function loadSession(){ return localStorage.getItem('hmd_session')||null; }

// ==================== UTILS ====================
function uid(){ return Math.random().toString(36).substr(2,9)+'_'+Date.now().toString(36); }
function initials(name){ return name?name.slice(0,2).toUpperCase():'??'; }
function avatarColor(name){ let h=0; for(let i=0;i<(name||'').length;i++) h=name.charCodeAt(i)+h*31; return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function timeAgo(ts){ return "Aujourd'hui à "+new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function formatTime(sec){ const m=Math.floor(sec/60).toString().padStart(2,'0'); const s=(sec%60).toString().padStart(2,'0'); return m+':'+s; }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatMsg(txt){
  txt=escHtml(txt);
  txt=txt.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  txt=txt.replace(/\*(.+?)\*/g,'<em>$1</em>');
  txt=txt.replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,.3);padding:2px 5px;border-radius:4px;font-family:monospace">$1</code>');
  txt=txt.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
  return txt;
}
function getDmKey(a,b){ return [a,b].sort().join('__'); }

// ==================== AUTH ====================
function showAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').classList.toggle('hidden',tab!=='login');
  document.getElementById('register-form').classList.toggle('hidden',tab!=='register');
}

async function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  if(!user||!pass){err.textContent='Remplis tous les champs !';return;}
  err.textContent='Connexion...';
  const u = await dbGet('users/'+user);
  if(!u||u.password!==pass){err.textContent='Identifiants incorrects.';return;}
  err.textContent='';
  S.me=user;
  saveSession(user);
  await enterApp();
}

async function doRegister(){
  const user=document.getElementById('reg-user').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  const err=document.getElementById('reg-err');
  if(!user||!pass||!pass2){err.textContent='Remplis tous les champs !';return;}
  if(user.length<2||user.length>24){err.textContent='Pseudo 2-24 caractères.';return;}
  if(pass.length<4){err.textContent='Mot de passe trop court (min 4).';return;}
  if(pass!==pass2){err.textContent='Mots de passe différents.';return;}
  const key=user.toLowerCase();
  err.textContent='Vérification...';
  const existing = await dbGet('users/'+key);
  if(existing){err.textContent='Ce pseudo est déjà pris !';return;}
  const newUser={id:key,username:user,password:pass,status:'online',bio:'',banner:null,color:avatarColor(user),theme:'theme-purple',joinedAt:Date.now(),nitro:true,badges:['nitro','booster'],customColor:null,nameColor:null};
  await dbSet('users/'+key, newUser);
  const srvs = await dbGet('servers') || {};
  for(const sid of Object.keys(srvs)){
    await dbUpdate('servers/'+sid+'/members', {[key]:true});
    await dbUpdate('userServers/'+key, {[sid]:true});
  }
  err.style.color='#22c55e';
  err.textContent='Compte créé ! Connexion...';
  setTimeout(()=>{
    document.getElementById('login-user').value=user;
    document.getElementById('login-pass').value=pass;
    showAuthTab('login');
    setTimeout(doLogin,300);
  },600);
}

async function enterApp(){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('loading-msg').textContent='Chargement des données...';
  await dbUpdate('users/'+S.me, {status:'online', lastSeen: Date.now()});
  const srvs = await dbGet('servers') || {};
  for(const sid of Object.keys(srvs)){
    await dbUpdate('servers/'+sid+'/members', {[S.me]:true});
    await dbUpdate('userServers/'+S.me, {[sid]:true});
  }
  await loadAllData();
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const u=S.users[S.me];
    document.body.className=u&&u.theme?u.theme:'theme-purple';
    S.theme=u&&u.theme?u.theme:'theme-purple';
    renderApp();
    showView('home');
    setupListeners();
    // Listen for incoming calls
    listenIncomingCalls();
  },800);
}

async function loadAllData(){
  S.users   = await dbGet('users')   || {};
  S.servers = await dbGet('servers') || {};
  S.channels= await dbGet('channels')|| {};
  S.messages= await dbGet('messages')|| {};
  S.dms     = await dbGet('dms')     || {};
  S.friends = await dbGet('friends') || {};
  S.pendingIn  = await dbGet('pendingIn')  || {};
  S.pendingOut = await dbGet('pendingOut') || {};
  if(Object.keys(S.servers).length===0) await seedData();
}

async function seedData(){
  const s1='hmd_official'; const s2='general_server';
  const ch1='ch_hmd_general'; const ch2='ch_hmd_annonces'; const ch3='ch_hmd_vocal';
  const ch4='ch_gen_general'; const ch5='ch_gen_vocal';
  const now=Date.now();
  await dbSet('servers/'+s1,{id:s1,name:'HMD Official',icon:'🎮',owner:'system',color:AVATAR_COLORS[0],members:{[S.me]:true},desc:'Serveur officiel HMD Talk'});
  await dbSet('servers/'+s2,{id:s2,name:'Général',icon:'💬',owner:'system',color:AVATAR_COLORS[1],members:{[S.me]:true},desc:'Discussion générale'});

// ==================== WEBRTC CORE ====================
async function initWebRTCCall(isCaller, remoteOffer){
  const callType = WR.callType;
  const remoteUserId = WR.remoteUserId;
  const fu = S.users[remoteUserId];

  // Show call UI
  S.inCall = true;
  S.callSec = 0;
  const callUi = document.getElementById('call-ui');
  callUi.classList.remove('hidden');
  setCallStatus('Initialisation...');
  document.getElementById('call-label').textContent = `Appel ${callType==='video'?'vidéo':'vocal'} avec ${fu?fu.username:'...'}`;

  // Show/hide cam button based on call type
  const camBtn = document.getElementById('call-cam-btn');
  if(callType === 'video') camBtn.classList.remove('hidden');
  else camBtn.classList.add('hidden');

  // Build video tiles
  buildCallTiles(fu, callType);

  // Get local media
  try {
    const constraints = {
      audio: true,
      video: callType === 'video' ? { width:{ ideal:1280 }, height:{ ideal:720 } } : false
    };
    WR.localStream = await navigator.mediaDevices.getUserMedia(constraints);
    WR.micMuted = false;
    WR.camOff = (callType !== 'video');
    setCallStatus('Micro actif...');
  } catch(e) {
    // Fallback: audio only if video failed
    try {
      WR.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      WR.camOff = true;
      setCallStatus('Micro actif (caméra indisponible)');
    } catch(e2) {
      showToast('Erreur', 'Impossible d\'accéder au micro/caméra.', '#ef4444', '!');
      endCall();
      return;
    }
  }

  // Attach local stream to local tile
  attachLocalStream(callType);

  // Create RTCPeerConnection
  WR.pc = new RTCPeerConnection(ICE_SERVERS);

  // Add tracks
  WR.localStream.getTracks().forEach(track => {
    WR.pc.addTrack(track, WR.localStream);
  });

  // On remote track
  WR.pc.ontrack = e => {
    setCallStatus('Connecté ✓');
    attachRemoteStream(e.streams[0]);
    // Start timer
    if(!S.callTimer){
      S.callTimer = setInterval(()=>{ S.callSec++; document.getElementById('call-timer').textContent=formatTime(S.callSec); }, 1000);
    }
  };

  // ICE candidates
  WR.pc.onicecandidate = e => {
    if(e.candidate){
      const path = isCaller
        ? 'calls/'+remoteUserId+'/iceCaller/'+Date.now()
        : 'calls/'+WR.remoteUserId+'/iceCallee/'+Date.now();
      dbSet(path, JSON.stringify(e.candidate));
    }
  };

  WR.pc.oniceconnectionstatechange = () => {
    const st = WR.pc ? WR.pc.iceConnectionState : '';
    if(st==='connected'||st==='completed') setCallStatus('Connecté ✓');
    else if(st==='checking') setCallStatus('Connexion...');
    else if(st==='failed') setCallStatus('Connexion échouée');
    else if(st==='disconnected') setCallStatus('Déconnecté');
  };

  if(isCaller){
    // Create offer
    const offer = await WR.pc.createOffer();
    await WR.pc.setLocalDescription(offer);
    setCallStatus('Sonnerie...');

    // Send offer to remote
    const callId = WR.callId || uid();
    WR.callId = callId;
    await dbSet('calls/'+remoteUserId+'/incoming', {
      callId,
      from: S.me,
      type: callType,
      offer: JSON.stringify(offer)
    });

    // Listen for answer
    const answerRef = dbRef('calls/'+S.me+'/answer/'+callId);
    const unsubAnswer = onValue(answerRef, async snap => {
      if(!snap.exists()) return;
      const val = snap.val();
      off(answerRef, unsubAnswer);
      if(val.declined){
        showToast('Appel refusé', (fu?fu.username:'L\'autre')+ ' a refusé l\'appel.', '#ef4444', '✕');
        endCall();
        return;
      }
      if(val.answer){
        const answer = JSON.parse(val.answer);
        await WR.pc.setRemoteDescription(new RTCSessionDescription(answer));
        listenIceCandidates('callee');
      }
    });

    // Store so we can clean up
    WR.signalingListener = ()=>{ off(answerRef); };

  } else {
    // Callee: set remote offer, create answer
    const offer = JSON.parse(remoteOffer);
    await WR.pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await WR.pc.createAnswer();
    await WR.pc.setLocalDescription(answer);

    // Send answer to caller
    await dbSet('calls/'+WR.remoteUserId+'/answer/'+WR.callId, {
      answer: JSON.stringify(answer)
    });

    listenIceCandidates('caller');
  }
}

function listenIceCandidates(role){
  // role = 'caller' means we receive iceCaller, 'callee' means iceCallee
  const path = 'calls/'+S.me+'/'+(role==='caller'?'iceCaller':'iceCallee');
  const r = dbRef(path);
  onValue(r, snap => {
    if(!snap.exists()||!WR.pc) return;
    const candidates = snap.val();
    Object.values(candidates||{}).forEach(async c => {
      try{
        await WR.pc.addIceCandidate(new RTCIceCandidate(JSON.parse(c)));
      } catch(e){}
    });
  });
}

function buildCallTiles(fu, callType){
  const vids = document.getElementById('call-videos');
  const me = S.users[S.me];
  vids.className = 'call-videos grid-2';
  vids.innerHTML = `
    <div class="call-video-tile speaking" id="local-tile">
      <div class="tile-avatar" id="local-avatar" style="background:${me?me.color||avatarColor(me.username):'var(--grad)'}">${initials(me?me.username:'')}</div>
      <video id="local-video" autoplay muted playsinline style="display:none;"></video>
      <div class="tile-name">${me?me.username:'Moi'} (moi)</div>
    </div>
    <div class="call-video-tile" id="remote-tile">
      <div class="tile-avatar" id="remote-avatar" style="background:${fu?fu.color||avatarColor(fu.username):'var(--bg4)'}">${initials(fu?fu.username:'')}</div>
      <video id="remote-video" autoplay playsinline style="display:none;"></video>
      <div class="tile-name">${fu?fu.username:'Correspondant'}</div>
      <div class="tile-muted" id="remote-status">📞 Sonnerie...</div>
    </div>`;
}

function attachLocalStream(callType){
  const localVideo = document.getElementById('local-video');
  const localAvatar = document.getElementById('local-avatar');
  if(!localVideo || !WR.localStream) return;
  localVideo.srcObject = WR.localStream;
  const hasVideo = WR.localStream.getVideoTracks().length > 0 && !WR.camOff;
  if(hasVideo){
    localVideo.style.display = 'block';
    if(localAvatar) localAvatar.style.display = 'none';
  }
}

function attachRemoteStream(stream){
  const remoteVideo = document.getElementById('remote-video');
  const remoteAvatar = document.getElementById('remote-avatar');
  const remoteStatus = document.getElementById('remote-status');
  if(!remoteVideo) return;
  remoteVideo.srcObject = stream;
  if(remoteStatus) remoteStatus.remove();
  const hasVideo = stream.getVideoTracks().length > 0;
  if(hasVideo){
    remoteVideo.style.display = 'block';
    if(remoteAvatar) remoteAvatar.style.display = 'none';
    const remoteTile = document.getElementById('remote-tile');
    if(remoteTile) remoteTile.classList.add('speaking');
  }
}

function setCallStatus(msg){
  const el = document.getElementById('call-status-bar');
  if(el) el.textContent = msg;
}

async function startCall(userId, callType){
  if(S.inCall){showToast('Déjà en appel','Termine l\'appel en cours avant d\'en commencer un nouveau.','#ef4444','!');return;}
  const fu = S.users[userId];
  if(!fu){showToast('Erreur','Utilisateur introuvable.','#ef4444','!');return;}
  WR.isCaller = true;
  WR.remoteUserId = userId;
  WR.callId = uid();
  WR.callType = callType || 'voice';
  await initWebRTCCall(true, null);
}

}

function joinVoiceChannel(chId){
  const ch=S.channels[chId]; if(!ch)return;
  // Pour les salons vocaux: appel local (pas de signaling distant dans cette version)
  S.inCall=true; S.callSec=0;
  const callUi=document.getElementById('call-ui');
  callUi.classList.remove('hidden');
  document.getElementById('call-label').textContent=`Vocal — #${ch.name}`;
  setCallStatus('Salon vocal — En attente d\'autres membres');
  const me=S.users[S.me];
  const vids = document.getElementById('call-videos');
  vids.className='call-videos grid-1';
  vids.innerHTML=`<div class="call-video-tile speaking" id="local-tile">
    <div class="tile-avatar" style="background:${me?me.color||avatarColor(me.username):'var(--grad)'}">${initials(me?me.username:'')}</div>
    <video id="local-video" autoplay muted playsinline style="display:none;"></video>
    <div class="tile-name">${me?me.username:'Moi'} (moi)</div>
  </div>`;
  // Get audio
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(stream=>{
    WR.localStream=stream;
    const lv=document.getElementById('local-video');
    if(lv)lv.srcObject=stream;
    setCallStatus('Micro actif dans le salon');
  }).catch(()=>setCallStatus('Micro indisponible'));
  S.callTimer=setInterval(()=>{S.callSec++;document.getElementById('call-timer').textContent=formatTime(S.callSec);},1000);
}

function endCall(){
  // Stop all tracks
  if(WR.localStream){ WR.localStream.getTracks().forEach(t=>t.stop()); WR.localStream=null; }
  if(WR.screenStream){ WR.screenStream.getTracks().forEach(t=>t.stop()); WR.screenStream=null; }
  // Close peer connection
  if(WR.pc){ WR.pc.close(); WR.pc=null; }
  if(WR.signalingListener){ WR.signalingListener(); WR.signalingListener=null; }
  // Cleanup Firebase signaling
  if(WR.callId && WR.remoteUserId){
    dbRemove('calls/'+WR.remoteUserId+'/incoming').catch(()=>{});
    dbRemove('calls/'+S.me+'/answer/'+WR.callId).catch(()=>{});
    dbRemove('calls/'+S.me+'/iceCaller').catch(()=>{});
    dbRemove('calls/'+S.me+'/iceCallee').catch(()=>{});
  }
  WR.callId=null; WR.remoteUserId=null; WR.isCaller=false; WR.micMuted=false; WR.camOff=true; WR.screenSharing=false;
  clearInterval(S.callTimer); S.callTimer=null;
  S.inCall=false; S.callSec=0;
  document.getElementById('call-ui').classList.add('hidden');
  document.getElementById('call-timer').textContent='00:00';
  setCallStatus('');
}

function toggleCallMic(btn){
  if(!WR.localStream) return;
  WR.micMuted = !WR.micMuted;
  WR.localStream.getAudioTracks().forEach(t => t.enabled = !WR.micMuted);
  btn.classList.toggle('off', WR.micMuted);
  btn.textContent = WR.micMuted ? '🔇' : '🎤';
}

function toggleCallCam(btn){
  if(!WR.localStream) return;
  WR.camOff = !WR.camOff;
  WR.localStream.getVideoTracks().forEach(t => t.enabled = !WR.camOff);
  btn.classList.toggle('off', WR.camOff);
  btn.textContent = WR.camOff ? '📵' : '📷';
  const localVideo = document.getElementById('local-video');
  const localAvatar = document.getElementById('local-avatar');
  if(localVideo) localVideo.style.display = WR.camOff ? 'none' : 'block';
  if(localAvatar) localAvatar.style.display = WR.camOff ? 'flex' : 'none';
}

async function toggleScreenShare(btn){
  if(WR.screenSharing){
    // Stop screen share
    if(WR.screenStream){ WR.screenStream.getTracks().forEach(t=>t.stop()); WR.screenStream=null; }
    WR.screenSharing=false;
    btn.classList.remove('off');
    btn.textContent='🖥️';
    // Re-add local video track
    if(WR.pc && WR.localStream){
      const videoTrack = WR.localStream.getVideoTracks()[0];
      if(videoTrack){
        const sender = WR.pc.getSenders().find(s=>s.track&&s.track.kind==='video');
        if(sender) sender.replaceTrack(videoTrack).catch(()=>{});
      }
    }
    setCallStatus('Partage d\'écran arrêté');
    return;
  }
  try{
    WR.screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    WR.screenSharing = true;
    btn.classList.add('off');
    btn.textContent='⏹️';
    const screenTrack = WR.screenStream.getVideoTracks()[0];
    screenTrack.onended = () => toggleScreenShare(btn);
    // Replace video track in peer connection
    if(WR.pc){
      const sender = WR.pc.getSenders().find(s=>s.track&&s.track.kind==='video');
      if(sender) await sender.replaceTrack(screenTrack).catch(()=>{});
    }
    // Show screen in local tile
    const localVideo = document.getElementById('local-video');
    if(localVideo){ localVideo.srcObject=WR.screenStream; localVideo.style.display='block'; }
    const localAvatar = document.getElementById('local-avatar');
    if(localAvatar) localAvatar.style.display='none';
    setCallStatus('Partage d\'écran actif');
  }catch(e){
    setCallStatus('Partage d\'écran annulé');
  }
}

function toggleMic(btn){S.micOn=!S.micOn;btn.style.opacity=S.micOn?1:.4;}
function toggleDeaf(btn){S.deafOn=!S.deafOn;btn.style.opacity=S.deafOn?.4:1;}

function showView(view){
  S.view=view; S.activeServer=null; S.activeChannel=null; S.activeDm=null;
  document.getElementById('right-panel').classList.add('hidden');
  if(view==='home')renderHomeView();
  else if(view==='friends')renderFriendsView();

function showServer(sid){
  S.activeServer=sid; S.view='server'; S.activeDm=null;
  const chs=Object.values(S.channels).filter(c=>c.server===sid).sort((a,b)=>a.position-b.position);
  const firstText=chs.find(c=>c.type==='text');
  if(firstText) showChannel(firstText.id);
  renderLeftPanel('server',sid); renderServersBar();
}

function showChannel(chId){
  S.activeChannel=chId; S.activeDm=null;
  const ch=S.channels[chId]; if(!ch)return;
  if(ch.type==='voice'){joinVoiceChannel(chId);return;}
  listenChannel(chId);
  renderChannel(chId);
  renderLeftPanel('server',S.activeServer);
  document.getElementById('right-panel').classList.remove('hidden');
  renderRightPanel();
}

function openDm(userId){
  S.activeDm=userId; S.view='dm'; S.activeServer=null; S.activeChannel=null;
  renderDm(userId); renderLeftPanel('dm');
  document.getElementById('right-panel').classList.add('hidden');

// ==================== LEFT PANEL ====================
function renderLeftPanel(type, serverId){
  const lp=document.getElementById('lp-content');
  if(type==='server'){
    const srv=S.servers[serverId]; if(!srv)return;
    document.getElementById('lp-title').textContent=srv.name;
    const chs=Object.values(S.channels).filter(c=>c.server===serverId).sort((a,b)=>a.position-b.position);
    const textChs=chs.filter(c=>c.type==='text');
    const voiceChs=chs.filter(c=>c.type==='voice');
    let html=`<div class="ch-list"><div class="ch-section">`;
    html+=`<div class="ch-section-hdr"><span>📝 TEXTE (${textChs.length})</span><span onclick="openModal('add-channel','${serverId}')" style="cursor:pointer;font-size:16px;color:var(--text2)">+</span></div>`;
    textChs.forEach(ch=>{
      html+=`<div class="ch-item${S.activeChannel===ch.id?' active':''}" onclick="showChannel('${ch.id}')" oncontextmenu="chCtxMenu(event,'${ch.id}')">
        <span class="ch-icon">#</span><span>${ch.name}</span></div>`;
    });
    html+=`</div>`;
    if(voiceChs.length>0){
      html+=`<div class="ch-section"><div class="ch-section-hdr"><span>🔊 VOCAL (${voiceChs.length})</span></div>`;
      voiceChs.forEach(ch=>{
        html+=`<div class="ch-item${S.activeChannel===ch.id?' active':''}" onclick="showChannel('${ch.id}')">
          <span class="ch-icon">🔊</span><span>${ch.name}</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
    lp.innerHTML=html;
  } else {
    document.getElementById('lp-title').textContent='Messages Directs';

function filterFriends(filter,btn){
  if(btn){document.querySelectorAll('.friends-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');}
  const container=document.getElementById('friends-list'); if(!container)return;
  if(filter==='add'){
    container.innerHTML=`<div class="add-friend-area"><h3>Ajouter un ami</h3><p>Entre le pseudo exact de ton ami.</p>
      <div class="add-friend-input-row">
        <input type="text" id="add-friend-input" placeholder="Nom d'utilisateur..." onkeydown="if(event.key==='Enter')sendFriendRequest()"/>
        <button onclick="sendFriendRequest()">Envoyer</button>
      </div>
      <div id="add-friend-msg" style="margin-top:8px;font-size:13px;"></div></div>`;
    return;
  }
  const myFriends=Object.keys(S.friends[S.me]||{});
  const myPendingIn=Object.keys(S.pendingIn[S.me]||{});
  const myPendingOut=Object.keys(S.pendingOut[S.me]||{});
  let html='';
  if(filter==='pending'){
    if(myPendingIn.length>0){
      html+=`<div style="padding:10px 16px 4px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;">REÇUES — ${myPendingIn.length}</div>`;
      myPendingIn.forEach(fid=>{
        const fu=S.users[fid]; if(!fu)return;
        html+=`<div class="friend-item"><div class="friend-avatar" style="background:${fu.color||avatarColor(fu.username)}">${initials(fu.username)}</div>
          <div class="friend-info"><div class="friend-name">${fu.username}</div><div class="friend-status">Demande en attente</div></div>
          <div class="friend-actions">
            <div class="friend-btn" title="Accepter" onclick="acceptFriend('${fid}')" style="background:rgba(34,197,94,.2);color:var(--green)">✓</div>
            <div class="friend-btn" title="Refuser" onclick="rejectFriend('${fid}')" style="background:rgba(239,68,68,.2);color:var(--red)">✗</div>
          </div></div>`;
      });
    }
    if(myPendingOut.length>0){
      html+=`<div style="padding:10px 16px 4px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;">ENVOYÉES — ${myPendingOut.length}</div>`;
      myPendingOut.forEach(fid=>{
        const fu=S.users[fid]; if(!fu)return;
        html+=`<div class="friend-item"><div class="friend-avatar" style="background:${fu.color||avatarColor(fu.username)}">${initials(fu.username)}</div>
          <div class="friend-info"><div class="friend-name">${fu.username}</div><div class="friend-status">En attente</div></div>
          <div class="friend-actions"><div class="friend-btn" onclick="cancelFriendRequest('${fid}')" style="background:rgba(239,68,68,.2);color:var(--red)">✗</div></div></div>`;
      });
    }
    if(!myPendingIn.length&&!myPendingOut.length) html=`<div style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:48px">🕐</div><div style="font-size:16px;font-weight:700;margin-top:12px;">Aucune demande en attente</div></div>`;
  } else {
    let list=myFriends;
    if(filter==='online') list=myFriends.filter(id=>{const u=S.users[id];return u&&u.status!=='offline';});
    if(!list.length){
      html=`<div style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:48px">👋</div><div style="font-size:16px;font-weight:700;margin-top:12px;">Aucun ami ${filter==='online'?'en ligne':''}</div><button class="btn btn-primary" style="margin-top:12px;" onclick="filterFriends('add',null)">Ajouter un ami</button></div>`;
    } else {
      html+=`<div style="padding:10px 16px 4px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;">${filter==='online'?'EN LIGNE':'TOUS'} — ${list.length}</div>`;
      list.forEach(fid=>{
        const fu=S.users[fid]; if(!fu)return;
        const st=fu.status||'online';
        html+=`<div class="friend-item" oncontextmenu="userCtxMenu(event,'${fid}')">
          <div class="friend-avatar" style="background:${fu.color||avatarColor(fu.username)}">${initials(fu.username)}<div class="status-dot ${st}"></div></div>
          <div class="friend-info"><div class="friend-name">${fu.username}</div><div class="friend-status">${STATUS_LABELS[st]}</div></div>
          <div class="friend-actions">
            <div class="friend-btn" title="Message" onclick="openDm('${fid}')">💬</div>
            <div class="friend-btn" title="Appel vocal" onclick="startCall('${fid}','voice')">📞</div>
            <div class="friend-btn" title="Appel vidéo" onclick="startCall('${fid}','video')">📹</div>
            <div class="friend-btn" title="Plus" onclick="userCtxMenu(event,'${fid}')">⋯</div>
          </div></div>`;
      });
    }
  }
  container.innerHTML=html;
}

async function sendFriendRequest(){
  const input=document.getElementById('add-friend-input');
  const msg=document.getElementById('add-friend-msg');
  const rawName=input.value.trim();
  const name=rawName.toLowerCase();
  const RED='#ef4444';
  if(!name){msg.style.color=RED;msg.textContent='Entre un nom d\'utilisateur.';return;}
  if(name===S.me){msg.style.color=RED;msg.textContent='Tu ne peux pas t\'ajouter toi-même !';return;}
  msg.style.color='var(--text2)';msg.textContent='Recherche...';
  const allUsers=await dbGet('users')||{};
  S.users=allUsers;
  const found=Object.keys(allUsers).find(k=>k===name||allUsers[k].username.toLowerCase()===name);
  if(!found){msg.style.color=RED;msg.textContent='Utilisateur introuvable. Vérifie le pseudo.';return;}
  if(found===S.me){msg.style.color=RED;msg.textContent='C\'est toi !';return;}
  if(S.friends[S.me]&&S.friends[S.me][found]){msg.style.color=RED;msg.textContent='Vous êtes déjà amis !';return;}
  if(S.pendingOut[S.me]&&S.pendingOut[S.me][found]){msg.style.color=RED;msg.textContent='Demande déjà envoyée.';return;}
  if(S.pendingIn[S.me]&&S.pendingIn[S.me][found]){await acceptFriend(found);return;}
  await dbUpdate('pendingOut/'+S.me,{[found]:true});
  await dbUpdate('pendingIn/'+found,{[S.me]:true});
  S.pendingOut[S.me]=S.pendingOut[S.me]||{};
  S.pendingOut[S.me][found]=true;
  msg.style.color='#22c55e';
  msg.textContent='✓ Demande envoyée à '+allUsers[found].username+' !';
  input.value='';
  showToast('Demande envoyée','Demande envoyée à '+allUsers[found].username,avatarColor(allUsers[found].username),initials(allUsers[found].username));
}

async function acceptFriend(fid){
  await dbUpdate('friends/'+S.me,{[fid]:true});
  await dbUpdate('friends/'+fid,{[S.me]:true});
  await dbRemove('pendingIn/'+S.me+'/'+fid);
  await dbRemove('pendingOut/'+fid+'/'+S.me);
  S.friends[S.me]=S.friends[S.me]||{}; S.friends[S.me][fid]=true;
  const fu=S.users[fid];
  if(fu) showToast('Nouvel ami !',fu.username+' est maintenant ton ami !',fu.color||avatarColor(fu.username),initials(fu.username));
  renderFriendsView(); renderLeftPanel('dm');
}

async function rejectFriend(fid){
  await dbRemove('pendingIn/'+S.me+'/'+fid);
  await dbRemove('pendingOut/'+fid+'/'+S.me);
  if(S.pendingIn[S.me]) delete S.pendingIn[S.me][fid];
  renderFriendsView();
}

async function cancelFriendRequest(fid){
  await dbRemove('pendingOut/'+S.me+'/'+fid);
  await dbRemove('pendingIn/'+fid+'/'+S.me);
  if(S.pendingOut[S.me]) delete S.pendingOut[S.me][fid];
  renderFriendsView();
}

async function removeFriend(fid){
  await dbRemove('friends/'+S.me+'/'+fid);
  await dbRemove('friends/'+fid+'/'+S.me);
  if(S.friends[S.me]) delete S.friends[S.me][fid];
  renderFriendsView(); renderLeftPanel('dm'); closeCtxMenu();
}

async function quickAddFriend(userId){
  if(!S.users[userId])return;
  if(S.friends[S.me]&&S.friends[S.me][userId]){showToast('Déjà amis !','Vous êtes déjà amis.',avatarColor(S.users[userId].username),initials(S.users[userId].username));return;}
  if(S.pendingIn[S.me]&&S.pendingIn[S.me][userId]){await acceptFriend(userId);return;}
  if(S.pendingOut[S.me]&&S.pendingOut[S.me][userId]){showToast('Déjà envoyée','En attente de réponse.',avatarColor(S.users[userId].username),initials(S.users[userId].username));return;}
  await dbUpdate('pendingOut/'+S.me,{[userId]:true});
  await dbUpdate('pendingIn/'+userId,{[S.me]:true});
  S.pendingOut[S.me]=S.pendingOut[S.me]||{}; S.pendingOut[S.me][userId]=true;
  showToast('Demande envoyée','Envoyée à '+S.users[userId].username,avatarColor(S.users[userId].username),initials(S.users[userId].username));
  closeCtxMenu(); renderRightPanel();
}

function buildMsgHtml(msgs, type, contextId){
  if(!msgs||!msgs.length) return`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px;text-align:center;min-height:200px;"><div><div style="font-size:48px;margin-bottom:12px;">${type==='channel'?'#':'💬'}</div><div style="font-size:18px;font-weight:700;">Aucun message pour l'instant</div><div style="color:var(--text2);margin-top:4px;">Sois le premier à écrire quelque chose !</div></div></div>`;
  let html=''; let lastAuthor=''; let lastTs=0;
  msgs.forEach(msg=>{
    const isContinue=msg.author===lastAuthor&&msg.ts-lastTs<300000;
    const u=msg.authorId?S.users[msg.authorId]:null;
    const aColor=u?u.color||avatarColor(u.username):msg.avatar||avatarColor(msg.author||'');
    if(!isContinue){
      html+=`<div class="msg-group" oncontextmenu="msgCtxMenu(event,'${msg.id}','${type}','${contextId}')">
        <div class="msg-avatar" style="background:${aColor}">${initials(msg.author)}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author" style="${u&&u.nameColor?`background:${u.nameColor};-webkit-background-clip:text;-webkit-text-fill-color:transparent`:''}">${escHtml(msg.author)}</span>
            ${msg.badge==='nitro'?'<span class="msg-badge nitro">NITRO</span>':msg.badge==='mod'?'<span class="msg-badge mod">MOD</span>':''}
            <span class="msg-time">${timeAgo(msg.ts)}</span>
          </div>
          <div class="msg-text">${formatMsg(msg.content)}</div>
        </div>
      </div>`;
    } else {
      html+=`<div class="msg-continue" oncontextmenu="msgCtxMenu(event,'${msg.id}','${type}','${contextId}')">
        <div class="msg-text">${formatMsg(msg.content)}</div>
      </div>`;
    }
    lastAuthor=msg.author; lastTs=msg.ts;
  });
  return html;
}

function scrollToBottom(id){ setTimeout(()=>{const el=document.getElementById(id);if(el)el.scrollTop=el.scrollHeight;},80); }
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px';}
function handleMsgKey(e,id,type){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(id,type);} }

async function sendMessage(id, type){
  const inp=document.getElementById('msg-input-'+id); if(!inp)return;
  const content=inp.value.trim(); if(!content)return;
  const u=S.users[S.me];
  const msg={id:uid(),author:u.username,authorId:S.me,content,ts:Date.now(),reactions:{}};
  if(u.nitro)msg.badge='nitro';
  inp.value=''; inp.style.height='auto';
  if(type==='channel'){
    await dbSet('messages/'+id+'/'+msg.id, msg);
  } else {
    const userId=id.replace('dm_','');
    const dmKey=getDmKey(S.me,userId);
    await dbSet('dms/'+dmKey+'/'+msg.id, msg);
    S.dms[dmKey]=S.dms[dmKey]||{};
    S.dms[dmKey][msg.id]=msg;
    renderDm(userId);
    renderLeftPanel('dm');
  }
}

async function deleteMsg(msgId, type, contextId){
  if(type==='channel'){
    await dbRemove('messages/'+contextId+'/'+msgId);
  } else {
    const dmKey=getDmKey(S.me,contextId);
    await dbRemove('dms/'+dmKey+'/'+msgId);
  }
  closeCtxMenu();
}

let _channelListener=null;
function listenChannel(chId){
  if(_channelListener){ off(_channelListener); _channelListener=null; }
  _channelListener=dbRef('messages/'+chId);
  onValue(_channelListener, snap=>{
    const val=snap.val()||{};
    S.messages[chId]=val;
    if(S.activeChannel===chId) renderChannel(chId);
  });
}

// ==================== RIGHT PANEL ====================
function toggleRightPanel(){
  const rp=document.getElementById('right-panel');
  rp.classList.toggle('hidden');
  if(!rp.classList.contains('hidden'))renderRightPanel();
}

function renderRightPanel(){
  const rp=document.getElementById('right-panel');
  if(rp.classList.contains('hidden'))return;
  let memberIds=[];
  if(S.activeServer){
    const srv=S.servers[S.activeServer];
    memberIds=srv?Object.keys(srv.members||{}):[S.me];
  } else {
    memberIds=Object.keys(S.users);
  }
  if(!memberIds.includes(S.me))memberIds=[S.me,...memberIds];
  const online=memberIds.filter(id=>{const u=S.users[id];return u&&u.status!=='offline';});
  const offline=memberIds.filter(id=>{const u=S.users[id];return u&&(!u.status||u.status==='offline');});
  const myFriends=S.friends[S.me]||{};
  const myPendingOut=S.pendingOut[S.me]||{};
  let html='';
  if(online.length>0){
    html+=`<div class="rp-section"><div class="rp-title">EN LIGNE — ${online.length}</div>`;
    online.forEach(id=>{
      const u=S.users[id]; if(!u)return;
      const isMe=id===S.me;
      const isFriend=myFriends[id];
      const isPendingOut=myPendingOut[id];
      html+=`<div class="member-item" onclick="openModal('view-profile','${id}')" oncontextmenu="userCtxMenu(event,'${id}')">
        <div class="member-avatar" style="background:${u.color||avatarColor(u.username)}">${initials(u.username)}<div class="status-dot ${u.status||'online'}"></div></div>
        <div class="member-info"><div class="member-name">${u.username}${isMe?' (moi)':''}</div><div class="member-status">${STATUS_LABELS[u.status||'online']}</div></div>
        ${!isMe&&!isFriend&&!isPendingOut?`<div title="Ajouter" onclick="event.stopPropagation();quickAddFriend('${id}')" style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(124,92,252,.2);color:var(--accent1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;">+</div>`:''}
        ${!isMe&&isFriend?`<div onclick="event.stopPropagation();openDm('${id}')" style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(34,197,94,.15);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">💬</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }
  if(offline.length>0){
    html+=`<div class="rp-section"><div class="rp-title">HORS LIGNE — ${offline.length}</div>`;
    offline.forEach(id=>{
      const u=S.users[id]; if(!u)return;
      html+=`<div class="member-item" style="opacity:.5" onclick="openModal('view-profile','${id}')">
        <div class="member-avatar" style="background:${u.color||avatarColor(u.username)}">${initials(u.username)}<div class="status-dot offline"></div></div>
        <div class="member-info"><div class="member-name">${u.username}</div><div class="member-status">Hors ligne</div></div>
      </div>`;
    });
    html+=`</div>`;
  }
  rp.innerHTML=html||`<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;"><div style="font-size:32px;margin-bottom:8px;">👥</div>Aucun membre</div>`;
}

// ==================== EMOJI PICKER ====================
function toggleEmojiPicker(channelId){
  const ep=document.getElementById('emoji-picker');
  if(!ep.classList.contains('hidden')){ep.classList.add('hidden');return;}
  ep.innerHTML=`<input class="emoji-search" placeholder="Rechercher..." oninput="filterEmojis(this.value,'${channelId}')"/>
  <div class="emoji-grid">${EMOJIS.map(e=>`<div class="emoji-btn" onclick="insertEmoji('${e}','${channelId}')">${e}</div>`).join('')}</div>`;
  ep.classList.remove('hidden');
  document.addEventListener('click',()=>ep.classList.add('hidden'),{once:true,capture:true});
}
function filterEmojis(q,chId){
  const grid=document.querySelector('.emoji-grid');
  const filtered=q?EMOJIS.filter(e=>e.includes(q)):EMOJIS;
  if(grid)grid.innerHTML=filtered.map(e=>`<div class="emoji-btn" onclick="insertEmoji('${e}','${chId}')">${e}</div>`).join('');
}
function insertEmoji(emoji,chId){
  const inp=document.getElementById('msg-input-'+chId);
  if(inp){inp.value+=emoji;inp.focus();}
  document.getElementById('emoji-picker').classList.add('hidden');
}

// ==================== CONTEXT MENUS ====================
function msgCtxMenu(e,msgId,type,contextId){
  e.preventDefault(); e.stopPropagation();
  const rawMsgs=type==='channel'?S.messages[contextId]:S.dms[getDmKey(S.me,contextId)];
  const msgs=rawMsgs?Object.values(rawMsgs):[];
  const msg=msgs.find(m=>m.id===msgId);
  const isOwner=msg&&msg.authorId===S.me;
  showCtxMenu(e.clientX,e.clientY,[
    {label:'📋 Copier',fn:`copyText(${JSON.stringify(msg?msg.content:'')})`},
    ...(isOwner?[{sep:true},{label:'🗑️ Supprimer',fn:`deleteMsg('${msgId}','${type}','${contextId}')`,danger:true}]:[]),
  ]);
}
function chCtxMenu(e,chId){
  e.preventDefault();
  const ch=S.channels[chId]; if(!ch)return;
  showCtxMenu(e.clientX,e.clientY,[
    {label:`# ${ch.name}`,disabled:true},{sep:true},
    ...(isServerOwner()?[{label:'✏️ Renommer',fn:`openModal('rename-channel','${chId}')`},{label:'🗑️ Supprimer',fn:`deleteChannel('${chId}')`,danger:true}]:[]),
  ]);
}
function userCtxMenu(e,userId){
  e.preventDefault(); e.stopPropagation();
  const fu=S.users[userId]; if(!fu)return;
  const isFriend=S.friends[S.me]&&S.friends[S.me][userId];
  showCtxMenu(e.clientX,e.clientY,[
    {label:fu.username,disabled:true},{sep:true},
    {label:'👤 Voir le profil',fn:`openModal('view-profile','${userId}')`},
    {label:'💬 Envoyer un message',fn:`openDm('${userId}')`},
    {label:'📞 Appel vocal',fn:`startCall('${userId}','voice')`},
    {label:'📹 Appel vidéo',fn:`startCall('${userId}','video')`},
    ...(isFriend?[{sep:true},{label:'💔 Retirer des amis',fn:`removeFriend('${userId}')`,danger:true}]:[{sep:true},{label:'➕ Ajouter en ami',fn:`quickAddFriend('${userId}')`}]),
  ]);
}
function showCtxMenu(x,y,items){
  const menu=document.getElementById('ctx-menu');
  menu.innerHTML=items.map(item=>{
    if(item.sep)return`<div class="ctx-sep"></div>`;
    if(item.disabled)return`<div class="ctx-item" style="font-weight:700;opacity:.5;cursor:default">${item.label}</div>`;
    return`<div class="ctx-item${item.danger?' danger':''}" onclick="${item.fn};closeCtxMenu()">${item.label}</div>`;
  }).join('');
  menu.style.left=Math.min(x,window.innerWidth-200)+'px';
  menu.style.top=Math.min(y,window.innerHeight-250)+'px';
  menu.classList.remove('hidden');
  document.addEventListener('click',closeCtxMenu,{once:true,capture:true});
}
function closeCtxMenu(){ document.getElementById('ctx-menu').classList.add('hidden'); }
function copyText(text){ navigator.clipboard.writeText(text).catch(()=>{}); }

      <select id="set-status">
        <option value="online"${u.status==='online'?' selected':''}>🟢 En ligne</option>
        <option value="idle"${u.status==='idle'?' selected':''}>🟡 Absent</option>
        <option value="dnd"${u.status==='dnd'?' selected':''}>🔴 Ne pas déranger</option>
        <option value="offline"${u.status==='offline'?' selected':''}>⚫ Invisible</option>

        <div class="color-swatch" style="background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);" onclick="document.getElementById('set-namecolor').value='';document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'))">✕</div>
      </div>
      <input type="hidden" id="set-namecolor" value="${u.nameColor||''}"/>

    <div class="field"><label>Couleur d'avatar</label>
      <div class="color-picker-row">${AVATAR_COLORS.map(c=>`<div class="color-swatch${u.color===c?' selected':''}" style="background:${c}" onclick="selectSwatch(this,'set-avatarcolor','${c}')"></div>`).join('')}</div>
      <input type="hidden" id="set-avatarcolor" value="${u.color||avatarColor(u.username)}"/>

function showSettingsSection(section,btn){
  document.querySelectorAll('.settings-nav-item').forEach(i=>i.classList.remove('active'));

  const content=document.getElementById('settings-content');
  if(section==='profile') content.innerHTML=renderSettingsProfile(u);
  else if(section==='appearance'){
    content.innerHTML=`<div class="settings-section"><h3>Thème de couleur</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
        ${[{id:'theme-purple',label:'Violet',g:'linear-gradient(135deg,#7c5cfc,#ec4899)'},{id:'theme-blue',label:'Bleu',g:'linear-gradient(135deg,#3b82f6,#06b6d4)'},{id:'theme-green',label:'Vert',g:'linear-gradient(135deg,#10b981,#22c55e)'},{id:'theme-orange',label:'Orange',g:'linear-gradient(135deg,#f97316,#eab308)'},{id:'theme-pink',label:'Rose',g:'linear-gradient(135deg,#ec4899,#f97316)'},{id:'theme-cyan',label:'Cyan',g:'linear-gradient(135deg,#06b6d4,#7c5cfc)'}].map(t=>`
          <div onclick="applyTheme('${t.id}')" style="border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid ${S.theme===t.id?'var(--text1)':'transparent'};transition:.2s;">
            <div style="height:44px;background:${t.g};"></div>
            <div style="padding:6px 8px;background:var(--bg3);font-size:12px;font-weight:600;">${t.label}</div>
          </div>`).join('')}
      </div></div>`;
  } else if(section==='notifications'){
    content.innerHTML=`<div class="settings-section"><h3>Notifications</h3>
      <div class="toggle-row"><div class="toggle-info"><div class="toggle-label">Messages directs</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
      <div class="toggle-row"><div class="toggle-info"><div class="toggle-label">Demandes d'amis</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
    </div>`;
  } else if(section==='audio'){
    content.innerHTML=`<div class="settings-section"><h3>Audio & Vidéo</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Les appels utilisent WebRTC — ton navigateur gère automatiquement le micro et la caméra.</p>
      <div class="toggle-row"><div class="toggle-info"><div class="toggle-label">Réduction de bruit</div><div class="toggle-desc">Basé sur le traitement WebRTC natif</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
      <div class="field" style="margin-top:16px;"><label>Volume micro</label><input type="range" min="0" max="100" value="80"/></div>
      <button class="btn btn-ghost" style="margin-top:12px;width:100%;" onclick="testMic()">🎤 Tester le micro</button>
    </div>`;
  }
}

async function testMic(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    showToast('Micro OK','Ton micro fonctionne correctement !','var(--green)','✓');
    setTimeout(()=>stream.getTracks().forEach(t=>t.stop()), 1000);
  }catch(e){
    showToast('Micro indisponible','Vérifie les permissions de ton navigateur.','#ef4444','!');
  }
}

async function saveProfile(){
  const u=S.users[S.me];
  const username=document.getElementById('set-username').value.trim();
  if(!username||username.length<2||username.length>24){showToast('Erreur','Pseudo invalide (2-24 caractères)','#ef4444','!');return;}
  u.username=username;
  u.bio=document.getElementById('set-bio').value.trim();
  u.status=document.getElementById('set-status').value;
  u.nameColor=document.getElementById('set-namecolor').value||null;
  u.color=document.getElementById('set-avatarcolor').value||avatarColor(username);
  await dbUpdate('users/'+S.me, {username:u.username,bio:u.bio,status:u.status,nameColor:u.nameColor,color:u.color});
  S.users[S.me]=u;
  renderUserBar();
  closeAllModals();
  showToast('Profil sauvegardé','Tes modifications ont été enregistrées.',u.color,'✓');
}

function applyTheme(themeId){
  S.theme=themeId; document.body.className=themeId;
  dbUpdate('users/'+S.me,{theme:themeId});
  const u=S.users[S.me]; if(u)u.theme=themeId;
  showSettingsSection('appearance',document.querySelector('.settings-nav-item.active'));
}

function selectSwatch(el,inputId,value){
  el.closest('.color-picker-row').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  const inp=document.getElementById(inputId); if(inp)inp.value=value;
}

function selectChType(type){
  document.getElementById('ch-type-val').value=type;
  document.getElementById('chtype-text').style.borderColor=type==='text'?'var(--accent1)':'transparent';
  document.getElementById('chtype-voice').style.borderColor=type==='voice'?'var(--accent1)':'transparent';
  document.getElementById('chtype-text').style.background=type==='text'?'var(--bg4)':'var(--bg3)';
  document.getElementById('chtype-voice').style.background=type==='voice'?'var(--bg4)':'var(--bg3)';
}

async function createServer(){
  const name=document.getElementById('srv-name').value.trim();
  const icon=document.getElementById('srv-icon').value.trim()||'🌐';
  const desc=document.getElementById('srv-desc').value.trim();
  const color=document.getElementById('srv-color-val').value;
  if(!name){showToast('Erreur','Donne un nom !','#ef4444','!');return;}
  const sid=uid();
  const defText=uid(); const defVoice=uid();
  await dbSet('servers/'+sid,{id:sid,name,icon,desc,color,owner:S.me,members:{[S.me]:true},createdAt:Date.now()});
  await dbSet('channels/'+defText,{id:defText,server:sid,name:'général',type:'text',position:0});
  await dbSet('channels/'+defVoice,{id:defVoice,server:sid,name:'vocal-général',type:'voice',position:1});
  await dbUpdate('userServers/'+S.me,{[sid]:true});
  S.servers[sid]={id:sid,name,icon,desc,color,owner:S.me,members:{[S.me]:true}};
  S.channels[defText]={id:defText,server:sid,name:'général',type:'text',position:0};
  closeAllModals(); renderServersBar(); showServer(sid);
  showToast('Serveur créé',name+' est en ligne !',color,icon);
}

async function createChannel(serverId){
  const name=document.getElementById('ch-name').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const type=document.getElementById('ch-type-val').value;
  if(!name){showToast('Erreur','Donne un nom au salon !','#ef4444','!');return;}
  const chId=uid();
  const pos=Object.values(S.channels).filter(c=>c.server===serverId).length;
  await dbSet('channels/'+chId,{id:chId,server:serverId,name,type,position:pos});
  S.channels[chId]={id:chId,server:serverId,name,type,position:pos};
  closeAllModals(); renderLeftPanel('server',serverId);
  if(type==='text')showChannel(chId);
}

async function joinServer(sid){
  await dbUpdate('servers/'+sid+'/members',{[S.me]:true});
  await dbUpdate('userServers/'+S.me,{[sid]:true});
  if(S.servers[sid]){S.servers[sid].members=S.servers[sid].members||{};S.servers[sid].members[S.me]=true;}
  renderServersBar();
  closeAllModals();
  showToast('Serveur rejoint','Tu as rejoint '+S.servers[sid].name+' !',S.servers[sid].color||AVATAR_COLORS[0],S.servers[sid].icon||'🌐');
}

async function leaveServer(sid){
  if(!confirm('Quitter ce serveur ?'))return;
  await dbRemove('servers/'+sid+'/members/'+S.me);
  await dbRemove('userServers/'+S.me+'/'+sid);
  if(S.servers[sid]&&S.servers[sid].members)delete S.servers[sid].members[S.me];
  if(S.activeServer===sid){S.activeServer=null;renderHomeView();}
  renderServersBar(); closeAllModals();
}

async function renameChannel(chId){
  const inp=document.getElementById('rename-ch-input'); if(!inp)return;
  const name=inp.value.trim().toLowerCase().replace(/\s+/g,'-'); if(!name)return;
  await dbUpdate('channels/'+chId,{name});
  S.channels[chId].name=name;
  closeAllModals(); renderLeftPanel('server',S.activeServer);
  if(S.activeChannel===chId)renderChannel(chId);
}

async function deleteChannel(chId){
  if(!isServerOwner())return;
  await dbRemove('channels/'+chId); await dbRemove('messages/'+chId);
  delete S.channels[chId]; delete S.messages[chId];
  closeCtxMenu();
  if(S.activeChannel===chId){S.activeChannel=null;renderHomeView();}
  renderLeftPanel('server',S.activeServer);
}

function isServerOwner(){
  if(!S.activeServer)return false;
  const srv=S.servers[S.activeServer];
  return srv&&srv.owner===S.me;
}

function doSearch(q,contextId){
  const container=document.getElementById('search-results'); if(!q||!container)return;
  q=q.toLowerCase();
  let msgs=[];
  if(contextId.startsWith('dm_')){
    const userId=contextId.replace('dm_','');
    const dmKey=getDmKey(S.me,userId);
    msgs=S.dms[dmKey]?Object.values(S.dms[dmKey]):[];
  } else {
    msgs=S.messages[contextId]?Object.values(S.messages[contextId]):[];
  }
  const results=msgs.filter(m=>m.content&&m.content.toLowerCase().includes(q));
  if(!results.length){container.innerHTML=`<div style="text-align:center;color:var(--text2);padding:16px;">Aucun résultat pour "${q}"</div>`;return;}
  container.innerHTML=results.slice(-20).reverse().map(m=>`
    <div style="padding:8px;border-bottom:1px solid var(--border);">
      <div style="font-size:12px;color:var(--text2);margin-bottom:3px;"><strong>${m.author}</strong> · ${timeAgo(m.ts)}</div>
      <div style="font-size:14px;">${escHtml(m.content).replace(new RegExp(q,'gi'),match=>`<mark style="background:rgba(124,92,252,.3);border-radius:2px;">${match}</mark>`)}</div>
    </div>`).join('');
}

function filterExplore(q){
  const container=document.getElementById('explore-list'); if(!container)return;
  const all=Object.values(S.servers).filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||((s.desc||'').toLowerCase()).includes(q.toLowerCase()));
  container.innerHTML=all.map(srv=>{
    const joined=srv.members&&srv.members[S.me];
    return`<div class="member-item" style="padding:12px;">
      <div class="member-avatar" style="background:${srv.color||AVATAR_COLORS[0]};width:48px;height:48px;font-size:22px;border-radius:12px;">${srv.icon||initials(srv.name)}</div>
      <div class="member-info" style="flex:1;"><div class="member-name" style="font-size:15px;">${srv.name}</div>
      <div class="member-status">${srv.desc||''} • ${Object.keys(srv.members||{}).length} membres</div></div>
      ${joined?`<button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="leaveServer('${srv.id}')">Quitter</button>`:`<button class="btn btn-primary" style="font-size:12px;padding:6px 12px;" onclick="joinServer('${srv.id}')">Rejoindre</button>`}
    </div>`;
  }).join('');
}

function changeBanner(){
  const input=document.createElement('input'); input.type='file'; input.accept='image/*';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      await dbUpdate('users/'+S.me,{banner:'url('+ev.target.result+')'});
      S.users[S.me].banner='url('+ev.target.result+')';
      openModal('my-profile');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function changeAvatar(){
  const input=document.createElement('input'); input.type='file'; input.accept='image/*';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      await dbUpdate('users/'+S.me,{avatarImg:ev.target.result});
      S.users[S.me].avatarImg=ev.target.result;
      openModal('my-profile'); renderUserBar();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function closeAllModals(){ document.getElementById('modals').innerHTML=''; }

// ==================== TOASTS ====================
function showToast(title,body,avatarBg,avatarText){
  const container=document.getElementById('toasts');
  const id='toast_'+uid();
  const div=document.createElement('div');
  div.className='toast'; div.id=id;
  div.innerHTML=`<div class="toast-avatar" style="background:${avatarBg||'var(--grad)'}">${avatarText||'H'}</div>
  <div class="toast-content"><div class="toast-title">${title}</div><div class="toast-body">${body}</div></div>
  <button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>`;
  container.appendChild(div);
  setTimeout(()=>{const el=document.getElementById(id);if(el){el.style.animation='slideIn .3s ease reverse';setTimeout(()=>el.remove(),300);}},4000);
}

function toggleLeftPanel(){
  const content=document.getElementById('lp-content');
  content.style.display=content.style.display==='none'?'':'none';
}

async function logout(){
  if(WR.localStream||WR.pc) endCall();
  await dbUpdate('users/'+S.me,{status:'offline'});
  saveSession(null);
  S.me=null;
  S.users={};S.servers={};S.channels={};S.messages={};S.dms={};
  S.friends={};S.pendingIn={};S.pendingOut={};
  S.activeServer=null;S.activeChannel=null;S.activeDm=null;
  if(_channelListener){off(_channelListener);_channelListener=null;}
  closeAllModals();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

// ==================== INIT ====================
async function init(){
  document.getElementById('loading-msg').textContent='Connexion à Firebase...';
  const session=loadSession();
  if(session){
    const u=await dbGet('users/'+session);
    if(u){
      S.me=session;
      await enterApp();
      return;
    }
  }
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeAllModals();closeCtxMenu();document.getElementById('emoji-picker').classList.add('hidden');}
  });
}

// Make functions global for onclick handlers
Object.assign(window,{

  createServer,createChannel,joinServer,leaveServer,renameChannel,deleteChannel,isServerOwner,
  toggleRightPanel,renderRightPanel,
  startCall,startVideoCall,endCall,joinVoiceChannel,declineCall,acceptCall,
  toggleCallMic,toggleCallCam,toggleScreenShare,toggleMic,toggleDeaf,
  toggleEmojiPicker,filterEmojis,insertEmoji,
  msgCtxMenu,chCtxMenu,userCtxMenu,showCtxMenu,closeCtxMenu,copyText,
  doSearch,filterExplore,changeBanner,changeAvatar,logout,
  renderNitroView,showToast,
});

init();
